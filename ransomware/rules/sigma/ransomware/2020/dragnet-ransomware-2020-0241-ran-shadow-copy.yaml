title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0241 — Shadow Copy Deletion (nefilim)'
id: 54fbe49f-a02d-5244-a918-ea4893743e0f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nefilim ransomware.
  Incident: dragnet-ransomware-2020-0241
  Ransomware victim claim by nefilim: Orange (mobile operator); country: FR; sector: Telecommunication
  First observed: 2020-07-04.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
