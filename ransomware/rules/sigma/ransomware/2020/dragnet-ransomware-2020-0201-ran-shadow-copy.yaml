title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0201 — Shadow Copy Deletion (ryuk)'
id: c96c8dc8-5fdf-5f53-a66b-ac568a807951
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ryuk ransomware.
  Incident: dragnet-ransomware-2020-0201
  Ransomware victim claim by ryuk: Dickinson County Health; country: US; sector: Healthcare
  First observed: 2020-10-17.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
