title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0111 — Shadow Copy Deletion (nefilim)'
id: d7eb0e1e-44b4-51ca-95be-0d7a6dfcdcd9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nefilim ransomware.
  Incident: dragnet-ransomware-2020-0111
  Ransomware victim claim by nefilim: DKA (refrigeration and air conditioning specialist, Dussmann Group subsidiary); country: DE; sector: Manufacturing
  First observed: 2020-07-27.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
