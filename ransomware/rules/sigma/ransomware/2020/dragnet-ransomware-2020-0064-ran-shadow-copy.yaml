title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0064 — Shadow Copy Deletion (doppelpaymer)'
id: 5f6f6625-8a2d-52c1-a06f-4be8133e7a4b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with doppelpaymer ransomware.
  Incident: dragnet-ransomware-2020-0064
  Ransomware victim claim by doppelpaymer: Mitsubishi; sector: Manufacturing
  First observed: 2020-06-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
