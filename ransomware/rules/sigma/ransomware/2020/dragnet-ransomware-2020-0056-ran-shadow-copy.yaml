title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0056 — Shadow Copy Deletion (coldlock)'
id: 2af1b703-813c-55b8-9bc9-6225ee605b89
status: deprecated
description: |
  Detects shadow copy deletion commands associated with coldlock ransomware.
  Incident: dragnet-ransomware-2020-0056
  Ransomware victim claim by coldlock: Moorestown Visiting Nurse Association; country: US; sector: Healthcare
  First observed: 2020-03-19.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
