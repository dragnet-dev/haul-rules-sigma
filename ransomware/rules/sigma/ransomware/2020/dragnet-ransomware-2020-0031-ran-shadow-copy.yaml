title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0031 — Shadow Copy Deletion (agelocker)'
id: 8961d261-613a-54b9-a327-6ce50721e418
status: deprecated
description: |
  Detects shadow copy deletion commands associated with agelocker ransomware.
  Incident: dragnet-ransomware-2020-0031
  Ransomware victim claim by agelocker: QNAP; sector: Technology
  First observed: 2020-08-30.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
