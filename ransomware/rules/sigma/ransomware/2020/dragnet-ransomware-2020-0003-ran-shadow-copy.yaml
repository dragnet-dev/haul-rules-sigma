title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0003 — Shadow Copy Deletion (dispossessor)'
id: 10c4e658-1ee5-5a7e-9e49-858cd90b8e4c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0003
  Ransomware victim claim by dispossessor: chuckecheese.com; country: US; sector: Hospitality and Tourism
  First observed: 2020-08-22.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/62
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
