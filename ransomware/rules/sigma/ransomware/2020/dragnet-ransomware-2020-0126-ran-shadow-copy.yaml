title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0126 — Shadow Copy Deletion (maze)'
id: 3631967c-256c-5c27-8999-e2f6164f8cd1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with maze ransomware.
  Incident: dragnet-ransomware-2020-0126
  Ransomware victim claim by maze: Affordacare Urgent Care Clinics; country: US; sector: Healthcare
  First observed: 2020-02-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
