title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0091 — Shadow Copy Deletion (snake)'
id: 455add2b-8a92-5e76-b21a-773a62606f4a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snake ransomware.
  Incident: dragnet-ransomware-2020-0091
  Associated with Turla.
  Ransomware victim claim by snake: Honda Motor Co.; sector: Manufacturing
  First observed: 2020-06-07.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.turla
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
