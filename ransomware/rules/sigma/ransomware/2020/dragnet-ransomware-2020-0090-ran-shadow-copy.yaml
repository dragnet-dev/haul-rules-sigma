title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0090 — Shadow Copy Deletion (dispossessor)'
id: 9d337078-33a7-5b4b-9599-fdfe05d63cc6
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0090
  Ransomware victim claim by dispossessor: fiscdp.com; sector: Financial Services
  First observed: 2020-07-20.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/149
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
