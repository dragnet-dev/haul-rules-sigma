title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0154 — Shadow Copy Deletion (ryuk)'
id: 25434741-0850-5826-8c53-aba5a2f762ff
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ryuk ransomware.
  Incident: dragnet-ransomware-2020-0154
  Ransomware victim claim by ryuk: Baltimore County Public Schools (BCPS); country: US; sector: Education
  First observed: 2020-11-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
