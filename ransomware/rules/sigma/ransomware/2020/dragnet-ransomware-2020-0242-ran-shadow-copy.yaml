title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0242 — Shadow Copy Deletion (dispossessor)'
id: 36c5c6d1-deba-57c4-b4b0-a46b55d7e3cc
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0242
  Ransomware victim claim by dispossessor: tricoproducts.com; country: US; sector: Business Services
  First observed: 2020-11-25.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/54
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
