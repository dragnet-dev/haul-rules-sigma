title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0107 — Shadow Copy Deletion (maze)'
id: 84381d8b-c1a7-533e-ad09-9b71834798f3
status: experimental
description: |
  Detects shadow copy deletion commands associated with maze ransomware.
  Incident: dragnet-ransomware-2020-0107
  Ransomware victim claim by maze: Xerox Corporation; country: GB; sector: Technology
  First observed: 2020-06-25.
  Confidence: 90% (ransomware_live).
references:
  - xerox.com
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
