title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0169 — Shadow Copy Deletion (egregor)'
id: 34c94907-bf00-51f9-934d-edcc1f390291
status: deprecated
description: |
  Detects shadow copy deletion commands associated with egregor ransomware.
  Incident: dragnet-ransomware-2020-0169
  Ransomware victim claim by egregor: SN Servicing Corporation; country: US; sector: Financial Services
  First observed: 2020-10-15.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
