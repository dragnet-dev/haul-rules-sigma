title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0159 — Shadow Copy Deletion (snake)'
id: e79acd3b-bb80-528d-b8ee-9111818709de
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snake ransomware.
  Incident: dragnet-ransomware-2020-0159
  Associated with Turla.
  Ransomware victim claim by snake: Enel Argentina Edesur S.A. Buenos Aires; country: AR; sector: Energy
  First observed: 2020-06-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.turla
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
