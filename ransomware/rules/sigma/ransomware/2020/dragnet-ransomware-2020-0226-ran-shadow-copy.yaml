title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0226 — Shadow Copy Deletion (dispossessor)'
id: 62c75e69-1ecc-51cd-aad7-532e51906356
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0226
  Ransomware victim claim by dispossessor: shutterfly.com; sector: Business Services
  First observed: 2020-09-05.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/209
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
