title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0121 — Shadow Copy Deletion (egregor)'
id: 3ac432f8-a239-5286-b48d-2436690be032
status: deprecated
description: |
  Detects shadow copy deletion commands associated with egregor ransomware.
  Incident: dragnet-ransomware-2020-0121
  Ransomware victim claim by egregor: TransLink (Metro Vancouver transit system); country: CA; sector: Transportation/Logistics
  First observed: 2020-12-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
