title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0255 — Shadow Copy Deletion (snake)'
id: 9a80f59e-ff7e-56dc-881b-4f60fef76cb9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snake ransomware.
  Incident: dragnet-ransomware-2020-0255
  Associated with Turla.
  Ransomware victim claim by snake: Fresenius SE & Co.; country: DE; sector: Healthcare
  First observed: 2020-05-04.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.turla
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
