title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0231 — Shadow Copy Deletion (dispossessor)'
id: af307cd9-2ce3-540f-b0b7-e1c70dbb3366
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0231
  Ransomware victim claim by dispossessor: planethomelending.com; country: US; sector: Financial Services
  First observed: 2020-03-25.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/68
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
