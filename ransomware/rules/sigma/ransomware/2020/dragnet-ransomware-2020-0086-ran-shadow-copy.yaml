title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0086 — Shadow Copy Deletion (dispossessor)'
id: 52cf1ad7-f4e2-57e5-b5ae-0800e2ba3229
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0086
  Ransomware victim claim by dispossessor: hornbeckoffshore.com; sector: Transportation/Logistics
  First observed: 2020-07-12.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/163
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
