title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0136 — Shadow Copy Deletion (maze)'
id: 7dc6541e-6031-5d58-806b-04a262003864
status: deprecated
description: |
  Detects shadow copy deletion commands associated with maze ransomware.
  Incident: dragnet-ransomware-2020-0136
  Ransomware victim claim by maze: Ostermeir FZE (engineering firm); country: AE; sector: Manufacturing
  First observed: 2020-06-29.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
