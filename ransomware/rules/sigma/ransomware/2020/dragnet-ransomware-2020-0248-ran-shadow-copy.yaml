title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0248 — Shadow Copy Deletion (pay2key)'
id: c4d9d8ec-6ccc-5339-b3c4-5fb3a4dc6220
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pay2key ransomware.
  Incident: dragnet-ransomware-2020-0248
  Ransomware victim claim by pay2key: Habana Labs; country: IL; sector: Technology
  First observed: 2020-12-13.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
