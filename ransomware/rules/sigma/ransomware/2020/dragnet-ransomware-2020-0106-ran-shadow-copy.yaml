title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0106 — Shadow Copy Deletion (ragnarlocker)'
id: 5a9f46cc-bf5b-5b33-9d90-f30b352283f4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ragnarlocker ransomware.
  Incident: dragnet-ransomware-2020-0106
  Ransomware victim claim by ragnarlocker: New leaks from SOLTEK PACIFIC; sector: Manufacturing
  First observed: 2020-06-22.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
