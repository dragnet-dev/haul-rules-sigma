title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0219 — Shadow Copy Deletion (doppelpaymer)'
id: f8e1e817-ced5-53b9-b6b0-deb154475e4a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with doppelpaymer ransomware.
  Incident: dragnet-ransomware-2020-0219
  Ransomware victim claim by doppelpaymer: City of Florence, Alabama; country: US; sector: Public Sector
  First observed: 2020-06-05.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
