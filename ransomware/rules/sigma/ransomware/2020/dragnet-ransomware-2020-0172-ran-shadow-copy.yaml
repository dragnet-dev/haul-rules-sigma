title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0172 — Shadow Copy Deletion (ransomexx)'
id: cebe7a4c-3f03-5902-8b8b-ced49c6f9b60
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomexx ransomware.
  Incident: dragnet-ransomware-2020-0172
  Ransomware victim claim by ransomexx: IPG Photonics; country: US; sector: Manufacturing
  First observed: 2020-09-14.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
