title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0013 — Shadow Copy Deletion (doppelpaymer)'
id: 3414db03-3b89-523a-89a3-ba216ab70a92
status: deprecated
description: |
  Detects shadow copy deletion commands associated with doppelpaymer ransomware.
  Incident: dragnet-ransomware-2020-0013
  Ransomware victim claim by doppelpaymer: Boyce Technologies (device manufacturer- transit communication systems and now ventilators b/c of COVID-19); country: US; sector: Manufacturing
  First observed: 2020-08-01.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
