title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0087 — Shadow Copy Deletion (ryuk)'
id: 86b6dea6-989f-5373-988a-4fbe696579e2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ryuk ransomware.
  Incident: dragnet-ransomware-2020-0087
  Ransomware victim claim by ryuk: Sopra Steria; country: FR; sector: Technology
  First observed: 2020-10-20.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
