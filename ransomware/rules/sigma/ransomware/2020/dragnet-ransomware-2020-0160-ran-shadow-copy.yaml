title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0160 — Shadow Copy Deletion (doppelpaymer)'
id: 153b5a90-dad7-57dd-8b9d-4a5fb6f451ab
status: deprecated
description: |
  Detects shadow copy deletion commands associated with doppelpaymer ransomware.
  Incident: dragnet-ransomware-2020-0160
  Ransomware victim claim by doppelpaymer: City of Torrance (Los Angeles County); country: US; sector: Public Sector
  First observed: 2020-03-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
