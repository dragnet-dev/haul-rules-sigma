title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0265 — Shadow Copy Deletion (netwalker)'
id: 1e6e6ba2-a5b9-5de1-bb17-8b44f64182c9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with netwalker ransomware.
  Incident: dragnet-ransomware-2020-0265
  Ransomware victim claim by netwalker: KYB Corporation; country: US; sector: Manufacturing
  First observed: 2020-10-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
