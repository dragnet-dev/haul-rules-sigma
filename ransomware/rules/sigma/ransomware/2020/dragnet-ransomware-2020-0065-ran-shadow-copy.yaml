title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0065 — Shadow Copy Deletion (dispossessor)'
id: 8901c174-804f-5e97-b37a-7186e45d971c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2020-0065
  Ransomware victim claim by dispossessor: convergeone.com; country: US; sector: Technology
  First observed: 2020-10-07.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/94
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
