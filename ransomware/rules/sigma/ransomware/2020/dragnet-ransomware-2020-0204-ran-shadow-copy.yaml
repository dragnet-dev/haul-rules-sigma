title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0204 — Shadow Copy Deletion (thanos)'
id: 4a1f91ad-9cd5-5697-822a-0b8495e3a43e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with thanos ransomware.
  Incident: dragnet-ransomware-2020-0204
  Ransomware victim claim by thanos: Government-run organizations in the Middle East and North Africa; sector: Public Sector
  First observed: 2020-07-01.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
