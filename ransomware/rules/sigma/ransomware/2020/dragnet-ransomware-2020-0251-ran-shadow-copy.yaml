title: 'Dragnet [Ransomware]: dragnet-ransomware-2020-0251 — Shadow Copy Deletion (conti)'
id: 7ec7abd5-a210-52bb-964d-7710aa159116
status: deprecated
description: |
  Detects shadow copy deletion commands associated with conti ransomware.
  Incident: dragnet-ransomware-2020-0251
  Ransomware victim claim by conti: Daniel B. Hastings (Customs broker and freight forwarder) (Part of CPH Group); country: US; sector: Transportation/Logistics
  First observed: 2020-10-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
