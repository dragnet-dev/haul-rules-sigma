title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3133 — Shadow Copy Deletion (lynx)'
id: cf72f234-28d8-5103-bf8b-cb11152188f5
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3133
  Ransomware victim claim by lynx: Concut (ddm.local); country: US; sector: Business Services
  First observed: 2024-07-18.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66aa9d4ee7861ae72f224a07
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
