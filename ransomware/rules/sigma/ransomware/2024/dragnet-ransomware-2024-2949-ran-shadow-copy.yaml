title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2949 — Shadow Copy Deletion (dispossessor)'
id: 77f2b77c-9225-56ba-ac22-0d4b243363d9
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-2949
  Ransomware victim claim by dispossessor: hess.com; sector: Energy
  First observed: 2024-04-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/115
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
