title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2609 — Shadow Copy Deletion (lynx)'
id: bc85133f-1fed-580c-b660-48786500348d
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2609
  Ransomware victim claim by lynx: Interoute agency; country: GB; sector: Business Services
  First observed: 2024-10-21.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/672ad532dab69e0ba2c4b09d
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
