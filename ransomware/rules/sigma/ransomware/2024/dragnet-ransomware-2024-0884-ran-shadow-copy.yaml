title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0884 — Shadow Copy Deletion (cloak)'
id: d11a1667-083b-5c34-8b16-58d2fa7724e5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cloak ransomware.
  Incident: dragnet-ransomware-2024-0884
  Ransomware victim claim by cloak: Gascontec.com; country: DE; sector: Business Services
  First observed: 2024-03-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
