title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2643 — Shadow Copy Deletion (handala)'
id: a9ff48b1-12b3-55b6-9668-489785346253
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2643
  Ransomware victim claim by handala: Innovalve Bio Medical; sector: Healthcare
  First observed: 2024-07-15.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/innovalve-bio-medical-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
