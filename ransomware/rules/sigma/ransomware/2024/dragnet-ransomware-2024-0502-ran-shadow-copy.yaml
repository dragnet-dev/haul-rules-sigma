title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0502 — Shadow Copy Deletion (lynx)'
id: b313f486-335f-5fd9-b27f-88e92adae895
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-0502
  Ransomware victim claim by lynx: Model Die & Mold; country: US; sector: Manufacturing
  First observed: 2024-10-04.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/672a5664dab69e0ba2c3c066
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
