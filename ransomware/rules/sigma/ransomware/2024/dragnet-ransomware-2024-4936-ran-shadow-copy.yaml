description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-4936
  Ransomware victim claim by incransom: CORBETT EXTERMINATING Inc; country: US; sector: Business Services
  First observed: 2024-01-29.
