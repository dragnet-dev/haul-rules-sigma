title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0411 — Shadow Copy Deletion (ElDorado)'
id: 1467a7be-3a9f-58bd-bbf3-98c5bacbee59
status: experimental
description: |
  Detects shadow copy deletion commands associated with ElDorado ransomware.
  Incident: dragnet-ransomware-2024-0411
  Ransomware victim claim by ElDorado: www.itasnatta.edu.it; country: IT; sector: Education
  First observed: 2024-06-06.
  Confidence: 90% (ransomware_live).
references:
  - http://dataleakypypu7uwblm5kttv726l3iripago6p336xjnbstkjwrlnlid.onion/posts/www.itasnatta.edu.it/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
