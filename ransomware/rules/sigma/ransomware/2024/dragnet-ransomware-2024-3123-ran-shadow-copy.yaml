title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3123 — Shadow Copy Deletion (handala)'
id: 3c6ea2b2-df2f-5739-8045-30300a6badba
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-3123
  Ransomware victim claim by handala: SolidCAM 2024 SP0; sector: Technology
  First observed: 2024-06-17.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/solidcam-2024-sp0/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
