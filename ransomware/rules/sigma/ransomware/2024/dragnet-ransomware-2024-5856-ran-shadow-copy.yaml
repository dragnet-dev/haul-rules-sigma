status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-5856
  Ransomware victim claim by handala: BLEnergy; sector: Energy
  First observed: 2024-07-23.
  Confidence: 90% (ransomware_live).
references:
