title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0663 — Shadow Copy Deletion (dragonransomware)'
id: f842c1fa-30cb-5fef-90c2-122ce4740dfa
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-0663
  Ransomware victim claim by dragonransomware: ssfirm.com.sa; country: SA; sector: Technology
  First observed: 2024-12-06.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/425
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
