title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1904 — Shadow Copy Deletion (handala)'
id: 69431dc4-a2f2-5009-969f-05ef86fcfb17
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-1904
  Ransomware victim claim by handala: Innovalve 3TB ( $300M ); sector: Healthcare
  First observed: 2024-07-26.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/innovalve-3tb-data-leak-300m/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
