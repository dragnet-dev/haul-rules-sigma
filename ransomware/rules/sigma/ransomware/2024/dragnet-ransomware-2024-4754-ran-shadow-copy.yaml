title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4754 — Shadow Copy Deletion (dispossessor)'
id: 913d6a95-e30c-5d3e-b514-d50073d3194e
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-4754
  Ransomware victim claim by dispossessor: ventivtech.com; country: GB; sector: Healthcare
  First observed: 2024-03-15.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/101
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
