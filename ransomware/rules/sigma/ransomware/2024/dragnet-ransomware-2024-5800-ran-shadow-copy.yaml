title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5800 — Shadow Copy Deletion (lynx)'
id: cdb5405e-3b19-503b-8d61-2b0f17425990
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5800
  Ransomware victim claim by lynx: Hypertype; country: US; sector: Healthcare
  First observed: 2024-10-29.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67435265e42beed9ed2ce748
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
