title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3368 — Shadow Copy Deletion (handala)'
id: c80e2ddb-6493-5161-b300-c68950c920c7
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-3368
  Ransomware victim claim by handala: Israel Radars!; country: IL; sector: Technology
  First observed: 2024-04-13.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/israel-radars-hacked/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
