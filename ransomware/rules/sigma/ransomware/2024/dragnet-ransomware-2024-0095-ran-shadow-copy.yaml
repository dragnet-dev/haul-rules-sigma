title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0095 — Shadow Copy Deletion (handala)'
id: 8569c3ec-0b19-5d46-9178-0440469ac87d
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-0095
  Ransomware victim claim by handala: Sheba Medical Center; sector: Healthcare
  First observed: 2024-07-15.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/sheba-medical-center-hacked/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
