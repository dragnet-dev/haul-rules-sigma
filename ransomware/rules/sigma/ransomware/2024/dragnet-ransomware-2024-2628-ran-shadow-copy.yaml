title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2628 — Shadow Copy Deletion (redransomware)'
id: 6fe7b123-e1c5-55f0-839b-3c0e09150285
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redransomware ransomware.
  Incident: dragnet-ransomware-2024-2628
  Ransomware victim claim by redransomware: Bendallmednick; country: US; sector: Business Services
  First observed: 2024-03-05.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
