title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2378 — Shadow Copy Deletion (lynx)'
id: 5cfc310b-0a72-54ba-8561-5018d6093172
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2378
  Ransomware victim claim by lynx: Triverus; country: US; sector: Business Services
  First observed: 2024-09-25.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66f3c42bc8dfe0f702f8c10e
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
