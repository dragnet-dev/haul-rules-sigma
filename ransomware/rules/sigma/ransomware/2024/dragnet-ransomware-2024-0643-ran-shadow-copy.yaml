title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0643 — Shadow Copy Deletion (handala)'
id: 544aeb73-e0f7-559f-85a0-c7f834735dcc
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-0643
  Ransomware victim claim by handala: Harmony Pharm; country: IL; sector: Healthcare
  First observed: 2024-05-22.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/zionists-harmony-pharm-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
