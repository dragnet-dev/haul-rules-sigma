status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-0145
  Ransomware victim claim by medusa: Suburban Surgical Care Specialists; country: US; sector: Healthcare
  First observed: 2024-03-20.
  Confidence: 90% (ransomware_live).
references:
