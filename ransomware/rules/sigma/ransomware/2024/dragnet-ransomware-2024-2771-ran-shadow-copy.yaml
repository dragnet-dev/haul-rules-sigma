title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2771 — Shadow Copy Deletion (bluebox)'
id: f6d7bd91-adcb-552e-b466-c1306e210400
status: experimental
description: |
  Detects shadow copy deletion commands associated with bluebox ransomware.
  Incident: dragnet-ransomware-2024-2771
  Ransomware victim claim by bluebox: Westerstrand Urfabrik AB; country: SE; sector: Manufacturing
  First observed: 2024-12-02.
  Confidence: 90% (ransomware_live).
references:
  - http://zu3wfrmrkl4ltqqnpt3owp3cwa33rqwod4gpe3ttb5o4vf2is2gzm6qd.onion/2024/12/02/Westerstrand-Urfabrik-AB-Manufacturer-of-Swedish-quality-products/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
