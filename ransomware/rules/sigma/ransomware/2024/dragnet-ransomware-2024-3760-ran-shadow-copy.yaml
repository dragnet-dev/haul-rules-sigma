title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3760 — Shadow Copy Deletion (dispossessor)'
id: f147e8eb-fabd-5f84-b352-31c7fbcb69f8
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-3760
  Ransomware victim claim by dispossessor: pioneerelectronics.com; sector: Technology
  First observed: 2024-04-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/148
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
