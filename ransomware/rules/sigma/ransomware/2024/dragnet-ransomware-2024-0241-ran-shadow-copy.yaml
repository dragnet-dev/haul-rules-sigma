title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0241 — Shadow Copy Deletion (mallox)'
id: ef85bc34-4313-55b6-a438-8cd986608f66
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mallox ransomware.
  Incident: dragnet-ransomware-2024-0241
  Ransomware victim claim by mallox: speditionlangen.de; country: DE; sector: Transportation/Logistics
  First observed: 2024-04-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
