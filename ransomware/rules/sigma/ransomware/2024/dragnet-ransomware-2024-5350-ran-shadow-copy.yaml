title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5350 — Shadow Copy Deletion (handala)'
id: 6f242fac-f350-5cec-b8b3-80c65491c791
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-5350
  Ransomware victim claim by handala: My City application; sector: Technology
  First observed: 2024-06-03.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/my-city-application-hacked/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
