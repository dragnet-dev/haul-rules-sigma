title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5592 — Shadow Copy Deletion (lynx)'
id: e6a04186-1818-5b74-a2ad-0f2a8d3b1be1
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5592
  Ransomware victim claim by lynx: Precision Electrical Systems; country: US; sector: Business Services
  First observed: 2024-10-16.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67101afdcbfc63d2fb161971
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
