title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4016 — Shadow Copy Deletion (dragonransomware)'
id: 12a088e8-2412-5fa1-be84-e6b8d5249163
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-4016
  Ransomware victim claim by dragonransomware: kpr-rm.com; country: GB; sector: Manufacturing
  First observed: 2024-12-12.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/434
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
