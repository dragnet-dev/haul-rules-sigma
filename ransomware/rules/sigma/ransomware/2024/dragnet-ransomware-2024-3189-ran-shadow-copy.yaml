description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-3189
  Ransomware victim claim by dragonransomware: amlakparto.ir; country: IR; sector: Business Services
  First observed: 2024-12-16.
  Confidence: 90% (ransomware_live).
references:
