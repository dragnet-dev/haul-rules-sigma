title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5163 — Shadow Copy Deletion (lynx)'
id: df46d999-c171-53c7-a9a7-bb84acd87e51
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5163
  Ransomware victim claim by lynx: FUN-LAB; country: CA; sector: Consumer Services
  First observed: 2024-10-02.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66fdce7bcbfc63d2fbfb84b9
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
