title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4735 — Shadow Copy Deletion (incransom)'
id: 04df05eb-d30d-5956-9448-a8be9cb11d0c
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-4735
  Ransomware victim claim by incransom: Storck-Baugesellschaft mbH; country: DE; sector: Business Services
  First observed: 2024-10-04.
