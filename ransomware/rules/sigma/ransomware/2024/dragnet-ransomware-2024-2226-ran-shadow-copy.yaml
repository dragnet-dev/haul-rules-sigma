title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2226 — Shadow Copy Deletion (handala)'
id: 99fbca16-f0bb-5fa0-ab8d-7d53555d26ca
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2226
  Ransomware victim claim by handala: Kashin Distillery; country: IL; sector: Business Services
  First observed: 2024-04-30.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/zionists-kashin-distillery-hacked/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
