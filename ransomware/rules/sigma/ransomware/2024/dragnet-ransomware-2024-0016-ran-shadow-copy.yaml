title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0016 — Shadow Copy Deletion (dispossessor)'
id: 28e8d460-eb17-5e41-adfa-3c0ccc0b37fd
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-0016
  Ransomware victim claim by dispossessor: umbrellaproperties.com PART2; country: US; sector: Business Services
  First observed: 2024-05-22.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1366
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
