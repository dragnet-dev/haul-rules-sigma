title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4530 — Shadow Copy Deletion (safepay)'
id: d6b3eaac-5d08-5d46-ba5a-ef3b000865d2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2024-4530
  Ransomware victim claim by safepay: multicoasia.com; country: SG; sector: Business Services
  First observed: 2024-12-13.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
