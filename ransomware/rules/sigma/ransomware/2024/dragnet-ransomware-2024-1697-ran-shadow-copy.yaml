title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1697 — Shadow Copy Deletion (vanirgroup)'
id: 83ebaa11-49a8-5020-86a5-1c1a06c03847
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vanirgroup ransomware.
  Incident: dragnet-ransomware-2024-1697
  Ransomware victim claim by vanirgroup: Qinao; sector: Technology
  First observed: 2024-07-10.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
