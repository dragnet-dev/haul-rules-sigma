title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5244 — Shadow Copy Deletion (lynx)'
id: 6cd83bbe-312f-588d-9229-2a2f2f8b83b0
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5244
  Ransomware victim claim by lynx: Future Metals; country: US; sector: Manufacturing
  First observed: 2024-09-04.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/672c78d8dab69e0ba2c7ef49
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
