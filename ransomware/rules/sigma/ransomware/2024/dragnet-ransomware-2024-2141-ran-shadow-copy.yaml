title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2141 — Shadow Copy Deletion (akira)'
id: ce93d35f-bb15-59bd-a304-693dce625f5e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2024-2141
  Associated with Akira.
  Ransomware victim claim by akira: PCI Developments; country: CA; sector: Business Services
  First observed: 2024-06-25.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
