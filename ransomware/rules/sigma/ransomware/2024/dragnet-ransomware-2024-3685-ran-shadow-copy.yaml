title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3685 — Shadow Copy Deletion (dAn0n)'
id: 3893239d-bbc0-56ff-b451-550e5ea76c87
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dAn0n ransomware.
  Incident: dragnet-ransomware-2024-3685
  Ransomware victim claim by dAn0n: thesourcinggroup.com; country: US; sector: Business Services
  First observed: 2024-07-23.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
