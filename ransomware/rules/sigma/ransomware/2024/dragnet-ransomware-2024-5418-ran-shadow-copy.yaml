status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-5418
  Ransomware victim claim by medusa: RDS Electric; country: US; sector: Business Services
  First observed: 2024-11-20.
