title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3103 — Shadow Copy Deletion (dispossessor)'
id: 7aca705b-6f3c-5707-8004-c6e68f62e192
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-3103
  Ransomware victim claim by dispossessor: amctheatres.com; sector: Business Services
  First observed: 2024-04-06.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/128
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
