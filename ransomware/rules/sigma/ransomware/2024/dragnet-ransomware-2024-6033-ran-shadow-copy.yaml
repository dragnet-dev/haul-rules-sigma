status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-6033
  Ransomware victim claim by lynx: Cruz Marine (cruz.local); country: CA; sector: Transportation/Logistics
  First observed: 2024-08-20.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblogmx3rbiwg3rpj4nds25hjsnrwkpxt5gaznetfikz4gz2csyad.onion/leaks/66e830ebc8dfe0f702eb94e3
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
