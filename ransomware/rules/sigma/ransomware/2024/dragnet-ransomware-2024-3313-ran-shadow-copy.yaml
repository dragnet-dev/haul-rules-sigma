references:
  - http://kbsqoivihgdmwczmxkbovk7ss2dcynitwhhfu5yw725dboqo5kthfaad.onion/site/view?uuid=0f2870ec-0e96-358c-8de8-1b4083b66bb8
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
