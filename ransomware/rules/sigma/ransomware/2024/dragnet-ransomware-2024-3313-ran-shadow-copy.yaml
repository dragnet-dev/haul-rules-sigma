title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3313 — Shadow Copy Deletion (qilin)'
id: ce20a569-419b-59dc-8d77-653ce624dcf6
status: experimental
description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2024-3313
  Ransomware victim claim by qilin: Brookshire Dental - Hospitals & Clinics; country: US; sector: Healthcare
  First observed: 2024-08-26.
