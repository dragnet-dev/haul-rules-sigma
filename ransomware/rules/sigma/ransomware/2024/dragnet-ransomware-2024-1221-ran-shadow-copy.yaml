status: experimental
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2024-1221
  Ransomware victim claim by donutleaks: DOD contractors you are welcome in our chat.; country: US; sector: Public Sector
