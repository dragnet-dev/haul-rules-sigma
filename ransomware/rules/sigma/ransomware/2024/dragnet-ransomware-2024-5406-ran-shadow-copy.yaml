title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5406 — Shadow Copy Deletion (handala)'
id: f9a3122e-81b3-58e7-8503-8a032e0f34f6
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-5406
  Ransomware victim claim by handala: Appletec Ltd; country: IL; sector: Technology
  First observed: 2024-08-29.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/appletec-ltd-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
