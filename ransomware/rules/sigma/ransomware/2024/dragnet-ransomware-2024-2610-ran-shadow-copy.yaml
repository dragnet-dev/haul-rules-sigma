title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2610 — Shadow Copy Deletion (lynx)'
id: a110bf08-3eca-5862-b1d5-c9eeab63b669
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2610
  Ransomware victim claim by lynx: LmayInteroute agency; country: ES; sector: Transportation/Logistics
  First observed: 2024-10-21.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/672ad532dab69e0ba2c4b09d
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
