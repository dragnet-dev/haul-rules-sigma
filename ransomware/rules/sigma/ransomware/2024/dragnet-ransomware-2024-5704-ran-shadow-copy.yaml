status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5704
  Ransomware victim claim by lynx: Everything Breaks; country: US; sector: Business Services
  First observed: 2024-11-15.
  Confidence: 90% (ransomware_live).
references:
