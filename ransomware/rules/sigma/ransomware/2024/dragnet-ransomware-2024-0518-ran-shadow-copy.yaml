title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0518 — Shadow Copy Deletion (handala)'
id: c8a3a999-72b1-5d17-8cc9-f5196321b610
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-0518
  Ransomware victim claim by handala: Independent Education System; sector: Education
  First observed: 2024-07-01.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/independent-education-system-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
