title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3036 — Shadow Copy Deletion (dragonforce)'
id: 193be809-d8a7-5f97-a2fc-a4e3d711816b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonforce ransomware.
  Incident: dragnet-ransomware-2024-3036
  Ransomware victim claim by dragonforce: Hampden Veterinary Hospital; country: US; sector: Healthcare
  First observed: 2024-07-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
