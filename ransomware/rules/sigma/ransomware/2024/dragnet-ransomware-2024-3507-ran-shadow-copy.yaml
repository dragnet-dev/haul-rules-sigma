description: |
  Detects shadow copy deletion commands associated with sarcoma ransomware.
  Incident: dragnet-ransomware-2024-3507
  Ransomware victim claim by sarcoma: Nexus-Shinozaki; country: JP; sector: Transportation/Logistics
