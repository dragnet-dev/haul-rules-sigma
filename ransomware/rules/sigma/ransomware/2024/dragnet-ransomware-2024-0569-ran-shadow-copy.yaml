title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0569 — Shadow Copy Deletion (ElDorado)'
id: 82dacc4e-d225-5a29-a3d8-531d004a590c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ElDorado ransomware.
  Incident: dragnet-ransomware-2024-0569
  Ransomware victim claim by ElDorado: gccustommetal.com; country: US; sector: Manufacturing
  First observed: 2024-09-27.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
