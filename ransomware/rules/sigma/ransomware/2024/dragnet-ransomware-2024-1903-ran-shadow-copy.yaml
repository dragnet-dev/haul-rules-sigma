title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1903 — Shadow Copy Deletion (handala)'
id: 8218ea43-b0ed-5e0c-93ff-4381c7306c8a
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-1903
  Ransomware victim claim by handala: Innovalve 3TB Data Leak ( $300M ); sector: Technology
  First observed: 2024-07-26.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/innovalve-3tb-data-leak-300m/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
