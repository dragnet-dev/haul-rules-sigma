title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3834 — Shadow Copy Deletion (lynx)'
id: 41d88ca4-af0c-5f86-8867-f8eedfb6b288
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3834
  Ransomware victim claim by lynx: Amourgis & Associates; country: US; sector: Business Services
  First observed: 2024-12-25.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/676c2d90e42beed9edb81d34
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
