title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2887 — Shadow Copy Deletion (lynx)'
id: 0aea85db-1d3a-59f5-9b52-e7440c815fc3
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2887
  Ransomware victim claim by lynx: Goins Law; country: US; sector: Not Found
  First observed: 2024-12-12.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/675b5b8fe42beed9ed79a582
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
