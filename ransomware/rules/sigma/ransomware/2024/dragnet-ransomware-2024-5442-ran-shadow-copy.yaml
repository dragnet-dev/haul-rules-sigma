title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5442 — Shadow Copy Deletion (monti)'
id: 8e40bd1c-fa97-54ad-8d21-3c8fb4241068
status: experimental
description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2024-5442
  Ransomware victim claim by monti: Compagnia Trasporti Integrati S.R.L; country: IT; sector: Transportation/Logistics
  First observed: 2024-06-24.
  Confidence: 90% (ransomware_live).
references:
  - http://mblogci3rudehaagbryjznltdp33ojwzkq6hn2pckvjq33rycmzczpid.onion/blog/16af954b7c4174d6c5067488051d3245addb4b8e99ae1d4f9a741d59c89ab91d/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
