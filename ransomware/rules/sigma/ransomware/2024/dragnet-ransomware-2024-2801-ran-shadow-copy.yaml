title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2801 — Shadow Copy Deletion (lynx)'
id: dd114d29-84e6-5134-9fb1-653beb5d3251
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2801
  Ransomware victim claim by lynx: powelltool.com; country: US; sector: Manufacturing
  First observed: 2024-12-24.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/677c5baf05a779c3d3a2f62c
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
