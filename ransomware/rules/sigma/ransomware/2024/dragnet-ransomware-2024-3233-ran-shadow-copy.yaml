title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3233 — Shadow Copy Deletion (lynx)'
id: d5101c4f-7cc5-5b8f-8c35-32ab54419ccc
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3233
  Ransomware victim claim by lynx: CM Buck & Associates; country: IN; sector: Manufacturing
  First observed: 2024-12-11.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67596712e42beed9ed721fc3
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
