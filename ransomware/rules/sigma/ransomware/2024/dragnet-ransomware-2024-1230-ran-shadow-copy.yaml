title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1230 — Shadow Copy Deletion (lynx)'
id: cd248b14-1618-570e-9486-b3a37b0030eb
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-1230
  Ransomware victim claim by lynx: Strategic Materials; country: US; sector: Manufacturing
  First observed: 2024-11-02.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/679a06d705a779c3d339a5ea
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
