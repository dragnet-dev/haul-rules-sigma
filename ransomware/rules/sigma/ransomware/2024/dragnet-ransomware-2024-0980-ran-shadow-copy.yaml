title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0980 — Shadow Copy Deletion (datacarry)'
id: 49570ec5-cea8-513f-8c4e-8ca2a4057fa6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with datacarry ransomware.
  Incident: dragnet-ransomware-2024-0980
  Ransomware victim claim by datacarry: Balcia Insurance; country: LV; sector: Financial Services
  First observed: 2024-06-26.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
