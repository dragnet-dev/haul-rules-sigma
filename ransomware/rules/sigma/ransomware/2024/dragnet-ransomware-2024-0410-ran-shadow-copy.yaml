title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0410 — Shadow Copy Deletion (lynx)'
id: 70bccb21-afa8-5184-ab8a-a5388b8e7053
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-0410
  Ransomware victim claim by lynx: The Wendt Agency; country: US; sector: Business Services
  First observed: 2024-11-30.
  Confidence: 90% (ransomware_live).
references:
