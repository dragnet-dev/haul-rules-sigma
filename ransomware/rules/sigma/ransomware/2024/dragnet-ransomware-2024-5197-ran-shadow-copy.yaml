title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5197 — Shadow Copy Deletion (lynx)'
id: d88a2fd0-1abc-56ca-aea2-2de5ee4c5075
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5197
  Ransomware victim claim by lynx: ValueMax Group; country: SG; sector: Financial Services
  First observed: 2024-10-16.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67101909cbfc63d2fb1615d3
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
