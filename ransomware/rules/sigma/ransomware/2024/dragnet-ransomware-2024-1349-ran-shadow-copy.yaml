title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1349 — Shadow Copy Deletion (handala)'
id: 4b024a48-7525-53e2-8a5a-007f2075a6d0
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-1349
  Ransomware victim claim by handala: Elfi-Tech; sector: Healthcare
  First observed: 2024-06-05.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/zionist-elfi-tech-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
