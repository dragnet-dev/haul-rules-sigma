title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2709 — Shadow Copy Deletion (werewolves)'
id: 86562f1b-2bbe-5a70-9803-f207c970329a
status: experimental
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2024-2709
  Ransomware victim claim by werewolves: vsexshop.ru; country: RU; sector: Business Services
  First observed: 2024-03-04.
  Confidence: 90% (ransomware_live).
references:
  - https://weerwolven.biz/ru/davidsbridal-com.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
