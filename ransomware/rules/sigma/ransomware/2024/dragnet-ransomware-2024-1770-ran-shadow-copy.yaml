title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1770 — Shadow Copy Deletion (lynx)'
id: 85f6075f-de41-5f81-bb31-5b5d81eabdbd
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-1770
  Ransomware victim claim by lynx: NSK Group ROTA; country: JP; sector: Manufacturing
  First observed: 2024-09-20.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67464807e42beed9ed35e6ff
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
