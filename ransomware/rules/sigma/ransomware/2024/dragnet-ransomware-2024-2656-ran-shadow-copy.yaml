title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2656 — Shadow Copy Deletion (lynx)'
id: 3f3bdfb1-270f-5853-b622-45d6408e3365
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2656
  Ransomware victim claim by lynx: Equity & Advisory; country: AU; sector: Financial Services
  First observed: 2024-11-19.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/674ecf52e42beed9ed4c003c
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
