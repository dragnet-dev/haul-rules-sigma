title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3024 — Shadow Copy Deletion (medusa)'
id: adcd9302-1ab0-5da3-9007-759349d97c1b
status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-3024
  Ransomware victim claim by medusa: Broker Educational Sales & Training; country: US; sector: Education
