title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5008 — Shadow Copy Deletion (lynx)'
id: 6ca9bec9-2d28-5645-bd86-88a3d743e629
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5008
  Ransomware victim claim by lynx: Jim Thompson; country: TH; sector: Business Services
  First observed: 2024-12-08.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/677d94ae05a779c3d3a8cfc7
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
