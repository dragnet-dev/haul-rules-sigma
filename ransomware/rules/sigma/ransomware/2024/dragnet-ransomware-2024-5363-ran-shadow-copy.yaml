status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-5363
  Ransomware victim claim by medusa: Brodsky Renehan Pearlstein & Bouquet, Chartered; country: US; sector: Business Services
  First observed: 2024-12-05.
