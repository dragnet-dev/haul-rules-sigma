title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0541 — Shadow Copy Deletion (kairos)'
id: 86e466a2-db92-50b7-a284-245c8fe90c0d
status: experimental
description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2024-0541
  Ransomware victim claim by kairos: T&M Equipment; country: US; sector: Manufacturing
  First observed: 2024-12-06.
  Confidence: 90% (ransomware_live).
references:
  - http://nerqnacjmdy3obvevyol7qhazkwkv57dwqvye5v46k5bcujtfa6sduad.onion/detail?code=t-m-equipment-usa-64gb-
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
