title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4542 — Shadow Copy Deletion (sarcoma)'
id: dce8f0dd-d33b-54ea-87c1-d3fdc3d04c80
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sarcoma ransomware.
  Incident: dragnet-ransomware-2024-4542
  Ransomware victim claim by sarcoma: Popular Life Insurance; country: BD; sector: Financial Services
  First observed: 2024-11-14.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
