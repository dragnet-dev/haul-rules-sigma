status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2712
  Ransomware victim claim by handala: IIB ( Israeli Industrial Batteries ) Leaked; country: IL; sector: Manufacturing
  First observed: 2024-10-06.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/iib-israeli-industrial-batteries-leaked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
