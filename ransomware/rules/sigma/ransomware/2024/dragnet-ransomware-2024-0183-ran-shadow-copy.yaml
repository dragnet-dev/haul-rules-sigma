title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0183 — Shadow Copy Deletion (lynx)'
id: ae4545ba-b456-520a-8467-7b539767e50b
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-0183
  Ransomware victim claim by lynx: Sentinel Systems; country: US; sector: Technology
  First observed: 2024-12-06.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/678e340505a779c3d3fe7f1f
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
