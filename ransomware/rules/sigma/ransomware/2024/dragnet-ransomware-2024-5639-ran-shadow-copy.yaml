title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5639 — Shadow Copy Deletion (mogilevich)'
id: 8a9a02b0-7cbe-55cc-975c-82f95bbe076c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mogilevich ransomware.
  Incident: dragnet-ransomware-2024-5639
  Ransomware victim claim by mogilevich: EpicGames; country: US; sector: Technology
  First observed: 2024-02-27.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
