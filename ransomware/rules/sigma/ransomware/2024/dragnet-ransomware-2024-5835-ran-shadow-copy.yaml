title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5835 — Shadow Copy Deletion (lynx)'
id: e5a2f8ba-3c90-5dba-bb3f-4ec69bbefec7
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5835
  Ransomware victim claim by lynx: Novati Constructions; country: AU; sector: Business Services
  First observed: 2024-11-06.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/6785697705a779c3d3ce2684
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
