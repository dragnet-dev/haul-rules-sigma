title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1874 — Shadow Copy Deletion (apt73)'
id: 34c3aaa0-1eb4-51d9-aac4-24ec38d830b6
status: experimental
description: |
  Detects shadow copy deletion commands associated with apt73 ransomware.
  Incident: dragnet-ransomware-2024-1874
  Ransomware victim claim by apt73: www.trifecta.com; country: US; sector: Business Services
  First observed: 2024-04-05.
  Confidence: 90% (ransomware_live).
references:
  - http://eraleignews.com/page_company.php?id=40
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
