title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3195 — Shadow Copy Deletion (redransomware)'
id: 083f7f3f-2ea2-5d5b-a23e-46eca67e6d0c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redransomware ransomware.
  Incident: dragnet-ransomware-2024-3195
  Ransomware victim claim by redransomware: Tecnolite.com; country: MX; sector: Technology
  First observed: 2024-03-05.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
