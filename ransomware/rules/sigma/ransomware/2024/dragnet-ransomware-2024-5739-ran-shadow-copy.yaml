title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5739 — Shadow Copy Deletion (mogilevich)'
id: 898f1231-a6f0-5e96-9a56-d98455854ece
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mogilevich ransomware.
  Incident: dragnet-ransomware-2024-5739
  Ransomware victim claim by mogilevich: DJI Company; country: CN; sector: Technology
  First observed: 2024-03-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
