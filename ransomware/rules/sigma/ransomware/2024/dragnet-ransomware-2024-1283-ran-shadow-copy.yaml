description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2024-1283
  Ransomware victim claim by qilin: Shyang Shin Bao Ind. Co., Ltd. (hereinafter referred to as ''SSB''); country: TW; sector: Manufacturing
