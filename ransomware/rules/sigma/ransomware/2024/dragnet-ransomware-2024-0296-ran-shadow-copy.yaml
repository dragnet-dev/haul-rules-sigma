title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0296 — Shadow Copy Deletion (incransom)'
id: ec437769-2539-514f-acc7-29daa4858b0f
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-0296
  Ransomware victim claim by incransom: Benjamin Plumbing Inc; country: US; sector: Business Services
  First observed: 2024-01-29.
  Confidence: 90% (ransomware_live).
references:
  - http://incapt.blog/blog/leak/69C5D5E630F8C11D
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
