title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3110 — Shadow Copy Deletion (abyss)'
id: 42ba330f-d58f-565e-b6c6-db5a156b0deb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with abyss ransomware.
  Incident: dragnet-ransomware-2024-3110
  Ransomware victim claim by abyss: vidalung.ai; country: US; sector: Healthcare
  First observed: 2024-01-27.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
