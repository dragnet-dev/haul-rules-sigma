title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2697 — Shadow Copy Deletion (chort)'
id: c0cc6fb9-7db5-5dc4-ac5a-31ceb591fe6d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with chort ransomware.
  Incident: dragnet-ransomware-2024-2697
  Ransomware victim claim by chort: texanscan.org; country: US; sector: Education
  First observed: 2024-11-17.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
