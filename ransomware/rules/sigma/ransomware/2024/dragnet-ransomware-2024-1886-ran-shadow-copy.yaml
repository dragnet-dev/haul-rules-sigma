title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1886 — Shadow Copy Deletion (dispossessor)'
id: 62ba7ed9-4e7d-5884-8743-56b5a3ed9ca6
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-1886
  Ransomware victim claim by dispossessor: ducont.com; sector: Technology
  First observed: 2024-02-10.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1346
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
