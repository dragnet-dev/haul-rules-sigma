description: |
  Detects shadow copy deletion commands associated with sarcoma ransomware.
  Incident: dragnet-ransomware-2024-1570
  Ransomware victim claim by sarcoma: National Edging; country: ZA; sector: Manufacturing
  First observed: 2024-07-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
