title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3325 — Shadow Copy Deletion (incransom)'
id: 51231500-9b4f-5284-b43d-88b0dbfe248c
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-3325
  Ransomware victim claim by incransom: Human Technology Inc.; country: US; sector: Technology
  First observed: 2024-04-27.
  Confidence: 90% (ransomware_live).
references:
  - http://incapt.su/blog/leak/F43381D79D13F99E
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
