title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1366 — Shadow Copy Deletion (lynx)'
id: e6a22b1b-ebf3-5769-9a96-25cf410dc448
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-1366
  Ransomware victim claim by lynx: Pyle Group; country: CA; sector: Transportation/Logistics
  First observed: 2024-07-24.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66aa5330e7861ae72f224106
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
