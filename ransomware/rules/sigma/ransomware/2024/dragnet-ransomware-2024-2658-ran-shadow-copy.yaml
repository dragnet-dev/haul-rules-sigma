title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2658 — Shadow Copy Deletion (medusa)'
id: 81a704ce-2a62-5d0b-90a3-b2fd1cc635bf
status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-2658
  Ransomware victim claim by medusa: Sub-Zero, Wolf, and Cove; country: US; sector: Manufacturing
  First observed: 2024-09-30.
  Confidence: 90% (ransomware_live).
references:
  - http://cx5u7zxbvrfyoj6ughw76oa264ucuuizmmzypwum6ear7pct4yc723qd.onion/detail?id=75cf80be1373a723c4204236ec490f00
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
