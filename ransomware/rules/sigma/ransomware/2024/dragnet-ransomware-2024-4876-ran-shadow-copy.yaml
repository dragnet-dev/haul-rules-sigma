title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4876 — Shadow Copy Deletion (dragonforce)'
id: d5b9c5de-9c9d-532d-8b58-9b1b59aabca6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonforce ransomware.
  Incident: dragnet-ransomware-2024-4876
  Ransomware victim claim by dragonforce: Mainland Machinery; sector: Manufacturing
  First observed: 2024-07-16.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
