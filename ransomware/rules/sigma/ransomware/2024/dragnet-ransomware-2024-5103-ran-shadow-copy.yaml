description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2024-5103
  Ransomware victim claim by clop: DELPHINUS.COM; country: US; sector: Healthcare
  First observed: 2024-01-01.
  Confidence: 90% (ransomware_live).
references:
  - http://santat7kpllt6iyvqbr7q4amdv6dzrh6paatvyrzl7ry3zm72zigf4ad.onion/delphinus-com
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
