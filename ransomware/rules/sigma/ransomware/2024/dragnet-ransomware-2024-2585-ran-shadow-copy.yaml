title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2585 — Shadow Copy Deletion (0mega)'
id: 86254cd9-0624-5b70-a003-e3df6f522349
status: experimental
description: |
  Detects shadow copy deletion commands associated with 0mega ransomware.
  Incident: dragnet-ransomware-2024-2585
  Ransomware victim claim by 0mega: Four Hands LLC; country: US; sector: Business Services
  First observed: 2024-01-25.
  Confidence: 90% (ransomware_live).
references:
  - http://0mega.cc/post/6.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
