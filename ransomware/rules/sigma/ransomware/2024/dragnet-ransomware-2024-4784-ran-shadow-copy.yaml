title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4784 — Shadow Copy Deletion (dispossessor)'
id: 2655d464-7f0c-595b-8d66-b8874d6ebd04
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-4784
  Ransomware victim claim by dispossessor: notablefrontier.com; sector: Technology
  First observed: 2024-04-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/112
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
