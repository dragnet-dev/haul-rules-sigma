title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5823 — Shadow Copy Deletion (lynx)'
id: 3336ccda-044f-57bf-87a8-f4d6a44aebc8
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5823
  Ransomware victim claim by lynx: Talascend; country: US; sector: Transportation/Logistics
  First observed: 2024-11-25.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67584cfee42beed9ed6dfb29
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
