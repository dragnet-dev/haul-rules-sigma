title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4170 — Shadow Copy Deletion (lynx)'
id: 63049a41-2d6c-552c-8360-a8b14c72bac6
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-4170
  Ransomware victim claim by lynx: ITU AbsorbTech; country: US; sector: Manufacturing
  First observed: 2024-12-17.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/677c4add05a779c3d3a2b25e
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
