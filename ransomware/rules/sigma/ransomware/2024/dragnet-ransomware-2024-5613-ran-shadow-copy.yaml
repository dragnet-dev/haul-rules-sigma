title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5613 — Shadow Copy Deletion (lynx)'
id: 0266cccf-0283-5adb-9ba7-7a42ea405f4f
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5613
  Ransomware victim claim by lynx: u0 Excel Transportation; country: CA; sector: Transportation/Logistics
  First observed: 2024-12-21.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/677d03c605a779c3d3a61921
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
