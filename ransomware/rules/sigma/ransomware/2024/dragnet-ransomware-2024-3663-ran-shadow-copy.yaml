title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3663 — Shadow Copy Deletion (dispossessor)'
id: 7ad667cb-7b82-51d2-bedc-c3ad428ae9e3
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-3663
  Ransomware victim claim by dispossessor: salelytics.com; country: US; sector: Business Services
  First observed: 2024-03-28.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/59
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
