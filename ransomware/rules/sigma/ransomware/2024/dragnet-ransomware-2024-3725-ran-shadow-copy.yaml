title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3725 — Shadow Copy Deletion (akira)'
id: 314968fb-6105-5711-977a-d5cff2d45d2e
status: experimental
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2024-3725
  Associated with Akira.
  Ransomware victim claim by akira: PJ's Rebar; country: US; sector: Manufacturing
  First observed: 2024-12-28.
  Confidence: 90% (ransomware_live).
references:
  - unionstudioarch.com
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
