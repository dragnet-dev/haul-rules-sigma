title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2508 — Shadow Copy Deletion (incransom)'
id: eabbb03d-5809-51dc-a288-ff10cf0ed0c1
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2508
  Ransomware victim claim by incransom: Imperial Valley Respite (ivrespite.com); country: US; sector: Healthcare
  First observed: 2024-11-03.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/67858716038775d3788ea1b9
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
