title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3559 — Shadow Copy Deletion (lynx)'
id: 78d5f078-da05-5ae4-aaad-db26821db740
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3559
  Ransomware victim claim by lynx: SCM GROUP; country: IT; sector: Manufacturing
  First observed: 2024-11-11.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/6745a889e42beed9ed33bfc4
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
