title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4475 — Shadow Copy Deletion (lynx)'
id: d462eaf4-efeb-5018-8035-2817cf048258
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-4475
  Ransomware victim claim by lynx: TaxPros of Clermont; country: US; sector: Financial Services
  First observed: 2024-10-24.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67321fdedab69e0ba2d4cdcf
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
