title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5874 — Shadow Copy Deletion (lynx)'
id: d9355f90-18b6-5058-83ab-54e2f138b110
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5874
  Ransomware victim claim by lynx: Extra; country: BE; sector: Business Services
  First observed: 2024-11-23.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/674127fee42beed9ed26d298
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
