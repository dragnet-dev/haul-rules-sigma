status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-2331
  Ransomware victim claim by medusa: Tocci Building Corporation; country: US; sector: Business Services
  First observed: 2024-03-06.
  Confidence: 90% (ransomware_live).
references:
