title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5814 — Shadow Copy Deletion (radar)'
id: 13747d15-4b0c-5e32-8090-fcd87a0b987f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radar ransomware.
  Incident: dragnet-ransomware-2024-5814
  Ransomware victim claim by radar: Kingcan Holdings Limited , Fuzhen Group; country: CN; sector: Manufacturing
  First observed: 2024-01-22.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
