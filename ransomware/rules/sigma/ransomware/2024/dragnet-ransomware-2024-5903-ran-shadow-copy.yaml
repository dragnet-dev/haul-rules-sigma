title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5903 — Shadow Copy Deletion (lynx)'
id: 4ba2dcd7-743c-52e1-b31c-3e2149c56e52
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5903
  Ransomware victim claim by lynx: Miller Boskus Lack Architects (ad.mbl-arch.com); country: US; sector: Business Services
  First observed: 2024-07-18.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66aa9c43e7861ae72f2249be
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
