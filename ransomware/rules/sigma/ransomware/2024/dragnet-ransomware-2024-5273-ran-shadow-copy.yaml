title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5273 — Shadow Copy Deletion (incransom)'
id: 4003fe8c-d1d1-5549-a11e-212e54d4e445
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-5273
  Ransomware victim claim by incransom: CellNetix Pathology & Laboratories, LLC; country: US; sector: Healthcare
  First observed: 2024-01-08.
  Confidence: 90% (ransomware_live).
references:
  - http://incapt.blog/blog/leak/0C23D0EE595F03AD
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
