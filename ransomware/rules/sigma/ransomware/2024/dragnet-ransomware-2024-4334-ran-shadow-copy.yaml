title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4334 — Shadow Copy Deletion (dragonransomware)'
id: 09922899-25fd-5a61-b9fc-a30f9c36c52e
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-4334
  Ransomware victim claim by dragonransomware: www.zawwali.com; country: IN; sector: Business Services
  First observed: 2024-11-10.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/371
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
