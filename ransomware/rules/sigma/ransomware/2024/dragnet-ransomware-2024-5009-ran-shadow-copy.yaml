title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5009 — Shadow Copy Deletion (lynx)'
id: 8d2489d7-39d3-5a02-a8ab-2d5ac129ea07
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-5009
  Ransomware victim claim by lynx: jimthompson.com; country: TH; sector: Business Services
  First observed: 2024-12-08.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/677d94ae05a779c3d3a8cfc7
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
