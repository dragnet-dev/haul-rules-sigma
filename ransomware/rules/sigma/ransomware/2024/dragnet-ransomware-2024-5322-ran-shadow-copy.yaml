title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5322 — Shadow Copy Deletion (dispossessor)'
id: 59b13f56-1cc3-5f67-b0ee-46fd72d10bb5
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-5322
  Ransomware victim claim by dispossessor: cadencebank.com; sector: Financial Services
  First observed: 2024-04-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/228
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
