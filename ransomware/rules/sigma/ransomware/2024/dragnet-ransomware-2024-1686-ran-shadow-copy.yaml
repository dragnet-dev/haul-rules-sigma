title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1686 — Shadow Copy Deletion (lynx)'
id: 957896d1-a4ba-5d89-86af-aebb3b9c326f
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-1686
  Ransomware victim claim by lynx: Johnson Laschober & Associates; country: US; sector: Business Services
  First observed: 2024-07-23.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66aaa07be7861ae72f224ac1
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
