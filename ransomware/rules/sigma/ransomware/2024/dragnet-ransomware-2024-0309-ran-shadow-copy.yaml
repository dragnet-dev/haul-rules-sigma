title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0309 — Shadow Copy Deletion (incransom)'
id: 1fc9f322-fe3c-5f27-8714-ce828c354b0d
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-0309
  Ransomware victim claim by incransom: Acculabs Inc; country: US; sector: Healthcare
  First observed: 2024-03-16.
  Confidence: 90% (ransomware_live).
references:
  - http://incapt.su/blog/leak/DB06DACCB01C3BD8
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
