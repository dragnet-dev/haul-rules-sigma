status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-0564
  Ransomware victim claim by lynx: DSZ; country: US; sector: Technology
  First observed: 2024-10-05.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/672c7c9adab69e0ba2c7f8f3
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
