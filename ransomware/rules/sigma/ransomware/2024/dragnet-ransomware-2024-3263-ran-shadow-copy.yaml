title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3263 — Shadow Copy Deletion (lynx)'
id: 75c4cede-f265-5edf-b9e7-bbb3e82c0199
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-3263
  Ransomware victim claim by lynx: Nash Brothers Construction (nashdom.local); country: US; sector: Manufacturing
  First observed: 2024-12-10.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67856fcd05a779c3d3ce44d8
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
