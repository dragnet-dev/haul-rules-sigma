title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0459 — Shadow Copy Deletion (daixin)'
id: 785beb9b-f180-58e0-9224-867ba11b0775
status: deprecated
description: |
  Detects shadow copy deletion commands associated with daixin ransomware.
  Incident: dragnet-ransomware-2024-0459
  Ransomware victim claim by daixin: Omni Hotels & Resorts; country: US; sector: Hospitality and Tourism
  First observed: 2024-04-14.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
