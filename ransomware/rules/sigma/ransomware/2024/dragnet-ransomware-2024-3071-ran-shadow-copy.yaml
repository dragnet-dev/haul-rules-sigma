title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3071 — Shadow Copy Deletion (qilin)'
id: b3aade47-01de-5af2-8710-b336672fbd08
status: experimental
description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2024-3071
  Ransomware victim claim by qilin: www.srmedicalcenter.org; country: US; sector: Healthcare
  First observed: 2024-07-16.
  Confidence: 90% (ransomware_live).
references:
  - http://kbsqoivihgdmwczmxkbovk7ss2dcynitwhhfu5yw725dboqo5kthfaad.onion/site/view?uuid=c64d8444-5015-33d7-ad23-8d1dd170af5d
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
