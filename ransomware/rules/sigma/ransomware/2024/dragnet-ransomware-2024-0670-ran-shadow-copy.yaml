title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0670 — Shadow Copy Deletion (mogilevich)'
id: f723defc-61a8-5dad-87cc-294590212090
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mogilevich ransomware.
  Incident: dragnet-ransomware-2024-0670
  Ransomware victim claim by mogilevich: Bangladesh Police; country: BD; sector: Public Sector
  First observed: 2024-02-28.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
