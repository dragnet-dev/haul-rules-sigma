title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4731 — Shadow Copy Deletion (lynx)'
id: 33977663-8b61-58c5-8012-340e7874d846
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-4731
  Ransomware victim claim by lynx: Reef-PCG (pcg.local); country: US; sector: Hospitality and Tourism
  First observed: 2024-06-01.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/66aa6407e7861ae72f224331
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
