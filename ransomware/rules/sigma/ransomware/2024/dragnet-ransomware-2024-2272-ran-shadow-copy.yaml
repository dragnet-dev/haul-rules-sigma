title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2272 — Shadow Copy Deletion (lynx)'
id: c6552aff-434d-5a7a-8b78-a783b232afe5
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2272
  Ransomware victim claim by lynx: Delap & Waller; country: GB; sector: Business Services
  First observed: 2024-12-04.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/6785493e05a779c3d3cd81e1
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
