status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-5170
  Ransomware victim claim by medusa: US #1364 Federal Credit Union; country: US; sector: Financial Services
  First observed: 2024-03-06.
