title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3190 — Shadow Copy Deletion (dragonransomware)'
id: 1757bcdf-00eb-5bde-9697-3428ef0a240c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-3190
  Ransomware victim claim by dragonransomware: www.manahotels.in; country: IN; sector: Hospitality and Tourism
  First observed: 2024-10-30.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/356
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
