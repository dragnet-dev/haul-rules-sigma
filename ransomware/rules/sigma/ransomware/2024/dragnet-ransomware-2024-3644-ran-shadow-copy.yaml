status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-3644
  Ransomware victim claim by medusa: International University of Sarajevo; country: BA; sector: Education
  First observed: 2024-11-04.
  Confidence: 90% (ransomware_live).
references:
  - http://cx5u7zxbvrfyoj6ughw76oa264ucuuizmmzypwum6ear7pct4yc723qd.onion/detail?id=ae95e15a61f771205290b92eaee83066
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
