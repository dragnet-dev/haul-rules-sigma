title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5728 — Shadow Copy Deletion (dispossessor)'
id: 73f10b12-4a3a-57ef-9a4b-3115e93f5983
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2024-5728
  Ransomware victim claim by dispossessor: nationalflightacademy.com; country: US; sector: Education
  First observed: 2024-04-18.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1362
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
