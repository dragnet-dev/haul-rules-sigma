title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1802 — Shadow Copy Deletion (safepay)'
id: 69cf67b2-cf11-5bc0-a20a-eb89602a8575
status: deprecated
description: |
  Detects shadow copy deletion commands associated with safepay ransomware.
  Incident: dragnet-ransomware-2024-1802
  Ransomware victim claim by safepay: mdmcusa.com; country: US; sector: Business Services
  First observed: 2024-11-08.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
