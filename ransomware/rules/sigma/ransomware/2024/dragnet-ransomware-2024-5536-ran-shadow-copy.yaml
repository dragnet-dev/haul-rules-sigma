title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-5536 — Shadow Copy Deletion (incransom)'
id: 38682bb0-f598-57b1-b552-44a65841e744
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-5536
  Ransomware victim claim by incransom: Pacific American Fish Company Inc.; country: US; sector: Agriculture and Food Production
  First observed: 2024-02-10.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog7vmuq7rktic73r4ha4j757m3ptym37tyvifzp2roedyyzzxid.onion/blog/leak/71B7437601989FF0
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
