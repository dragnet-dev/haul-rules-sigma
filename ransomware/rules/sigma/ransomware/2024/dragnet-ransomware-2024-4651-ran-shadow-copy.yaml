title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4651 — Shadow Copy Deletion (dragonransomware)'
id: 6c42e3a9-c6d4-5561-ae44-bcd9d82c9d5a
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-4651
  Ransomware victim claim by dragonransomware: www.srishtisoft.com; country: IN; sector: Technology
  First observed: 2024-12-06.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/423
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
