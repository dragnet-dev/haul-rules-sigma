title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0781 — Shadow Copy Deletion (incransom)'
id: dc52edc4-e116-5579-8323-d99d9c8fd434
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-0781
  Ransomware victim claim by incransom: Schuck-Gruppe; country: DE; sector: Manufacturing
  First observed: 2024-11-23.
  Confidence: 90% (ransomware_live).
references:
  - /blog/disclosures/67420dd738e2eaa58b9e1e7d
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
