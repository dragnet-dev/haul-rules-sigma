title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1532 — Shadow Copy Deletion (abyss)'
id: 3bdb0aa6-42ee-5757-8729-56e8a2ea8fd1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with abyss ransomware.
  Incident: dragnet-ransomware-2024-1532
  Ransomware victim claim by abyss: ecbawm.com; country: JP; sector: Business Services
  First observed: 2024-09-14.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
