status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-0935
  Ransomware victim claim by incransom: Crandall ISD (CISD.crandallisd.org); country: US; sector: Education
  First observed: 2024-05-20.
