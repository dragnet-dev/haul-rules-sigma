title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3900 — Shadow Copy Deletion (dragonransomware)'
id: b8bb8569-922a-56a2-b781-72b7ba87909a
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-3900
  Ransomware victim claim by dragonransomware: stleasing.tj; country: TJ; sector: Financial Services
  First observed: 2024-12-05.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/418
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
