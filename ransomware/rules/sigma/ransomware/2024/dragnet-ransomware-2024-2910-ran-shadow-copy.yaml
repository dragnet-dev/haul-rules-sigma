description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-2910
  Ransomware victim claim by lynx: Grupo Trisan; country: CR; sector: Agriculture and Food Production
  First observed: 2024-11-15.
  Confidence: 90% (ransomware_live).
references:
