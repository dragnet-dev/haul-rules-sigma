title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1168 — Shadow Copy Deletion (medusa)'
id: 18bfe849-4820-5203-bb24-e310266cb1fa
status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-1168
  Ransomware victim claim by medusa: Fitzgerald, DePietro & Wojnas CPAs, P.C.; country: US; sector: Business Services
  First observed: 2024-06-17.
  Confidence: 90% (ransomware_live).
references:
  - http://medusaxko7jxtrojdkxo66j7ck4q5tgktf7uqsqyfry4ebnxlcbkccyd.onion/detail?id=6f4c36b2eb6f3d7a50c983ae814308b2
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
