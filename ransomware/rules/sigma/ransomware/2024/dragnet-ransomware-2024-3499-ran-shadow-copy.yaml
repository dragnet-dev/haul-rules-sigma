status: experimental
description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2024-3499
  Ransomware victim claim by qilin: Kravit, Hovel & Krawczyk SC; country: US; sector: Business Services
