title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0159 — Shadow Copy Deletion (dragonransomware)'
id: f86957a3-dd86-5c82-bdc8-d34b051d9f05
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-0159
  Ransomware victim claim by dragonransomware: w3webschools.com; country: IN; sector: Education
  First observed: 2024-11-29.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/395
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
