title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0895 — Shadow Copy Deletion (lynx)'
id: cbc163fd-021c-5b5d-95c2-67022fa6765c
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-0895
  Ransomware victim claim by lynx: Suneva Medical(sunevamedical.com); country: US; sector: Healthcare
  First observed: 2024-11-14.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67362692dab69e0ba2deae3a
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
