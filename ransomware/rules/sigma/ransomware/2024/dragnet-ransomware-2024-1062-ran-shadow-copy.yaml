title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1062 — Shadow Copy Deletion (malekteam)'
id: 1736a979-355d-5e68-9752-9abafc66cf66
status: experimental
description: |
  Detects shadow copy deletion commands associated with malekteam ransomware.
  Incident: dragnet-ransomware-2024-1062
  Ransomware victim claim by malekteam: Doctorim; country: IL; sector: Healthcare
  First observed: 2024-04-05.
  Confidence: 90% (ransomware_live).
references:
