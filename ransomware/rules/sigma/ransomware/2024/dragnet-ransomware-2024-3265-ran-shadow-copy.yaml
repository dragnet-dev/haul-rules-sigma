description: |
  Detects shadow copy deletion commands associated with fog ransomware.
  Incident: dragnet-ransomware-2024-3265
  Ransomware victim claim by fog: Waverley Christian College (wcc.vic.edu.au); country: AU; sector: Education
  First observed: 2024-12-16.
