title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3665 — Shadow Copy Deletion (dragonransomware)'
id: 61183b41-bc45-51a4-8af5-da5e05f65653
status: experimental
description: |
  Detects shadow copy deletion commands associated with dragonransomware ransomware.
  Incident: dragnet-ransomware-2024-3665
  Ransomware victim claim by dragonransomware: www.whiteleafent.net; country: IN; sector: Business Services
  First observed: 2024-12-03.
  Confidence: 90% (ransomware_live).
references:
  - https://t.me/DragonRansom/414
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
