title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3510 — Shadow Copy Deletion (8base)'
id: 7b5adb0c-41ad-5d94-80b7-1e644bdec946
status: experimental
description: |
  Detects shadow copy deletion commands associated with 8base ransomware.
  Incident: dragnet-ransomware-2024-3510
  Ransomware victim claim by 8base: Volkswagen group; country: DE; sector: Manufacturing
  First observed: 2024-09-23.
  Confidence: 90% (ransomware_live).
references:
  - http://92.118.36.204/company/7890473
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
