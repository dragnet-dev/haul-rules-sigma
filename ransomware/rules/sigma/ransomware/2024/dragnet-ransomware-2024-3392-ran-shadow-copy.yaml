title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-3392 — Shadow Copy Deletion (ciphbit)'
id: ce802380-d612-56a4-b2b1-aed4df8417b4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ciphbit ransomware.
  Incident: dragnet-ransomware-2024-3392
  Ransomware victim claim by ciphbit: Macuz; country: IT; sector: Consumer Services
  First observed: 2024-04-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
