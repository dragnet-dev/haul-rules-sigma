title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2487 — Shadow Copy Deletion (handala)'
id: c9c1d3ba-63b5-5f8a-9098-3c719100df27
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2024-2487
  Ransomware victim claim by handala: Handala’s attack on Israeli organizations; country: IL; sector: Public Sector
  First observed: 2024-07-21.
  Confidence: 90% (ransomware_live).
references:
  - https://handala.to/handalas-attack-on-israeli-organizations/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
