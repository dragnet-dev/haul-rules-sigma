title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-1004 — Shadow Copy Deletion (lynx)'
id: 1c77ae60-5d2b-5f3e-9b5e-e8b00fb708f1
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2024-1004
  Ransomware victim claim by lynx: Clutch Industries; country: AU; sector: Manufacturing
  First observed: 2024-12-15.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/678d388b05a779c3d3f9daaa
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
