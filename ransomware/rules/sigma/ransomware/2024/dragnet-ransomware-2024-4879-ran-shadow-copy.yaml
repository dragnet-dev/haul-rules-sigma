title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-4879 — Shadow Copy Deletion (dAn0n)'
id: adfb1c9a-ef82-5527-824e-47ddcaf10fe4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dAn0n ransomware.
  Incident: dragnet-ransomware-2024-4879
  Ransomware victim claim by dAn0n: fifcousa.com; country: US; sector: Consumer Services
  First observed: 2024-06-17.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
