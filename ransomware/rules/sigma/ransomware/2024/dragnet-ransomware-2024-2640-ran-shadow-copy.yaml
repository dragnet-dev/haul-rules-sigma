title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-2640 — Shadow Copy Deletion (incransom)'
id: 29bfb0ed-1091-5d13-b335-016f19201f07
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2024-2640
  Ransomware victim claim by incransom: Barrie and Community Family Health Team; country: CA; sector: Healthcare
  First observed: 2024-03-26.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog7vmuq7rktic73r4ha4j757m3ptym37tyvifzp2roedyyzzxid.onion/blog/leak/C2D961ABA87CC29B
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
