title: 'Dragnet [Ransomware]: dragnet-ransomware-2024-0230 — Shadow Copy Deletion (redransomware)'
id: 9955c46b-e391-56c3-8699-8f4fd8816c4e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redransomware ransomware.
  Incident: dragnet-ransomware-2024-0230
  Ransomware victim claim by redransomware: Sullairargentina.com; country: AG; sector: Manufacturing
  First observed: 2024-05-17.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
