status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2024-1171
  Ransomware victim claim by medusa: Down East Granite; country: US; sector: Business Services
  First observed: 2024-12-02.
  Confidence: 90% (ransomware_live).
references:
  - http://cx5u7zxbvrfyoj6ughw76oa264ucuuizmmzypwum6ear7pct4yc723qd.onion/detail?id=1bd10657f4d17e86fa423d76b9450074
