description: |
  Detects shadow copy deletion commands associated with nightspire ransomware.
  Incident: dragnet-ransomware-2026-1610
  Ransomware victim claim by nightspire: **l**a* & ***c** **n*n**** I**e*t**** *L*; sector: Financial Services
