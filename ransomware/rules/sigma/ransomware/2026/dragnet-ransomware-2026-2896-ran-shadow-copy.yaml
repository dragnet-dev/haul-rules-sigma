title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2896 — Shadow Copy Deletion (kairos)'
id: 5d837636-05b4-54de-a2d7-f621ef1a586a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2026-2896
  Ransomware victim claim by kairos: Ayuntamiento de Valdemoro; country: ES; sector: Public Sector
  First observed: 2026-05-11.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
