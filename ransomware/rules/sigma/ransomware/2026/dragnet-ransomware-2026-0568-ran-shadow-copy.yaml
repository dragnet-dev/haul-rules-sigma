title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0568 — Shadow Copy Deletion (AiLock)'
id: b07a5346-99d6-573c-a0ac-91f32b33440a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with AiLock ransomware.
  Incident: dragnet-ransomware-2026-0568
  Ransomware victim claim by AiLock: Netwerk NV; country: BE; sector: Business Services
  First observed: 2026-03-07.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
