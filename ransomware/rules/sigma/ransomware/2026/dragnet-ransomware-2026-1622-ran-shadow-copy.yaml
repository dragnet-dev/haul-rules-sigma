description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-1622
  Ransomware victim claim by handala: The General in the Shadows: Sapir’s Commander Exposed; sector: Not Found
  First observed: 2026-02-19.
