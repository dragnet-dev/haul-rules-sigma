title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0152 — Shadow Copy Deletion (handala)'
id: 4edf5d73-2fb5-5e1e-bdbd-1d27b3becfc0
status: stable
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-0152
  Ransomware victim claim by handala: Passover Wiped Clean: 22TB of Data Gone from 14 Companies; sector: Not Found
  First observed: 2026-04-02.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.tw/passover-wiped-clean-22tb-of-data-gone-from-14-zionist-companies/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
