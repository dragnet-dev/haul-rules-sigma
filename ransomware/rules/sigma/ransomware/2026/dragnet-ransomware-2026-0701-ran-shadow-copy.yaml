title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0701 — Shadow Copy Deletion (vect)'
id: 84b7fa29-3509-5b7f-91a0-6b412a3282d9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vect ransomware.
  Incident: dragnet-ransomware-2026-0701
  Ransomware victim claim by vect: Casas del Mediterraneo; country: ES; sector: Not Found
  First observed: 2026-02-28.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
