description: |
  Detects shadow copy deletion commands associated with thegentlemen ransomware.
  Incident: dragnet-ransomware-2026-0363
  Ransomware victim claim by thegentlemen: IC Partners; country: IT; sector: Business Services
  First observed: 2026-04-15.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
