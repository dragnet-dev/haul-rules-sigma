description: |
  Detects shadow copy deletion commands associated with nightspire ransomware.
  Incident: dragnet-ransomware-2026-2999
  Ransomware victim claim by nightspire: *e**l I*s***u*e f*r Clinical Research LLC; country: US; sector: Healthcare
