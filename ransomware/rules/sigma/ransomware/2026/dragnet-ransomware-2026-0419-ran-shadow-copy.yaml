title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0419 — Shadow Copy Deletion (lapsus$)'
id: b75ae085-1d19-520f-a031-266488e2fee0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lapsus$ ransomware.
  Incident: dragnet-ransomware-2026-0419
  Associated with LAPSUS$.
  Ransomware victim claim by lapsus$: Salesfloor; country: CA; sector: Technology
  First observed: 2026-03-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.lapsus
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
