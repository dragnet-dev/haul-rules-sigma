title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0512 — Shadow Copy Deletion (handala)'
id: 7003ff5d-794e-5f0e-a534-3b550bb3f5db
status: stable
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-0512
  Ransomware victim claim by handala: Lockheed Martin Employees Given 48 Hours to Respond: A Tight Deadline Looms; country: US; sector: Manufacturing
  First observed: 2026-03-26.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-team.to/lockheed-martin-employees-given-48-hours-to-respond-a-tight-deadline-looms/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
