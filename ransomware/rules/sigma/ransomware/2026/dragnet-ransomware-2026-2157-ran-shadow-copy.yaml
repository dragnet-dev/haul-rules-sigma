title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2157 — Shadow Copy Deletion (TiMc)'
id: 8d262dbf-9a26-59eb-b569-74b43b58f1a0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with TiMc ransomware.
  Incident: dragnet-ransomware-2026-2157
  Ransomware victim claim by TiMc: Debene S.A. | Página Principal; country: AR; sector: Manufacturing
  First observed: 2026-04-09.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
