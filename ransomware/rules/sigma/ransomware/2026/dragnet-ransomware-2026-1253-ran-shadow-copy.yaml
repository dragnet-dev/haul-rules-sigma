title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1253 — Shadow Copy Deletion (lapsus$)'
id: 273b68be-ca57-5a97-9cd1-4844c72af604
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lapsus$ ransomware.
  Incident: dragnet-ransomware-2026-1253
  Associated with LAPSUS$.
  Ransomware victim claim by lapsus$: Lille University; country: FR; sector: Education
  First observed: 2026-03-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.lapsus
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
