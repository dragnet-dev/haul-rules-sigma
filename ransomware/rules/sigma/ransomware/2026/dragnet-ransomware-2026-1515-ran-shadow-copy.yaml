title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1515 — Shadow Copy Deletion (killsec)'
id: 2847fe89-7cdb-51b3-8f32-f6a8bf4782c3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with killsec ransomware.
  Incident: dragnet-ransomware-2026-1515
  Ransomware victim claim by killsec: MedicalGPT; country: US; sector: Healthcare
  First observed: 2026-03-06.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
