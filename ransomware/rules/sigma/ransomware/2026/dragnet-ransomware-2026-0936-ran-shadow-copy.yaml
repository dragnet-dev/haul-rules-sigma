title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0936 — Shadow Copy Deletion (cmdorganization)'
id: bc6e60e3-fb1b-5ea9-a6c0-f06cad943b17
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cmdorganization ransomware.
  Incident: dragnet-ransomware-2026-0936
  Ransomware victim claim by cmdorganization: WholeHealth Chicago; country: US; sector: Healthcare
  First observed: 2026-05-15.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
