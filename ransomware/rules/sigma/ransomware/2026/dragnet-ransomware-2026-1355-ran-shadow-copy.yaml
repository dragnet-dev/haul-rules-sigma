description: |
  Detects shadow copy deletion commands associated with nightspire ransomware.
  Incident: dragnet-ransomware-2026-1355
  Ransomware victim claim by nightspire: C*T* M**al***g*e; sector: Manufacturing
  First observed: 2026-03-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
