title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-1512 — Shadow Copy Deletion (shinyhunters)'
id: 3f979f75-8f1f-5f3c-9f08-2769a04de416
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2026-1512
  Ransomware victim claim by shinyhunters: Mytheresa; country: DE; sector: Consumer Services
  First observed: 2026-04-11.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
