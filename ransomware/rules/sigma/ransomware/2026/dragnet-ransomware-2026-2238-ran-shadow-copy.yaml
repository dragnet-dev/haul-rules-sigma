title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2238 — Shadow Copy Deletion (benzona)'
id: 8b3c5cec-b227-5bce-9d58-3dc43377e7df
status: deprecated
description: |
  Detects shadow copy deletion commands associated with benzona ransomware.
  Incident: dragnet-ransomware-2026-2238
  Ransomware victim claim by benzona: cc***.or.*z; sector: Not Found
  First observed: 2026-01-12.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
