title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2234 — Shadow Copy Deletion (shinyhunters)'
id: 578fb261-20a7-537a-a4d9-2821895236c5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2026-2234
  Ransomware victim claim by shinyhunters: Carnival Corporation & plc (carnivalcorp.com); country: US; sector: Hospitality and Tourism
  First observed: 2026-04-18.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
