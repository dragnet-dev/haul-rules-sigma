title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-3297 — Shadow Copy Deletion (kazu)'
id: 0cd84c80-60a1-598c-a8f3-b3cf144e056a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kazu ransomware.
  Incident: dragnet-ransomware-2026-3297
  Ransomware victim claim by kazu: zHealthEHR — Practice Management Software for Chiropractic & Wellness Clinics; country: US; sector: Technology
  First observed: 2026-01-26.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
