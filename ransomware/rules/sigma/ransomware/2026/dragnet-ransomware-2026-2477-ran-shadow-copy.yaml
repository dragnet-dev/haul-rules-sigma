title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2477 — Shadow Copy Deletion (handala)'
id: fcd1d577-4845-53e2-ab92-3acc9c90963c
status: stable
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-2477
  Ransomware victim claim by handala: Full Access: Jerusalem’s Security Cameras in Handala’s Hands; sector: Public Sector
  First observed: 2026-03-09.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/full-access-jerusalems-security-cameras-in-handalas-hands/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
