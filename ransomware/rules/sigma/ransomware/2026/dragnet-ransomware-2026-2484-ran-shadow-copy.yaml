title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2484 — Shadow Copy Deletion (akira)'
id: d5c094bb-1a70-5140-8eb2-5dac5baec0c0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2026-2484
  Associated with Akira.
  Ransomware victim claim by akira: Epport Richman & Robbins, Kalamazoo Valley Community College, B&J Transportation, FR Law G...; sector: Business Services
  First observed: 2026-01-12.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
