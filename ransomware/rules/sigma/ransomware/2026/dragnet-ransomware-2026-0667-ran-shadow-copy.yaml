title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0667 — Shadow Copy Deletion (sicarii)'
id: 69e83f20-d46c-56ae-937e-e3c567ea46e5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sicarii ransomware.
  Incident: dragnet-ransomware-2026-0667
  Ransomware victim claim by sicarii: Triad Packaging; country: US; sector: Manufacturing
  First observed: 2026-01-05.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
