title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2090 — Shadow Copy Deletion (lapsus$)'
id: 471bae71-afda-5160-b5fb-ae37231abcd4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lapsus$ ransomware.
  Incident: dragnet-ransomware-2026-2090
  Associated with LAPSUS$.
  Ransomware victim claim by lapsus$: VirtaHealth; country: US; sector: Healthcare
  First observed: 2026-03-29.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.lapsus
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
