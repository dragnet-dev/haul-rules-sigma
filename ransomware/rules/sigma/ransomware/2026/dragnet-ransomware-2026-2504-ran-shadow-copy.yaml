title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2504 — Shadow Copy Deletion (Icarus)'
id: c4913c6a-548d-5fa0-9e35-530cbd7cda23
status: deprecated
description: |
  Detects shadow copy deletion commands associated with Icarus ransomware.
  Incident: dragnet-ransomware-2026-2504
  Ransomware victim claim by Icarus: Cazh.id; country: ID; sector: Financial Services
  First observed: 2026-05-05.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
