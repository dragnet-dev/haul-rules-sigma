title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2659 — Shadow Copy Deletion (kairos)'
id: d3faa67a-c046-537a-9acb-2e8a7d743c97
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2026-2659
  Ransomware victim claim by kairos: Institute of Social Security - Paraguay; country: PY; sector: Public Sector
  First observed: 2026-03-10.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
