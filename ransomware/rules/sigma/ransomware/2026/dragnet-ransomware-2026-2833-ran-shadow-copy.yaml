title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2833 — Shadow Copy Deletion (killsec)'
id: 1d588f11-b7f2-57ab-9fb0-a11404af66d1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with killsec ransomware.
  Incident: dragnet-ransomware-2026-2833
  Ransomware victim claim by killsec: primaria ungheni; country: RO; sector: Education
  First observed: 2026-02-25.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
