title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0107 — Shadow Copy Deletion (handala)'
id: 76818023-5189-5e8a-9ef1-6d65eb3bd2df
status: stable
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2026-0107
  Ransomware victim claim by handala: Unprecedented Disclosure of 50 Senior Israeli Air Force Officers’ Information; country: IL; sector: Public Sector
  First observed: 2026-03-09.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/unprecedented-disclosure-of-50-senior-israeli-air-force-officers-information/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
