title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-2760 — Shadow Copy Deletion (vect)'
id: 2f73450e-1a58-576c-b636-3852359e75ef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vect ransomware.
  Incident: dragnet-ransomware-2026-2760
  Ransomware victim claim by vect: Sus Insumos S.A.S; country: CO; sector: Agriculture and Food Production
  First observed: 2026-02-25.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
