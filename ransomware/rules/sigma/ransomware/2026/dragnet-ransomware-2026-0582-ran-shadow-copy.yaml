title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0582 — Shadow Copy Deletion (thegentlemen)'
id: 97f80fad-29e3-5a84-b99a-d23a188eab99
status: deprecated
description: |
  Detects shadow copy deletion commands associated with thegentlemen ransomware.
  Incident: dragnet-ransomware-2026-0582
  Ransomware victim claim by thegentlemen: Misr Chemical Industries; country: EG; sector: Manufacturing
  First observed: 2026-05-08.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
