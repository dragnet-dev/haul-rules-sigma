title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0972 — Shadow Copy Deletion (benzona)'
id: 325eadc5-fc08-5f56-8163-410eca07ce97
status: deprecated
description: |
  Detects shadow copy deletion commands associated with benzona ransomware.
  Incident: dragnet-ransomware-2026-0972
  Ransomware victim claim by benzona: empreinte-hotel.com; country: FR; sector: Hospitality and Tourism
  First observed: 2026-01-22.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
