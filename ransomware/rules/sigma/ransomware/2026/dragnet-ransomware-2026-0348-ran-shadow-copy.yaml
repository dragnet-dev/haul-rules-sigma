title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0348 — Shadow Copy Deletion (AiLock)'
id: a0057d84-6953-5e83-94f7-f7a51ecaf108
status: deprecated
description: |
  Detects shadow copy deletion commands associated with AiLock ransomware.
  Incident: dragnet-ransomware-2026-0348
  Ransomware victim claim by AiLock: Accretech America Inc.; country: US; sector: Manufacturing
  First observed: 2026-05-11.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
