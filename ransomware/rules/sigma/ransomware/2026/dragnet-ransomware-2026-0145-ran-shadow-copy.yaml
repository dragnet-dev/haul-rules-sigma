title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0145 — Shadow Copy Deletion (vect)'
id: c7eb3dda-daea-5244-8105-4ea038511baa
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vect ransomware.
  Incident: dragnet-ransomware-2026-0145
  Ransomware victim claim by vect: ***wire; country: US; sector: Business Services
  First observed: 2026-02-24.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
