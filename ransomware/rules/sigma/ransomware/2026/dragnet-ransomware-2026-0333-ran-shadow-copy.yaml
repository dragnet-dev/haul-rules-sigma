title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0333 — Shadow Copy Deletion (vect)'
id: a897077d-cb45-573d-929f-67b665ea5e1b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vect ransomware.
  Incident: dragnet-ransomware-2026-0333
  Ransomware victim claim by vect: Mutualista Imbabura; country: EC; sector: Financial Services
  First observed: 2026-02-13.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
