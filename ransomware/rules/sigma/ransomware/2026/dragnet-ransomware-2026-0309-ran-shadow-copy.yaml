title: 'Dragnet [Ransomware]: dragnet-ransomware-2026-0309 — Shadow Copy Deletion (akira)'
id: adaee6f0-badf-5a56-9f81-49a060a4dba7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2026-0309
  Associated with Akira.
  Ransomware victim claim by akira: Office Peeps, Nappie's Food Service, Janome America, IT-Supporten, A-1 Pools.; country: US; sector: Business Services
  First observed: 2026-03-30.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
