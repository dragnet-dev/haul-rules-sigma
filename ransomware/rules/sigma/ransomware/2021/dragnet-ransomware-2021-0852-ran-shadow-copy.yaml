title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0852 — Shadow Copy Deletion (pysa)'
id: 79f16180-2fcf-5945-95db-9c8f4d3ed0aa
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pysa ransomware.
  Incident: dragnet-ransomware-2021-0852
  Ransomware victim claim by pysa: ASE Bucuresti; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
