title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1733 — Shadow Copy Deletion (marketo)'
id: a25d2042-c1c5-5e5b-9b90-b9b9d4358b33
status: deprecated
description: |
  Detects shadow copy deletion commands associated with marketo ransomware.
  Incident: dragnet-ransomware-2021-1733
  Ransomware victim claim by marketo: Elm3 Financial Group, LLC; sector: Financial Services
  First observed: 2021-12-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
