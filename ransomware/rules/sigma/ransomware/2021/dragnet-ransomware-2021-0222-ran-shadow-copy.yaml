title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0222 — Shadow Copy Deletion (dispossessor)'
id: 829bc3c4-1409-568f-8973-b4002f186ec7
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-0222
  Ransomware victim claim by dispossessor: tjx.com; country: US; sector: Business Services
  First observed: 2021-02-21.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/29
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
