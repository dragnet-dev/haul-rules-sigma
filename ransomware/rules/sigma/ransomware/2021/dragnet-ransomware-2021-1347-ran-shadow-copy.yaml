title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1347 — Shadow Copy Deletion (dispossessor)'
id: 071fc909-03e4-5265-b668-ee177373f8bc
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-1347
  Ransomware victim claim by dispossessor: aa.com; country: US; sector: Transportation/Logistics
  First observed: 2021-11-20.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/107
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
