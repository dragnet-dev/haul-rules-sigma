title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0194 — Shadow Copy Deletion (pay2key)'
id: 7cb3ffda-7fc1-5ebf-bbc9-1a829252db2a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pay2key ransomware.
  Incident: dragnet-ransomware-2021-0194
  Ransomware victim claim by pay2key: InfiApps - Joyvoo; sector: Technology
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
