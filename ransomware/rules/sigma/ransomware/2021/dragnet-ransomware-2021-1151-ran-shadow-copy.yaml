title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1151 — Shadow Copy Deletion (everest)'
id: c6e249ea-6957-5411-8d3b-8d20dc96088d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2021-1151
  Ransomware victim claim by everest: Società Italiana degli Autori ed Editori; sector: Business Services
  First observed: 2021-10-20.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
