title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1082 — Shadow Copy Deletion (hive)'
id: 88fce176-87d9-50e6-a7fd-4c7d1d6fa9f2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hive ransomware.
  Incident: dragnet-ransomware-2021-1082
  Ransomware victim claim by hive: Aria Systems; sector: Technology
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
