title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0098 — Shadow Copy Deletion (dispossessor)'
id: 74339360-03bb-50b5-9eeb-112ddf791343
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-0098
  Ransomware victim claim by dispossessor: fisglobal.com; sector: Financial Services
  First observed: 2021-05-03.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/162
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
