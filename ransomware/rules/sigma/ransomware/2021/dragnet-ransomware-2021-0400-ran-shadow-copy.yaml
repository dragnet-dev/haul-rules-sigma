title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0400 — Shadow Copy Deletion (mosesstaff)'
id: 0579a5eb-c03b-5f39-adf8-ee62bafcf8d2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mosesstaff ransomware.
  Incident: dragnet-ransomware-2021-0400
  Ransomware victim claim by mosesstaff: First part of Epsilor data leaked; sector: Technology
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
