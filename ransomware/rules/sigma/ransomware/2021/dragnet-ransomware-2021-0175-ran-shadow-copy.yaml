title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0175 — Shadow Copy Deletion (deathkitty)'
id: feb7f4c4-d087-57e2-b1c5-e76516db4b59
status: deprecated
description: |
  Detects shadow copy deletion commands associated with deathkitty ransomware.
  Incident: dragnet-ransomware-2021-0175
  Ransomware victim claim by deathkitty: Transnet SOC Ltd; country: ZA; sector: Transportation/Logistics
  First observed: 2021-07-22.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
