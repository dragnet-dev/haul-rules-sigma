title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0743 — Shadow Copy Deletion (arvinclub)'
id: c741a120-26ae-529d-bc45-7e03f2e46536
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arvinclub ransomware.
  Incident: dragnet-ransomware-2021-0743
  Ransomware victim claim by arvinclub: UtAir; country: RU; sector: Transportation/Logistics
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
