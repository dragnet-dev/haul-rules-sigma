title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1536 — Shadow Copy Deletion (conti)'
id: 01ca10f1-1bba-53db-b104-0db25bcc4502
status: deprecated
description: |
  Detects shadow copy deletion commands associated with conti ransomware.
  Incident: dragnet-ransomware-2021-1536
  Ransomware victim claim by conti: Marans Weisz & Newman, LLC; sector: Business Services
  First observed: 2021-09-22.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
