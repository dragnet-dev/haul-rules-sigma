title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0290 — Shadow Copy Deletion (macaw)'
id: e8a1b755-ee42-52f1-977c-7af7c3ed4d1a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with macaw ransomware.
  Incident: dragnet-ransomware-2021-0290
  Ransomware victim claim by macaw: Sinclair Broadcast Group; country: US; sector: Telecommunication
  First observed: 2021-10-16.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
