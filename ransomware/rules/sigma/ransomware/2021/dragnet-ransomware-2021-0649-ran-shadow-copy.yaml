title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0649 — Shadow Copy Deletion (ragnarok)'
id: 4edb6a9f-9a10-57f2-945b-ec42216006dc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ragnarok ransomware.
  Incident: dragnet-ransomware-2021-0649
  Ransomware victim claim by ragnarok: Boggi Milano; sector: Consumer Services
  First observed: 2021-03-31.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
