title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0198 — Shadow Copy Deletion (nefilim)'
id: 1e73ad90-c189-5bc4-9335-c08b8e88b2dd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nefilim ransomware.
  Incident: dragnet-ransomware-2021-0198
  Ransomware victim claim by nefilim: Atlanta Allergy & Asthma. Part 1.; sector: Healthcare
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
