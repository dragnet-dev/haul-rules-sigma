title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1376 — Shadow Copy Deletion (avaddon)'
id: a2586666-1a26-53ef-9be2-4bab883c3414
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avaddon ransomware.
  Incident: dragnet-ransomware-2021-1376
  Ransomware victim claim by avaddon: Targetcom; sector: Telecommunication
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
