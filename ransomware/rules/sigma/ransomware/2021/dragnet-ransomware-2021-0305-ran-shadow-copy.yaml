title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0305 — Shadow Copy Deletion (blacktor)'
id: 1113cf0b-ec24-53f4-a7c4-e43b5186b609
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blacktor ransomware.
  Incident: dragnet-ransomware-2021-0305
  Ransomware victim claim by blacktor: ticketclub-it; sector: Consumer Services
  First observed: 2021-12-30.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
