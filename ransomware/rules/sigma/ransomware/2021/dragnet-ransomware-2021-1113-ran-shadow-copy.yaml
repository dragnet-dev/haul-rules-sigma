title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1113 — Shadow Copy Deletion (doppelpaymer)'
id: abcbb757-1ddc-5a56-99c2-e49edefc5e1a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with doppelpaymer ransomware.
  Incident: dragnet-ransomware-2021-1113
  Ransomware victim claim by doppelpaymer: Cuyahoga Metropolitan Housing Authority; country: US; sector: Public Sector
  First observed: 2021-02-08.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
