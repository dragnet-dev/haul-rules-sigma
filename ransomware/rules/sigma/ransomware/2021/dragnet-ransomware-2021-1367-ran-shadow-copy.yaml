title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1367 — Shadow Copy Deletion (mosesstaff)'
id: 257d4a24-6d5b-5339-ae21-6d5aa285327d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mosesstaff ransomware.
  Incident: dragnet-ransomware-2021-1367
  Ransomware victim claim by mosesstaff: V-ON; sector: Not Found
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
