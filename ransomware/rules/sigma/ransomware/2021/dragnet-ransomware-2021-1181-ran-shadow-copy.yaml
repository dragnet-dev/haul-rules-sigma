title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1181 — Shadow Copy Deletion (azroteam)'
id: a1963204-d866-59c9-83d3-c7a0a4b7f2a7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with azroteam ransomware.
  Incident: dragnet-ransomware-2021-1181
  Ransomware victim claim by azroteam: Mersen Group; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
