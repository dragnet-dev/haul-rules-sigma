title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0603 — Shadow Copy Deletion (suncrypt)'
id: e92e4b52-6a73-5301-a4c6-98dc94eb4c22
status: deprecated
description: |
  Detects shadow copy deletion commands associated with suncrypt ransomware.
  Incident: dragnet-ransomware-2021-0603
  Ransomware victim claim by suncrypt: Grushwitz; sector: Not Found
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
