title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1313 — Shadow Copy Deletion (lockbit2)'
id: 1b768693-77ea-5413-a5aa-c48d3c7d8c80
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lockbit2 ransomware.
  Incident: dragnet-ransomware-2021-1313
  Ransomware victim claim by lockbit2: hbfinanse.pl; country: PL; sector: Financial Services
  First observed: 2021-09-10.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
