title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1235 — Shadow Copy Deletion (midas)'
id: 6cd21fea-c003-5361-8764-064a49dccdab
status: deprecated
description: |
  Detects shadow copy deletion commands associated with midas ransomware.
  Incident: dragnet-ransomware-2021-1235
  Ransomware victim claim by midas: Dongguan IMR Technology Co., Ltd; sector: Technology
  First observed: 2021-11-29.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
