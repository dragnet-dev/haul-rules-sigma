title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0681 — Shadow Copy Deletion (grief)'
id: d9a9e1e7-d894-5840-933a-f7f17b56ecaf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with grief ransomware.
  Incident: dragnet-ransomware-2021-0681
  Ransomware victim claim by grief: Lancaster Independent School District; country: US; sector: Education
  First observed: 2021-06-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
