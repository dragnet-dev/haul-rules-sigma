title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1766 — Shadow Copy Deletion (conti)'
id: ef527826-5246-5c65-89e4-cd5ebf3d40e5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with conti ransomware.
  Incident: dragnet-ransomware-2021-1766
  Ransomware victim claim by conti: Schimberg Co.; sector: Manufacturing
  First observed: 2021-10-23.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
