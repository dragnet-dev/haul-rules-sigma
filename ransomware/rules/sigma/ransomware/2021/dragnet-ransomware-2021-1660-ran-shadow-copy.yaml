title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1660 — Shadow Copy Deletion (dispossessor)'
id: d1e549e8-9020-54d2-918f-cd9ff869bc49
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-1660
  Ransomware victim claim by dispossessor: grace.com; sector: Manufacturing
  First observed: 2021-08-04.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/113
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
