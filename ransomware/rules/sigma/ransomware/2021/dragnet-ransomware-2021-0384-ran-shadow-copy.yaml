description: |
  Detects shadow copy deletion commands associated with quantum ransomware.
  Incident: dragnet-ransomware-2021-0384
  Ransomware victim claim by quantum: The Jewelry Exchange is the Nations #1 Diamond Store.; sector: Consumer Services
