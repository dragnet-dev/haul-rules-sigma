title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1549 — Shadow Copy Deletion (arvinclub)'
id: c6d6bf0f-f520-5707-b039-505405c7a0ef
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arvinclub ransomware.
  Incident: dragnet-ransomware-2021-1549
  Ransomware victim claim by arvinclub: vidisha.kvs.ac.in; country: IN; sector: Education
  First observed: 2021-10-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
