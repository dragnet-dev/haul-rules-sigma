title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0768 — Shadow Copy Deletion (rook)'
id: b5606492-af8e-52aa-bbe7-f169094dbc7f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rook ransomware.
  Incident: dragnet-ransomware-2021-0768
  Ransomware victim claim by rook: Rosendahl Design Group; sector: Consumer Services
  First observed: 2021-12-14.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
