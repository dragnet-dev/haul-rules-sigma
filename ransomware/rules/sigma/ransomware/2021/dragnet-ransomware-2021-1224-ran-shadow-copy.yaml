title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1224 — Shadow Copy Deletion (cring)'
id: 0c5a22fd-99ca-5869-8361-d8317433a2ba
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cring ransomware.
  Incident: dragnet-ransomware-2021-1224
  Ransomware victim claim by cring: Unnamed manufacturing facilities; country: IT; sector: Manufacturing
  First observed: 2021-01-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
