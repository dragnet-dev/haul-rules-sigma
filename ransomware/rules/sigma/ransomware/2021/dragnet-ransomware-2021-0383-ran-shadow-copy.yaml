title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0383 — Shadow Copy Deletion (darkside)'
id: b2a8b211-2df2-5401-a5ca-992246830c81
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkside ransomware.
  Incident: dragnet-ransomware-2021-0383
  Ransomware victim claim by darkside: Toshiba Tec Group; sector: Manufacturing
  First observed: 2021-05-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
