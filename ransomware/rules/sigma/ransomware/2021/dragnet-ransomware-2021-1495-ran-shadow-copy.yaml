title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1495 — Shadow Copy Deletion (nefilim)'
id: e04960e2-9b38-581a-a1a2-d7e36e497e79
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nefilim ransomware.
  Incident: dragnet-ransomware-2021-1495
  Ransomware victim claim by nefilim: Saipa Press. Part 1.; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
