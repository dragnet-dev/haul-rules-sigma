title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0485 — Shadow Copy Deletion (mountlocker)'
id: d0927c33-3b3d-5b65-a74d-f80b6bb00bb7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mountlocker ransomware.
  Incident: dragnet-ransomware-2021-0485
  Ransomware victim claim by mountlocker: Gunnebo AB; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
