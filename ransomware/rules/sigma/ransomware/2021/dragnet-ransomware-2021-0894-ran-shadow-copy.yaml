title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0894 — Shadow Copy Deletion (payloadbin)'
id: 14313113-0902-5677-a508-d4b8f817d57e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payloadbin ransomware.
  Incident: dragnet-ransomware-2021-0894
  Ransomware victim claim by payloadbin: Victrongroup.com; country: VN; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
