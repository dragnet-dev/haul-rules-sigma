description: |
  Detects shadow copy deletion commands associated with groove ransomware.
  Incident: dragnet-ransomware-2021-0405
  Ransomware victim claim by groove: Мысли о смысле; sector: Not Found
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
