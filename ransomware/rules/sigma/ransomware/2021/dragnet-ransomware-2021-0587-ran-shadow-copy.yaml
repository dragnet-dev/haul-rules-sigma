title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0587 — Shadow Copy Deletion (zeppelin)'
id: bc2d5ff0-d3a0-511f-86fe-8a27e64c4c9d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with zeppelin ransomware.
  Incident: dragnet-ransomware-2021-0587
  Ransomware victim claim by zeppelin: Waikato District Health; country: NZ; sector: Healthcare
  First observed: 2021-05-19.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
