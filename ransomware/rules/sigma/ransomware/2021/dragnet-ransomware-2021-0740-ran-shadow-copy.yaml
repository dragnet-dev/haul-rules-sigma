title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0740 — Shadow Copy Deletion (dispossessor)'
id: 024072ff-20cd-5d4d-b645-238c71745dee
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-0740
  Ransomware victim claim by dispossessor: ricohacumen.com; sector: Technology
  First observed: 2021-08-13.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/217
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
