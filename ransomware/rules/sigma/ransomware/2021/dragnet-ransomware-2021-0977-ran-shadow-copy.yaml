title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0977 — Shadow Copy Deletion (darkleakmarket)'
id: a5131451-e46c-59b8-8937-48b479001f0b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkleakmarket ransomware.
  Incident: dragnet-ransomware-2021-0977
  Ransomware victim claim by darkleakmarket: Dominos India Database Leak; sector: Consumer Services
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
