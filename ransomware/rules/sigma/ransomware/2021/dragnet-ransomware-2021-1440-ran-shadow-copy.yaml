description: |
  Detects shadow copy deletion commands associated with conti ransomware.
  Incident: dragnet-ransomware-2021-1440
  Ransomware victim claim by conti: Epple Druckfarben; sector: Manufacturing
  First observed: 2021-11-29.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
