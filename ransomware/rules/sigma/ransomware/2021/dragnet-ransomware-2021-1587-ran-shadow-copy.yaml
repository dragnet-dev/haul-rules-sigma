title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1587 — Shadow Copy Deletion (lockbit)'
id: 29069955-287c-5166-b999-3ab8d9e7ad63
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lockbit ransomware.
  Incident: dragnet-ransomware-2021-1587
  Ransomware victim claim by lockbit: Bangkok Airways; country: TH; sector: Transportation/Logistics
  First observed: 2021-08-23.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
