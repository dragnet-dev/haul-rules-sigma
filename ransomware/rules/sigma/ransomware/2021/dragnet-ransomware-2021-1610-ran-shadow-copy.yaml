title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1610 — Shadow Copy Deletion (dispossessor)'
id: edf8e837-f726-577f-b879-c0f7e2ba40d1
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-1610
  Ransomware victim claim by dispossessor: cytomx.com; sector: Healthcare
  First observed: 2021-12-15.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/130
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
