title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1408 — Shadow Copy Deletion (snatch)'
id: 7c9562df-8754-5539-8fca-5c5fbdb736d0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2021-1408
  Ransomware victim claim by snatch: Volvo Car Corporation; country: SE; sector: Manufacturing
  First observed: 2021-11-30.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
