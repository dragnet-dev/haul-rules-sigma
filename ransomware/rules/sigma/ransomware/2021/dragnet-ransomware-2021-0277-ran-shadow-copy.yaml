title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0277 — Shadow Copy Deletion (phoenixcryptolocker)'
id: 1915893b-b0d0-5b93-8d92-acdffaaa11bc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with phoenixcryptolocker ransomware.
  Incident: dragnet-ransomware-2021-0277
  Ransomware victim claim by phoenixcryptolocker: CNA Financial (Insurance Giant); country: US; sector: Financial Services
  First observed: 2021-03-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
