title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0823 — Shadow Copy Deletion (quantum)'
id: 27efee37-b4fd-5272-a02f-ebf52a3767a0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with quantum ransomware.
  Incident: dragnet-ransomware-2021-0823
  Ransomware victim claim by quantum: Chattanooga Chamber of Commerce; sector: Public Sector
  First observed: 2021-12-31.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
