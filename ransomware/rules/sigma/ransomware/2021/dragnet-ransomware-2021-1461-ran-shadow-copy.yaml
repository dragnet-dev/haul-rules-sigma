title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1461 — Shadow Copy Deletion (karma)'
id: b3466aa0-1452-5257-8149-1a1545560091
status: deprecated
description: |
  Detects shadow copy deletion commands associated with karma ransomware.
  Incident: dragnet-ransomware-2021-1461
  Associated with VOID MANTICORE.
  Ransomware victim claim by karma: The next leak will be of a multi billion dollar cosmetics and fragrance company.; sector: Consumer Services
  First observed: 2021-10-04.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.void-manticore
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
