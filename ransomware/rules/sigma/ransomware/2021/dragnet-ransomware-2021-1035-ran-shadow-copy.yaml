title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1035 — Shadow Copy Deletion (dispossessor)'
id: 5f351b5d-c4aa-5f74-be08-d57dd9c3f164
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-1035
  Ransomware victim claim by dispossessor: wolterskluwer.com; sector: Business Services
  First observed: 2021-01-08.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/153
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
