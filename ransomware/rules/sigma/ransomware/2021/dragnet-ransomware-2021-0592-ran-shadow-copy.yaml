title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0592 — Shadow Copy Deletion (blackshadow)'
id: be2b1a7c-9e32-501b-a863-095f5f6d32a8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackshadow ransomware.
  Incident: dragnet-ransomware-2021-0592
  Associated with Agrius.
  Ransomware victim claim by blackshadow: Shirbit Insurance Company; sector: Financial Services
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.agrius
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
