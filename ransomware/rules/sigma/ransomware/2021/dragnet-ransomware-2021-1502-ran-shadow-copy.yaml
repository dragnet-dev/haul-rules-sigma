title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1502 — Shadow Copy Deletion (dispossessor)'
id: f9a2a131-a4d7-507c-8fb1-2138ac7ef1b1
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-1502
  Ransomware victim claim by dispossessor: powerfi.org; sector: Energy
  First observed: 2021-08-26.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/202
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
