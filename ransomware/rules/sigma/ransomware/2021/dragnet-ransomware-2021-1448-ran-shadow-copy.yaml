title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1448 — Shadow Copy Deletion (lorenz)'
id: c10164f5-dde2-5458-b646-f632ddef63fa
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lorenz ransomware.
  Incident: dragnet-ransomware-2021-1448
  Ransomware victim claim by lorenz: Buchanan Hauling & Rigging; sector: Transportation/Logistics
  First observed: 2021-06-24.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
