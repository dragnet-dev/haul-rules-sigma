title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1274 — Shadow Copy Deletion (sabbath)'
id: d4e138be-5f9b-551d-92e9-876e878b7204
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sabbath ransomware.
  Incident: dragnet-ransomware-2021-1274
  Ransomware victim claim by sabbath: Social Enterprise (SEC); sector: Business Services
  First observed: 2021-12-12.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
