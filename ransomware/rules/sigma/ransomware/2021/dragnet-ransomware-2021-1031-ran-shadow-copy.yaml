title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1031 — Shadow Copy Deletion (atomsilo)'
id: eb2a8dbd-a23f-536c-85db-28b93cde9bc0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with atomsilo ransomware.
  Incident: dragnet-ransomware-2021-1031
  Ransomware victim claim by atomsilo: LIGHT CONVERSION; sector: Manufacturing
  First observed: 2021-12-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
