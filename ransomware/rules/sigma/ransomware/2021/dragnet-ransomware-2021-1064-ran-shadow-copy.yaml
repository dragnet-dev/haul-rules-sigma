title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1064 — Shadow Copy Deletion (blackmatter)'
id: 43cd9e87-c8c2-5a2b-ab92-a61a47d240d3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackmatter ransomware.
  Incident: dragnet-ransomware-2021-1064
  Ransomware victim claim by blackmatter: ZKTeco USA; sector: Technology
  First observed: 2021-10-04.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
