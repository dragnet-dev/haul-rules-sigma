title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1738 — Shadow Copy Deletion (pay2key)'
id: cb20b74f-fe55-5d22-859a-088c6cfae741
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pay2key ransomware.
  Incident: dragnet-ransomware-2021-1738
  Ransomware victim claim by pay2key: MT-LAW [Markman&Tomashin Law Firm]; sector: Business Services
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
