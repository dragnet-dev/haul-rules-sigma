title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1280 — Shadow Copy Deletion (xinglocker)'
id: afe2a794-e97d-5d55-bb64-b09fb5c925d1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with xinglocker ransomware.
  Incident: dragnet-ransomware-2021-1280
  Ransomware victim claim by xinglocker: Bridgelux, Inc.; sector: Technology
  First observed: 2021-05-06.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
