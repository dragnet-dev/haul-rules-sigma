title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1416 — Shadow Copy Deletion (dispossessor)'
id: 0b259b06-bd13-553f-8688-6fa8ef9560f7
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2021-1416
  Ransomware victim claim by dispossessor: brault.us; country: US; sector: Healthcare
  First observed: 2021-06-07.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/204
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
