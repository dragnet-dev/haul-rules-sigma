title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1121 — Shadow Copy Deletion (astroteam)'
id: 0e9e7289-b27e-515c-815d-d645cdd94b82
status: deprecated
description: |
  Detects shadow copy deletion commands associated with astroteam ransomware.
  Incident: dragnet-ransomware-2021-1121
  Ransomware victim claim by astroteam: Hoya Vision Care US/Optical Labs; country: US; sector: Manufacturing
  First observed: 2021-04-05.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
