title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0876 — Shadow Copy Deletion (rook)'
id: 18baaf78-e2ab-5831-a339-a3c92a8ae875
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rook ransomware.
  Incident: dragnet-ransomware-2021-0876
  Ransomware victim claim by rook: KMG Prestige, Inc. (Data will be given tomorrow); sector: Energy
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
