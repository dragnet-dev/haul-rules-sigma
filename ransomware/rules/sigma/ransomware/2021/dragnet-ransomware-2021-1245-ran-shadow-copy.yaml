title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1245 — Shadow Copy Deletion (lockdata)'
id: d582b117-8770-571a-a944-48cedca33352
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lockdata ransomware.
  Incident: dragnet-ransomware-2021-1245
  Ransomware victim claim by lockdata: [CHINA] TCL China Star Optoelectronics Technology Co., Ltd; sector: Technology
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
