title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1436 — Shadow Copy Deletion (marketo)'
id: 066a2154-9022-566a-b6a4-8c365fc3bc83
status: deprecated
description: |
  Detects shadow copy deletion commands associated with marketo ransomware.
  Incident: dragnet-ransomware-2021-1436
  Ransomware victim claim by marketo: GigaTribe; sector: Technology
  First observed: 2021-12-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
