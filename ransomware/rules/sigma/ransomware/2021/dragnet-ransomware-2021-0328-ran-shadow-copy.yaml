title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0328 — Shadow Copy Deletion (spook)'
id: 5e3ed4da-9309-5154-a640-954736c89674
status: deprecated
description: |
  Detects shadow copy deletion commands associated with spook ransomware.
  Incident: dragnet-ransomware-2021-0328
  Ransomware victim claim by spook: Paris Society; sector: Hospitality and Tourism
  First observed: 2021-10-12.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
