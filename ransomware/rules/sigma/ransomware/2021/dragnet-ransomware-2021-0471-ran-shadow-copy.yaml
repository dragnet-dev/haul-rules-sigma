title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0471 — Shadow Copy Deletion (ransomexx)'
id: 91222434-2d4b-5626-bd18-da54f1f996be
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomexx ransomware.
  Incident: dragnet-ransomware-2021-0471
  Ransomware victim claim by ransomexx: Soluzioni Infrastrutturali Telefoniche ed Elettriche S.p.A.; sector: Telecommunication
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
