title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0662 — Shadow Copy Deletion (ransomexx)'
id: ba680e8b-c0a1-5e58-81b4-194756e31644
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomexx ransomware.
  Incident: dragnet-ransomware-2021-0662
  Ransomware victim claim by ransomexx: Lazio Region in Italy; country: IT; sector: Public Sector
  First observed: 2021-07-31.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
