title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0178 — Shadow Copy Deletion (azroteam)'
id: 43394d8d-ca6a-5a08-b20a-8a378cc3a338
status: deprecated
description: |
  Detects shadow copy deletion commands associated with azroteam ransomware.
  Incident: dragnet-ransomware-2021-0178
  Ransomware victim claim by azroteam: Laboratorios SMA S.A.C.; sector: Agriculture and Food Production
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
