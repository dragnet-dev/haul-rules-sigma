title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1786 — Shadow Copy Deletion (groove)'
id: c8d7c16f-fc86-5b48-938d-446f0e0b3a4d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with groove ransomware.
  Incident: dragnet-ransomware-2021-1786
  Ransomware victim claim by groove: therecord.media 30k USD; sector: Not Found
  First observed: 2021-10-23.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
