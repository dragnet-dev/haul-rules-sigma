title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0663 — Shadow Copy Deletion (avoslocker)'
id: 7cf1e9ba-90cf-5c54-8fc7-b0d01f466910
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avoslocker ransomware.
  Incident: dragnet-ransomware-2021-0663
  Ransomware victim claim by avoslocker: Unified Technologies; sector: Technology
  First observed: 2021-09-25.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
