title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0770 — Shadow Copy Deletion (maui)'
id: d125cccc-97c5-597b-b14e-57f4751db081
status: deprecated
description: |
  Detects shadow copy deletion commands associated with maui ransomware.
  Incident: dragnet-ransomware-2021-0770
  Ransomware victim claim by maui: Unnamed medical facilities (12); country: US; sector: Healthcare
  First observed: 2021-05-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
