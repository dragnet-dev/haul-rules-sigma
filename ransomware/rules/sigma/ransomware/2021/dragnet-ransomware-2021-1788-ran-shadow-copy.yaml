title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1788 — Shadow Copy Deletion (egregor)'
id: 9028d28d-386f-51f4-a413-79be7b354cb0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with egregor ransomware.
  Incident: dragnet-ransomware-2021-1788
  Ransomware victim claim by egregor: Center Hospitalier de Dax-Côte d’Argent; country: FR; sector: Healthcare
  First observed: 2021-02-08.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
