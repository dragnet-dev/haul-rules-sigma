title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1106 — Shadow Copy Deletion (blackmatter)'
id: 351894a2-8c13-5f63-81d0-05c17fa807f8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackmatter ransomware.
  Incident: dragnet-ransomware-2021-1106
  Ransomware victim claim by blackmatter: Citrocasa GmbH; sector: Agriculture and Food Production
  First observed: 2021-09-20.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
