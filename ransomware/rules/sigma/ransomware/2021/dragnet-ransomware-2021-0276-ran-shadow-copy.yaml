title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0276 — Shadow Copy Deletion (avaddon)'
id: 38e2959f-5c0f-5556-ab86-78cf730416db
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avaddon ransomware.
  Incident: dragnet-ransomware-2021-0276
  Ransomware victim claim by avaddon: EROWA LTD; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
