title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0187 — Shadow Copy Deletion (xinglocker)'
id: 86943839-8878-5ddc-b45c-be594dbb6a84
status: deprecated
description: |
  Detects shadow copy deletion commands associated with xinglocker ransomware.
  Incident: dragnet-ransomware-2021-0187
  Ransomware victim claim by xinglocker: Positive Promotions, Inc.; sector: Business Services
  First observed: 2021-06-02.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
