title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0239 — Shadow Copy Deletion (rook)'
id: e60e47fd-39f7-51ae-968b-ed84f4ea3f4c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rook ransomware.
  Incident: dragnet-ransomware-2021-0239
  Ransomware victim claim by rook: Data breach summary; sector: Not Found
  First observed: 2021-12-26.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
