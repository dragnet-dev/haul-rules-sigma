title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0870 — Shadow Copy Deletion (pay2key)'
id: 38440e48-d750-5d09-b02c-9820edf06113
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pay2key ransomware.
  Incident: dragnet-ransomware-2021-0870
  Ransomware victim claim by pay2key: IAI - Israel Aerospace Industries; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
