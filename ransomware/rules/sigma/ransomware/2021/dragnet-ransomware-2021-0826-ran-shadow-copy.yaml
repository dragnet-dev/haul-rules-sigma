title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-0826 — Shadow Copy Deletion (nefilim)'
id: 21098bb6-fd1a-5884-8df4-56fd9496cc3a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nefilim ransomware.
  Incident: dragnet-ransomware-2021-0826
  Ransomware victim claim by nefilim: Elliott Group / Cascade Engineering / Unitex Textile Rental Services. Teaser.; sector: Manufacturing
  First observed: 2021-09-09.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
