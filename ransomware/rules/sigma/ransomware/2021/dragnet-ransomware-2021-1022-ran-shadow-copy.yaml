title: 'Dragnet [Ransomware]: dragnet-ransomware-2021-1022 — Shadow Copy Deletion (mosesstaff)'
id: 6b9d0cca-4c3b-5a66-8b9f-0bf9a8140aed
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mosesstaff ransomware.
  Incident: dragnet-ransomware-2021-1022
  Ransomware victim claim by mosesstaff: DOSIK Technology; sector: Technology
  First observed: 2021-12-18.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
