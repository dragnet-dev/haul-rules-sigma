title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0540 — Shadow Copy Deletion (suncrypt)'
id: c3aa47d5-5f2f-5364-a9f8-aa786c06a3a7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with suncrypt ransomware.
  Incident: dragnet-ransomware-2022-0540
  Ransomware victim claim by suncrypt: CENTRAL BAPTIST COLLEGE; sector: Education
  First observed: 2022-02-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
