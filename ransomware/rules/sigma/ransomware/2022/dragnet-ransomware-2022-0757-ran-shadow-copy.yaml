title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0757 — Shadow Copy Deletion (projectrelic)'
id: 670e689d-54b7-5a50-a874-842f44434552
status: deprecated
description: |
  Detects shadow copy deletion commands associated with projectrelic ransomware.
  Incident: dragnet-ransomware-2022-0757
  Ransomware victim claim by projectrelic: Doctors Center Hospital; sector: Healthcare
  First observed: 2022-12-18.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
