title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1195 — Shadow Copy Deletion (everest)'
id: e6fb40bd-b3bc-5098-98a9-a0a52a139cc9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2022-1195
  Ransomware victim claim by everest: SPERONI S.P.A / Data Lamborghini, Ferrari, Fiat Group, VAG, Brembo; sector: Manufacturing
  First observed: 2022-10-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
