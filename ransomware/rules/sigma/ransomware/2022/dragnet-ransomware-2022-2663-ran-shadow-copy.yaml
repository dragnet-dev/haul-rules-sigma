title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2663 — Shadow Copy Deletion (payloadbin)'
id: 0319e757-d27b-51ca-b05b-47990e326b9d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payloadbin ransomware.
  Incident: dragnet-ransomware-2022-2663
  Ransomware victim claim by payloadbin: Serenity Homes SWFL; sector: Construction
  First observed: 2022-01-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
