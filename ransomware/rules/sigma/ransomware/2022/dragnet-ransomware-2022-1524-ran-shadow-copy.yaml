title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1524 — Shadow Copy Deletion (vicesociety)'
id: 208d5d27-748b-5127-9337-002c78bfee2b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vicesociety ransomware.
  Incident: dragnet-ransomware-2022-1524
  Ransomware victim claim by vicesociety: Pate's Grammar School; sector: Education
  First observed: 2022-10-23.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
