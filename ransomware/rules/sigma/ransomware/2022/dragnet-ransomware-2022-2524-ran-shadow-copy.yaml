title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2524 — Shadow Copy Deletion (shaoleaks)'
id: 2130f7d5-0615-5d6f-b01d-019627ce6eac
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shaoleaks ransomware.
  Incident: dragnet-ransomware-2022-2524
  Ransomware victim claim by shaoleaks: Welcome to new customers!; sector: Not Found
  First observed: 2022-11-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
