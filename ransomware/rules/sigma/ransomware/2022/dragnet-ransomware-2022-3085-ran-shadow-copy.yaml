title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3085 — Shadow Copy Deletion (mindware)'
id: b3efa19b-4a08-57cd-b4e3-c0e3c3748569
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mindware ransomware.
  Incident: dragnet-ransomware-2022-3085
  Ransomware victim claim by mindware: allwell; sector: Healthcare
  First observed: 2022-05-05.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
