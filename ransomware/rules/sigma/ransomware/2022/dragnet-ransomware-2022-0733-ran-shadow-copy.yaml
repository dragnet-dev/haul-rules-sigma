title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0733 — Shadow Copy Deletion (suncrypt)'
id: e1640b19-b11a-5504-8113-1fd7f20d5940
status: deprecated
description: |
  Detects shadow copy deletion commands associated with suncrypt ransomware.
  Incident: dragnet-ransomware-2022-0733
  Ransomware victim claim by suncrypt: KVK Tech | Specialty Brands and Generics; sector: Technology
  First observed: 2022-02-15.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
