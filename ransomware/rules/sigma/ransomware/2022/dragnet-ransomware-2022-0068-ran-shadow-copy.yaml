status: experimental
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2022-0068
  Ransomware victim claim by alphv: CONFORAMA - HACKED AND MORE THEN 1TB DATA LEAKED!; country: FR; sector: Consumer Services
  First observed: 2022-11-06.
