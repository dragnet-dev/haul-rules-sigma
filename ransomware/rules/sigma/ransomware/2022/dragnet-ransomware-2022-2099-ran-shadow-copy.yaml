title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2099 — Shadow Copy Deletion (sparta)'
id: 6ca4ebcc-8c6d-5d57-94d7-4ee3af1a040e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sparta ransomware.
  Incident: dragnet-ransomware-2022-2099
  Ransomware victim claim by sparta: GRUPO COPISA; sector: Manufacturing
  First observed: 2022-09-22.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
