description: |
  Detects shadow copy deletion commands associated with quantum ransomware.
  Incident: dragnet-ransomware-2022-1549
  Ransomware victim claim by quantum: Camden City School District; country: US; sector: Education
  First observed: 2022-04-20.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
