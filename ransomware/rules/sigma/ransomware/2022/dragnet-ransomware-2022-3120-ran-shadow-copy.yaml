title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3120 — Shadow Copy Deletion (bianlian)'
id: a33903b3-3a49-5ead-838a-eb4ee52f9b7a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with bianlian ransomware.
  Incident: dragnet-ransomware-2022-3120
  Ransomware victim claim by bianlian: Myton School; sector: Education
  First observed: 2022-11-24.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
