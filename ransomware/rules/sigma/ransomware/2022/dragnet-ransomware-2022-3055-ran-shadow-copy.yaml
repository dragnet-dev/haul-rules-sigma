title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3055 — Shadow Copy Deletion (midas)'
id: 58cc7628-13e0-5f3c-b5d7-2b8fcba81207
status: deprecated
description: |
  Detects shadow copy deletion commands associated with midas ransomware.
  Incident: dragnet-ransomware-2022-3055
  Ransomware victim claim by midas: Basra Multipurposr Terminal; sector: Transportation/Logistics
  First observed: 2022-04-14.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
