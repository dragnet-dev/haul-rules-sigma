title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0478 — Shadow Copy Deletion (mindware)'
id: e6523a56-6680-58d8-bd2f-92a263686d74
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mindware ransomware.
  Incident: dragnet-ransomware-2022-0478
  Ransomware victim claim by mindware: welplaat; sector: Manufacturing
  First observed: 2022-05-05.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
