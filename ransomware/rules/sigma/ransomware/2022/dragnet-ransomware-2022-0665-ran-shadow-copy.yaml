title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0665 — Shadow Copy Deletion (freecivilian)'
id: 8bb98f47-ac32-5d9b-97e0-ffc2d9c669b7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with freecivilian ransomware.
  Incident: dragnet-ransomware-2022-0665
  Ransomware victim claim by freecivilian: mtsbu.ua; sector: Telecommunication
  First observed: 2022-12-31.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
