title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2710 — Shadow Copy Deletion (dispossessor)'
id: d0313736-9278-5741-8df0-39be245ac853
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-2710
  Ransomware victim claim by dispossessor: pro2col.com; country: GB; sector: Technology
  First observed: 2022-08-12.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/79
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
