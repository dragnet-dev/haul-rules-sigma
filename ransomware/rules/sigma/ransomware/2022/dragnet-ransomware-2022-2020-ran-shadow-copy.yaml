title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2020 — Shadow Copy Deletion (lv)'
id: 48ef3a38-d386-57e9-8497-71304944d5e3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-2020
  Ransomware victim claim by lv: SUBCARN WAS HACKED AND OVER 200 GB OF SENSETIVE DATA WAS STOLEN; sector: Agriculture and Food Production
  First observed: 2022-11-02.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
