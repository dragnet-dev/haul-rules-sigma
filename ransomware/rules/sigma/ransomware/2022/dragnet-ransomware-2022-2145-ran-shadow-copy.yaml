title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2145 — Shadow Copy Deletion (daixin)'
id: acd6f058-7be0-5805-827d-ce73f42ba9ce
status: deprecated
description: |
  Detects shadow copy deletion commands associated with daixin ransomware.
  Incident: dragnet-ransomware-2022-2145
  Ransomware victim claim by daixin: AirAsia Group; country: MY; sector: Hospitality and Tourism
  First observed: 2022-11-19.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
