title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1716 — Shadow Copy Deletion (dispossessor)'
id: 39a87ae8-cfaf-50a9-b3ea-b44cb7f95e25
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1716
  Ransomware victim claim by dispossessor: nasco.com; sector: Healthcare
  First observed: 2022-12-20.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/140
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
