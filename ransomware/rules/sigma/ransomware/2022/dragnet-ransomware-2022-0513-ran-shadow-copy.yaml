title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0513 — Shadow Copy Deletion (cheers)'
id: a2e45193-c80c-57fe-821d-1bac36e61ba9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cheers ransomware.
  Incident: dragnet-ransomware-2022-0513
  Ransomware victim claim by cheers: An British Financial Company -Public; sector: Financial Services
  First observed: 2022-08-18.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
