title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1415 — Shadow Copy Deletion (nokoyawa)'
id: e800937e-737c-5485-9eb4-e4ad603727a6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nokoyawa ransomware.
  Incident: dragnet-ransomware-2022-1415
  Ransomware victim claim by nokoyawa: Nexon Asia Pacific; sector: Technology
  First observed: 2022-12-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
