title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0750 — Shadow Copy Deletion (blackbasta)'
id: deba2e88-060f-58c9-b1ae-3f08fd76fabe
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2022-0750
  Ransomware victim claim by blackbasta: Bitron; sector: Manufacturing
  First observed: 2022-11-03.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
