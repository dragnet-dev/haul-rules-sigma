title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1460 — Shadow Copy Deletion (kelvinsecurity)'
id: d1f28f31-8c8f-5de6-8972-91e3b7f13c32
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kelvinsecurity ransomware.
  Incident: dragnet-ransomware-2022-1460
  Ransomware victim claim by kelvinsecurity: Mansfield Energy; sector: Energy
  First observed: 2022-05-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
