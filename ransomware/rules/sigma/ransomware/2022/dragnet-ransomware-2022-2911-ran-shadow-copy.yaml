title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2911 — Shadow Copy Deletion (leaktheanalyst)'
id: dfe141eb-0020-5601-af8b-3c6ad6c6d1ca
status: deprecated
description: |
  Detects shadow copy deletion commands associated with leaktheanalyst ransomware.
  Incident: dragnet-ransomware-2022-2911
  Ransomware victim claim by leaktheanalyst: 11 you're awake!; sector: Not Found
  First observed: 2022-01-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
