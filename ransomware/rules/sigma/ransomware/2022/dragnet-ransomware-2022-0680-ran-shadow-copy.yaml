title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0680 — Shadow Copy Deletion (ragnarlocker)'
id: 55ea377f-bccd-551c-82a3-94728e7bb393
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ragnarlocker ransomware.
  Incident: dragnet-ransomware-2022-0680
  Ransomware victim claim by ragnarlocker: GENSCO Inc. - allows Leak; sector: Manufacturing
  First observed: 2022-07-19.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
