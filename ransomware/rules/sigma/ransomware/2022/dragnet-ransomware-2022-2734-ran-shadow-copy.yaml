title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2734 — Shadow Copy Deletion (vicesociety)'
id: 3469cebd-7cc4-5466-86f1-d9da6ef02939
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vicesociety ransomware.
  Incident: dragnet-ransomware-2022-2734
  Ransomware victim claim by vicesociety: Eskenazi Health Foundation; sector: Healthcare
  First observed: 2022-01-06.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
