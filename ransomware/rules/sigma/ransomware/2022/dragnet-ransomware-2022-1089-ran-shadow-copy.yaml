title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1089 — Shadow Copy Deletion (payloadbin)'
id: 29f607d0-8ff1-52e4-8483-a4000875d43a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payloadbin ransomware.
  Incident: dragnet-ransomware-2022-1089
  Ransomware victim claim by payloadbin: www.paw.eu; sector: Not Found
  First observed: 2022-01-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
