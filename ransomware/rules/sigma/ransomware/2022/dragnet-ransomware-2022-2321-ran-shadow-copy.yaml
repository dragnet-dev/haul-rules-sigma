title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2321 — Shadow Copy Deletion (royal)'
id: c97ab742-45f7-5caa-a5dc-4d1521705d2f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2022-2321
  Ransomware victim claim by royal: www.buildersmutual.com; sector: Construction
  First observed: 2022-12-28.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
