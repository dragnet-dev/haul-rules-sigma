title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2415 — Shadow Copy Deletion (darkleakmarket)'
id: bb1a3e0e-63dc-5be2-b74f-580587e78c3c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with darkleakmarket ransomware.
  Incident: dragnet-ransomware-2022-2415
  Ransomware victim claim by darkleakmarket: DDC Data Leak; sector: Technology
  First observed: 2022-04-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
