title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0835 — Shadow Copy Deletion (unsafe)'
id: 08d45ba8-9355-5394-87d8-dc1a9e4ad2b8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with unsafe ransomware.
  Incident: dragnet-ransomware-2022-0835
  Ransomware victim claim by unsafe: Wings Etc; sector: Consumer Services
  First observed: 2022-12-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
