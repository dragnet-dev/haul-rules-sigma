title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2043 — Shadow Copy Deletion (onyx)'
id: 7fe352a9-a67f-5651-934f-fa081942a4e9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with onyx ransomware.
  Incident: dragnet-ransomware-2022-2043
  Ransomware victim claim by onyx: www.cucafresca.com.br; country: BR; sector: Consumer Services
  First observed: 2022-11-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
