title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0398 — Shadow Copy Deletion (everest)'
id: b49d3067-47bf-51c4-ab63-3ef2fcf276a2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2022-0398
  Ransomware victim claim by everest: Aeronautics company Canada / UTC Aerospace Systems, Bombardier aerospace, NASA partners; sector: Manufacturing
  First observed: 2022-11-23.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
