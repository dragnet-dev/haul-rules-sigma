title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1363 — Shadow Copy Deletion (icefire)'
id: 22a1be43-cb09-5488-8d7c-8bab15548036
status: deprecated
description: |
  Detects shadow copy deletion commands associated with icefire ransomware.
  Incident: dragnet-ransomware-2022-1363
  Ransomware victim claim by icefire: *.iperactive.com.ar; sector: Technology
  First observed: 2022-08-20.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
