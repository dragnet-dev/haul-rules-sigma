title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1800 — Shadow Copy Deletion (ragnarlocker)'
id: e02e8f3d-8d64-5135-99e1-fd6593b002f3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ragnarlocker ransomware.
  Incident: dragnet-ransomware-2022-1800
  Ransomware victim claim by ragnarlocker: TAP Air Leak of more than 1.5 million of customers and many other.; sector: Hospitality and Tourism
  First observed: 2022-09-19.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
