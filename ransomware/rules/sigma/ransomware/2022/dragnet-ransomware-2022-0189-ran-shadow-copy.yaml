title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0189 — Shadow Copy Deletion (dispossessor)'
id: 2c4b93bf-bb40-56e2-a4a8-eae8fc369ee3
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-0189
  Ransomware victim claim by dispossessor: goalsolutions.com; country: US; sector: Financial Services
  First observed: 2022-01-26.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/36
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
