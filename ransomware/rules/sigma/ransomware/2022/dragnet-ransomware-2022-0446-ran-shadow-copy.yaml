title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0446 — Shadow Copy Deletion (redalert)'
id: a0220359-e70f-54d1-bbb6-7924fe47ca7f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redalert ransomware.
  Incident: dragnet-ransomware-2022-0446
  Ransomware victim claim by redalert: www.bbadmin.com; sector: Business Services
  First observed: 2022-09-22.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
