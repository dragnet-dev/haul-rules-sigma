title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1584 — Shadow Copy Deletion (medusalocker)'
id: 5b07e7c3-4f93-59a9-823f-29d58c703e55
status: deprecated
description: |
  Detects shadow copy deletion commands associated with medusalocker ransomware.
  Incident: dragnet-ransomware-2022-1584
  Ransomware victim claim by medusalocker: goldcreekfoods; sector: Agriculture and Food Production
  First observed: 2022-11-15.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
