title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1095 — Shadow Copy Deletion (nightsky)'
id: 5e0bff7a-cfc7-53a7-9fd7-74bb12bade25
status: deprecated
description: |
  Detects shadow copy deletion commands associated with nightsky ransomware.
  Incident: dragnet-ransomware-2022-1095
  Ransomware victim claim by nightsky: AKIJ GROUP; sector: Manufacturing
  First observed: 2022-01-04.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
