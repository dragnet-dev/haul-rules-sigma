title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0350 — Shadow Copy Deletion (rook)'
id: 4da7c40f-230e-584f-915e-97aa25ff669a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rook ransomware.
  Incident: dragnet-ransomware-2022-0350
  Ransomware victim claim by rook: Abdi ibrahim; sector: Healthcare
  First observed: 2022-01-08.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
