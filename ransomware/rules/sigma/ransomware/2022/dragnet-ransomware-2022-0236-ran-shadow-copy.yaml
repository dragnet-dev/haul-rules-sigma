title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0236 — Shadow Copy Deletion (shaoleaks)'
id: 4fb82188-ab76-55ad-8e50-f8e140529722
status: deprecated
description: |
  Detects shadow copy deletion commands associated with shaoleaks ransomware.
  Incident: dragnet-ransomware-2022-0236
  Ransomware victim claim by shaoleaks: Some of our customers was not payed to us for data decryption. So we publish some of his d; sector: Not Found
  First observed: 2022-11-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
