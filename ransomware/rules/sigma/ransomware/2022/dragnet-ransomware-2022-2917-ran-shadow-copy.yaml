title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2917 — Shadow Copy Deletion (bitlocker)'
id: be081f3e-c5f6-59a4-bde9-0dd7f67de1e1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with bitlocker ransomware.
  Incident: dragnet-ransomware-2022-2917
  Ransomware victim claim by bitlocker: Miratorg Agribusiness Holding; country: RU; sector: Agriculture and Food Production
  First observed: 2022-03-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
