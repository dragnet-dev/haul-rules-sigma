title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1094 — Shadow Copy Deletion (cuba)'
id: 7a42286d-fb8c-5ddc-aeb4-7ae213c9ef73
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cuba ransomware.
  Incident: dragnet-ransomware-2022-1094
  Ransomware victim claim by cuba: r1group; sector: Not Found
  First observed: 2022-06-27.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
