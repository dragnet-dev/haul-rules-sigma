title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2012 — Shadow Copy Deletion (lv)'
id: 4b7d6e1f-287a-5639-a55b-30c9a9676d02
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-2012
  Ransomware victim claim by lv: UNITEDAUTO.MX HAVE BEEN HACKED DUE TO MULTIPLE NETWORK VULNERABILITIES. MORE THAN 2TB OF P; sector: Manufacturing
  First observed: 2022-11-19.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
