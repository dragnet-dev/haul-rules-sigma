title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1684 — Shadow Copy Deletion (ransomhouse)'
id: 1a7d1a78-e5dc-55d0-9e5e-3674adbe6aa3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomhouse ransomware.
  Incident: dragnet-ransomware-2022-1684
  Ransomware victim claim by ransomhouse: Republic of Vanuatu; country: VU; sector: Healthcare
  First observed: 2022-12-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
