title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3071 — Shadow Copy Deletion (sabbath)'
id: d86f9aef-a5d0-5a16-a94b-2aecfe5dc055
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sabbath ransomware.
  Incident: dragnet-ransomware-2022-3071
  Ransomware victim claim by sabbath: Summit College; sector: Education
  First observed: 2022-01-04.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
