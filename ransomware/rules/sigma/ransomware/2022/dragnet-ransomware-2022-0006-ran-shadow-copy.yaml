title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0006 — Shadow Copy Deletion (dispossessor)'
id: 83f7386e-0015-5fd7-871a-bc3ba29146c4
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-0006
  Ransomware victim claim by dispossessor: aon.com; sector: Financial Services
  First observed: 2022-07-03.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/249
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
