title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2536 — Shadow Copy Deletion (redalert)'
id: c561eeb8-29c4-5466-bbb9-2f972cf48312
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redalert ransomware.
  Incident: dragnet-ransomware-2022-2536
  Ransomware victim claim by redalert: syredis.fr; country: FR; sector: Technology
  First observed: 2022-07-14.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
