title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3109 — Shadow Copy Deletion (onyx)'
id: 10ea4630-68f9-5fad-a7bd-adde0ea796f9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with onyx ransomware.
  Incident: dragnet-ransomware-2022-3109
  Ransomware victim claim by onyx: CUCA FRESCA; sector: Consumer Services
  First observed: 2022-07-26.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
