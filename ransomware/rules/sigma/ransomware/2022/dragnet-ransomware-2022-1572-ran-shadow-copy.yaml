title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1572 — Shadow Copy Deletion (lv)'
id: f0e9f93a-4e4c-5ea5-9bed-cdea8234869a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-1572
  Ransomware victim claim by lv: SilTerra - HACKED AND 1 TB DATA LEAKED WITH SOURCES AND NDA; sector: Manufacturing
  First observed: 2022-06-04.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
