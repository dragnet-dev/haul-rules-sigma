title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1670 — Shadow Copy Deletion (icefire)'
id: 639c40c6-fce5-5d76-abcd-03259fe2b91a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with icefire ransomware.
  Incident: dragnet-ransomware-2022-1670
  Ransomware victim claim by icefire: *.bestservers.pro; sector: Technology
  First observed: 2022-08-20.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
