title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1356 — Shadow Copy Deletion (dispossessor)'
id: 9b1a5b08-44ff-5922-a608-59aab67b790a
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1356
  Ransomware victim claim by dispossessor: hallmarkchannel.com; country: US; sector: Business Services
  First observed: 2022-10-07.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/74
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
