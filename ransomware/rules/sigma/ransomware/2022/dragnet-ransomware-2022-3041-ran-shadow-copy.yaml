title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3041 — Shadow Copy Deletion (dispossessor)'
id: a5bfd8e9-7dee-5fc7-87d8-43e0a015a4f6
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-3041
  Ransomware victim claim by dispossessor: thecondorgroup.com; country: QA; sector: Business Services
  First observed: 2022-11-09.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/382
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
