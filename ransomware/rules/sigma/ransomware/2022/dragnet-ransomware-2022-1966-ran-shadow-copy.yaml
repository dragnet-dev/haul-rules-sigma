title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1966 — Shadow Copy Deletion (snatch)'
id: 071f11d7-751a-5089-95b7-595d1e433bd7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2022-1966
  Ransomware victim claim by snatch: TCL Chinese Theatres; sector: Hospitality and Tourism
  First observed: 2022-12-28.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
