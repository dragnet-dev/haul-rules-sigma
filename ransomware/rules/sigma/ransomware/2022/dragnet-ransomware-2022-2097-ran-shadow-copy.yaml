title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2097 — Shadow Copy Deletion (dispossessor)'
id: fa192894-a0bc-50af-a9e1-b942a3b1a5e9
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-2097
  Ransomware victim claim by dispossessor: colonialgeneral.com; sector: Financial Services
  First observed: 2022-11-29.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/388
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
