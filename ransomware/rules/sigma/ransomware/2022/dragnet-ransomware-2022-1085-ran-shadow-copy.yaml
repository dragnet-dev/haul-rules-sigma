title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1085 — Shadow Copy Deletion (freecivilian)'
id: 00de69f0-c895-54f3-82e4-e554ec5b944a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with freecivilian ransomware.
  Incident: dragnet-ransomware-2022-1085
  Ransomware victim claim by freecivilian: health.mia; sector: Healthcare
  First observed: 2022-12-31.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
