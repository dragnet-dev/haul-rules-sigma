title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0554 — Shadow Copy Deletion (dispossessor)'
id: 6d628473-4e6d-5f02-82f5-6d5d0a28c9eb
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-0554
  Ransomware victim claim by dispossessor: crtl.com; country: US; sector: Consumer Services
  First observed: 2022-11-08.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/378
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
