title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0969 — Shadow Copy Deletion (lockbit2)'
id: 34216ee7-6a3d-5fb7-a3d8-98e79475824a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lockbit2 ransomware.
  Incident: dragnet-ransomware-2022-0969
  Ransomware victim claim by lockbit2: hydromaxusa.com; sector: Manufacturing
  First observed: 2022-04-28.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
