title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0131 — Shadow Copy Deletion (snatch)'
id: 363d91ab-2e2e-5a0d-a2cf-2c2204e92f03
status: deprecated
description: |
  Detects shadow copy deletion commands associated with snatch ransomware.
  Incident: dragnet-ransomware-2022-0131
  Ransomware victim claim by snatch: HEMERIA; country: FR; sector: Manufacturing
  First observed: 2022-05-22.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
