title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0349 — Shadow Copy Deletion (freecivilian)'
id: 9bfaf3ce-3eff-50c3-a1c4-65a01eb6974e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with freecivilian ransomware.
  Incident: dragnet-ransomware-2022-0349
  Ransomware victim claim by freecivilian: wanted.mvs.gov.ua; sector: Public Sector
  First observed: 2022-12-31.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
