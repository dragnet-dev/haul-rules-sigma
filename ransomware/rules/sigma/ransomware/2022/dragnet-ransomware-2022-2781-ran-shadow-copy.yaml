title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2781 — Shadow Copy Deletion (dispossessor)'
id: 4c6f7ca4-76a3-5eec-a79c-94c3095dede5
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-2781
  Ransomware victim claim by dispossessor: pinnacletpa.com; sector: Healthcare
  First observed: 2022-11-25.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/117
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
