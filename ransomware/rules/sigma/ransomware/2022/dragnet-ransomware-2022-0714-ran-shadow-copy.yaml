title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0714 — Shadow Copy Deletion (redalert)'
id: 1fb5473b-11d2-5628-9fc2-1a22213c7ad5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redalert ransomware.
  Incident: dragnet-ransomware-2022-0714
  Ransomware victim claim by redalert: keystonelegal.co.uk; country: GB; sector: Business Services
  First observed: 2022-07-20.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
