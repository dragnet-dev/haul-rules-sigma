title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0547 — Shadow Copy Deletion (blackbasta)'
id: d89f156b-3852-5734-b34e-0e87b99a98f1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with blackbasta ransomware.
  Incident: dragnet-ransomware-2022-0547
  Ransomware victim claim by blackbasta: Tiroler Rohre GmbH; sector: Manufacturing
  First observed: 2022-06-10.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
