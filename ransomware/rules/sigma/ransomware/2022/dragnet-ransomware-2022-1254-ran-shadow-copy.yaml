title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1254 — Shadow Copy Deletion (dataleak)'
id: 2864be98-5aa5-58d8-9db6-b20daa048026
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dataleak ransomware.
  Incident: dragnet-ransomware-2022-1254
  Ransomware victim claim by dataleak: wiesauplast.de; country: DE; sector: Manufacturing
  First observed: 2022-12-02.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
