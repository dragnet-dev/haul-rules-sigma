title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1031 — Shadow Copy Deletion (lv)'
id: c96dc8a4-07fd-5169-9c7e-167cce1e4f4d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-1031
  Ransomware victim claim by lv: CICIS.COM- HACKED AND INFORMATION MORE THEN 120,000 CUSTOMERS LEAKED; sector: Consumer Services
  First observed: 2022-06-01.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
