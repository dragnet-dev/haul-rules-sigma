title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2929 — Shadow Copy Deletion (dataleak)'
id: 3a95cab4-9a63-56f4-adea-4c79b402155e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dataleak ransomware.
  Incident: dragnet-ransomware-2022-2929
  Ransomware victim claim by dataleak: nissin.com.br Disclose the compressed package password; sector: Agriculture and Food Production
  First observed: 2022-12-02.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
