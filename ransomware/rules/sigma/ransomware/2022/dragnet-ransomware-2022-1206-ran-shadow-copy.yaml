title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1206 — Shadow Copy Deletion (cuba)'
id: ee7e0b1c-30eb-54db-b0f2-c589ac2d7753
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cuba ransomware.
  Incident: dragnet-ransomware-2022-1206
  Ransomware victim claim by cuba: muntons; sector: Agriculture and Food Production
  First observed: 2022-02-18.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
