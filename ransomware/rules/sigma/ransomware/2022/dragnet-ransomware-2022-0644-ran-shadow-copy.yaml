status: experimental
description: |
  Detects shadow copy deletion commands associated with everest ransomware.
  Incident: dragnet-ransomware-2022-0644
  Ransomware victim claim by everest: Stages Pediatric Care New 40 personal records; sector: Healthcare
  First observed: 2022-10-23.
  Confidence: 90% (ransomware_live).
references:
