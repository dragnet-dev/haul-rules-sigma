title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0021 — Shadow Copy Deletion (cheers)'
id: d4876185-e1d4-53df-bc8c-39edba64c7db
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cheers ransomware.
  Incident: dragnet-ransomware-2022-0021
  Ransomware victim claim by cheers: DYNAM JAPAN HOLDINGS CO., LTD; sector: Hospitality and Tourism
  First observed: 2022-09-14.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
