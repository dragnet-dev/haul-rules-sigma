title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2739 — Shadow Copy Deletion (stormous)'
id: 5e2aca61-c480-585c-a87f-c4247434df4c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2022-2739
  Ransomware victim claim by stormous: Core Design; sector: Business Services
  First observed: 2022-03-22.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
