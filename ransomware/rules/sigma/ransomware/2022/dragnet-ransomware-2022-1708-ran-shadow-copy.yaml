title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1708 — Shadow Copy Deletion (lorenz)'
id: 2d12c83f-58c2-569b-9444-cbb13e7a0ca5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lorenz ransomware.
  Incident: dragnet-ransomware-2022-1708
  Ransomware victim claim by lorenz: Salud Family Health; sector: Healthcare
  First observed: 2022-11-14.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
