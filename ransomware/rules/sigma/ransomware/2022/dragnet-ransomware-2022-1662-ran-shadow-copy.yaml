title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1662 — Shadow Copy Deletion (hive)'
id: b6d7dc8c-e015-517b-8b0c-f8ba9f2feff3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hive ransomware.
  Incident: dragnet-ransomware-2022-1662
  Ransomware victim claim by hive: Caracol TV; country: CO; sector: Telecommunication
  First observed: 2022-05-30.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
