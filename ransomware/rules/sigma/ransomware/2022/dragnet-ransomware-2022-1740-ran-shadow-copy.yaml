title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1740 — Shadow Copy Deletion (redalert)'
id: d7908b4d-b8eb-5d06-86c2-c3b46be894d1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with redalert ransomware.
  Incident: dragnet-ransomware-2022-1740
  Ransomware victim claim by redalert: groupg4.com; sector: Not Found
  First observed: 2022-09-13.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
