title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2518 — Shadow Copy Deletion (cheers)'
id: a44023d9-a723-5e1e-a13d-7d43631b8d7c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cheers ransomware.
  Incident: dragnet-ransomware-2022-2518
  Ransomware victim claim by cheers: An International Shipping Company - Unpay; sector: Transportation/Logistics
  First observed: 2022-07-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
