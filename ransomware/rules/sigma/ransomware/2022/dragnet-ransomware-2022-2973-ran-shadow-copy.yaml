title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2973 — Shadow Copy Deletion (lv)'
id: bc5c0071-9fa6-55d1-8225-7877f00140b7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-2973
  Ransomware victim claim by lv: valverdehotel.com; sector: Hospitality and Tourism
  First observed: 2022-08-09.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
