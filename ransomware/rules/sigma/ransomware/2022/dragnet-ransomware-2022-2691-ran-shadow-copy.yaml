title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2691 — Shadow Copy Deletion (kelvinsecurity)'
id: 0070a468-f285-59d6-a275-14edf1c2d3cb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kelvinsecurity ransomware.
  Incident: dragnet-ransomware-2022-2691
  Ransomware victim claim by kelvinsecurity: Next Leak On Hold; sector: Not Found
  First observed: 2022-05-06.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
