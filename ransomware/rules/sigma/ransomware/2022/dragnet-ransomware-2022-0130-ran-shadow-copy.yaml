title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0130 — Shadow Copy Deletion (pandora)'
id: 9ed27b09-1fb2-5752-8b42-516a2512b2c9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with pandora ransomware.
  Incident: dragnet-ransomware-2022-0130
  Ransomware victim claim by pandora: Hearst; sector: Consumer Services
  First observed: 2022-03-30.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
