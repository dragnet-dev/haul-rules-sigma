title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1135 — Shadow Copy Deletion (lv)'
id: 692f43ff-f4ae-581a-ad8f-9d1a97ba000d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with lv ransomware.
  Incident: dragnet-ransomware-2022-1135
  Ransomware victim claim by lv: ROUGIER HACKED. 1 TB SENSITIVE DATA LEAKED; sector: Agriculture and Food Production
  First observed: 2022-11-02.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
