title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1534 — Shadow Copy Deletion (cheers)'
id: 46c87642-d01f-51cc-8164-a15b77fa6579
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cheers ransomware.
  Incident: dragnet-ransomware-2022-1534
  Ransomware victim claim by cheers: An International Maritime Company - Unpay; sector: Transportation/Logistics
  First observed: 2022-05-29.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
