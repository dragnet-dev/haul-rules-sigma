title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1553 — Shadow Copy Deletion (medusalocker)'
id: 507fdb3c-e7c6-58a9-bd45-1943dfec9419
status: deprecated
description: |
  Detects shadow copy deletion commands associated with medusalocker ransomware.
  Incident: dragnet-ransomware-2022-1553
  Ransomware victim claim by medusalocker: Zelena Laguna Hotel; sector: Hospitality and Tourism
  First observed: 2022-11-15.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
