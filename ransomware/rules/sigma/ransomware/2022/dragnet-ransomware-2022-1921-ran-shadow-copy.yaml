title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1921 — Shadow Copy Deletion (sabbath)'
id: 9dc3730d-0476-5e24-b3d9-e0284cf70edf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sabbath ransomware.
  Incident: dragnet-ransomware-2022-1921
  Ransomware victim claim by sabbath: Close search modal; sector: Not Found
  First observed: 2022-01-04.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
