title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2379 — Shadow Copy Deletion (hive)'
id: 850c627c-2a3f-52bf-8a21-f72e48d4e153
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hive ransomware.
  Incident: dragnet-ransomware-2022-2379
  Ransomware victim claim by hive: GUARDFUEL; sector: Not Found
  First observed: 2022-05-25.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
