title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1951 — Shadow Copy Deletion (dispossessor)'
id: b26940d2-ddda-5cff-9894-05b7936dcab4
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1951
  Ransomware victim claim by dispossessor: proskauer.com; sector: Business Services
  First observed: 2022-01-15.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/174
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
