title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3065 — Shadow Copy Deletion (avoslocker)'
id: 5044a16e-eeeb-5016-9606-196256867395
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avoslocker ransomware.
  Incident: dragnet-ransomware-2022-3065
  Ransomware victim claim by avoslocker: CR2; country: SG; sector: Financial Services
  First observed: 2022-12-26.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
