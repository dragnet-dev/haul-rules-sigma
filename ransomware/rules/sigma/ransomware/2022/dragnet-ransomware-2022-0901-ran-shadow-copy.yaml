title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0901 — Shadow Copy Deletion (midas)'
id: 46509862-3e2b-5c39-80bd-43b773e14e50
status: deprecated
description: |
  Detects shadow copy deletion commands associated with midas ransomware.
  Incident: dragnet-ransomware-2022-0901
  Ransomware victim claim by midas: CIG de la Grande Couronne; sector: Public Sector
  First observed: 2022-01-28.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
