title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1071 — Shadow Copy Deletion (sabbath)'
id: 4b323c51-1197-5e92-b132-f7406c195ad9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sabbath ransomware.
  Incident: dragnet-ransomware-2022-1071
  Ransomware victim claim by sabbath: JALEEL TRADERS LLC; sector: Agriculture and Food Production
  First observed: 2022-01-15.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
