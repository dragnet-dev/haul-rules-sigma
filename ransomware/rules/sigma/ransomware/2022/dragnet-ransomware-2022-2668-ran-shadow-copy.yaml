title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2668 — Shadow Copy Deletion (icefire)'
id: 1087de71-7088-5385-910d-a8d4e37dfe29
status: deprecated
description: |
  Detects shadow copy deletion commands associated with icefire ransomware.
  Incident: dragnet-ransomware-2022-2668
  Ransomware victim claim by icefire: *.directfn.net; sector: Financial Services
  First observed: 2022-08-20.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
