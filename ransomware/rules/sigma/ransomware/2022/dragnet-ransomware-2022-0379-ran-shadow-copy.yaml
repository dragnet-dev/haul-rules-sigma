title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0379 — Shadow Copy Deletion (dispossessor)'
id: 45c664fa-1ce5-55e0-bf6f-328665fe60c4
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-0379
  Ransomware victim claim by dispossessor: www.physicianpartnersofamerica.com; sector: Healthcare
  First observed: 2022-12-01.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/329
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
