title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0202 — Shadow Copy Deletion (donutleaks)'
id: 78f1ec8b-63e2-5ff7-b27b-8652c80a4f13
status: deprecated
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2022-0202
  Ransomware victim claim by donutleaks: Monarchnc; sector: Not Found
  First observed: 2022-09-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
