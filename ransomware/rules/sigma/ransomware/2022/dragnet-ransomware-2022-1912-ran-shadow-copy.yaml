title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1912 — Shadow Copy Deletion (kelvinsecurity)'
id: f9f5e6c9-a4eb-5c2a-a639-8def2d0c2f8e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kelvinsecurity ransomware.
  Incident: dragnet-ransomware-2022-1912
  Ransomware victim claim by kelvinsecurity: CR ASIA; sector: Business Services
  First observed: 2022-04-01.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
