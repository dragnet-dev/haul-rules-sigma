title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2666 — Shadow Copy Deletion (royal)'
id: 85c1596d-78af-5c8d-b603-a7da9432c8c3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with royal ransomware.
  Incident: dragnet-ransomware-2022-2666
  Ransomware victim claim by royal: Leo Hamel Fine Jewelers; sector: Consumer Services
  First observed: 2022-12-16.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
