title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-3057 — Shadow Copy Deletion (dispossessor)'
id: 6c1608f0-0620-54ea-b3ca-007f5c519905
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-3057
  Ransomware victim claim by dispossessor: www.tclchinesetheatres.com; sector: Hospitality and Tourism
  First observed: 2022-10-21.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/325
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
