title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1230 — Shadow Copy Deletion (onyx)'
id: 01bdd391-367a-5c8b-9ff4-f844e1d0187d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with onyx ransomware.
  Incident: dragnet-ransomware-2022-1230
  Ransomware victim claim by onyx: WAYAN NATURAL WEAR; sector: Consumer Services
  First observed: 2022-07-26.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
