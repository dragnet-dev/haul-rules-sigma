title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2674 — Shadow Copy Deletion (dataleak)'
id: fd9ecc18-aa32-5782-8c2b-1ba3c8ff43eb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dataleak ransomware.
  Incident: dragnet-ransomware-2022-2674
  Ransomware victim claim by dataleak: rkw-group.com Disclose the compressed package password; sector: Manufacturing
  First observed: 2022-12-02.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
