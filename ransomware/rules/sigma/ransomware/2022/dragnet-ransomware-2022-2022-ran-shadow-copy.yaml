status: experimental
description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2022-2022
  Ransomware victim claim by clop: LATOURNERIE-WOLFROM.COM; country: FR; sector: Business Services
  First observed: 2022-12-22.
