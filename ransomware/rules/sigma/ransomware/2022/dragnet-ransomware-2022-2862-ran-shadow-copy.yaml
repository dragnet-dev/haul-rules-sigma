title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2862 — Shadow Copy Deletion (medusalocker)'
id: 1a2b2ded-0c35-579a-845b-eb6d8c83d417
status: deprecated
description: |
  Detects shadow copy deletion commands associated with medusalocker ransomware.
  Incident: dragnet-ransomware-2022-2862
  Ransomware victim claim by medusalocker: Autosoft company; sector: Technology
  First observed: 2022-11-15.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
