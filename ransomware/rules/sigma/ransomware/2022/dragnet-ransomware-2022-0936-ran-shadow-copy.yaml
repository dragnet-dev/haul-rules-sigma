title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0936 — Shadow Copy Deletion (hive)'
id: 4052046b-a64a-52f2-9d38-600707099402
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hive ransomware.
  Incident: dragnet-ransomware-2022-0936
  Ransomware victim claim by hive: Hyundai Samho Heavy Industries Co.,Ltd. (South Korea); country: KR; sector: Manufacturing
  First observed: 2022-02-25.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
