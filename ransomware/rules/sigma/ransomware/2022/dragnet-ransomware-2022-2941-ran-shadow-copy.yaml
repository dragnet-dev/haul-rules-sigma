title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2941 — Shadow Copy Deletion (mindware)'
id: f77481d1-e40f-5473-9894-5a7e8660271e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with mindware ransomware.
  Incident: dragnet-ransomware-2022-2941
  Ransomware victim claim by mindware: nottco; sector: Not Found
  First observed: 2022-05-05.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
