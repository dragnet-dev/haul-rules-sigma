title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1883 — Shadow Copy Deletion (ransomhouse)'
id: 7ff73ea4-02a5-580a-9b67-0eff1955a3d3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomhouse ransomware.
  Incident: dragnet-ransomware-2022-1883
  Ransomware victim claim by ransomhouse: Keralty; sector: Healthcare
  First observed: 2022-12-19.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
