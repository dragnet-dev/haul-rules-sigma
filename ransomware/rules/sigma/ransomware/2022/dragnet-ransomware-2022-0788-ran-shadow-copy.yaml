title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0788 — Shadow Copy Deletion (donutleaks)'
id: ec78f164-ad04-517e-87e0-b7bc095e3b7c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2022-0788
  Ransomware victim claim by donutleaks: Enso Detego; sector: Not Found
  First observed: 2022-08-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
