title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0264 — Shadow Copy Deletion (suncrypt)'
id: 29da71c4-076c-5e34-8501-b70253bcc5cc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with suncrypt ransomware.
  Incident: dragnet-ransomware-2022-0264
  Ransomware victim claim by suncrypt: Northeastern Technical College; sector: Education
  First observed: 2022-06-04.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
