title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-2557 — Shadow Copy Deletion (dispossessor)'
id: 2b029757-9e9f-5ba3-a0a3-73b20aee9445
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-2557
  Ransomware victim claim by dispossessor: darlingconsulting.com; country: US; sector: Financial Services
  First observed: 2022-09-01.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/47
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
