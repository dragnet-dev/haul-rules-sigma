title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-0094 — Shadow Copy Deletion (ragnarlocker)'
id: 787d5fd0-9ae9-5029-8ec4-94ca1005cbea
status: experimental
description: |
  Detects shadow copy deletion commands associated with ragnarlocker ransomware.
  Incident: dragnet-ransomware-2022-0094
  Ransomware victim claim by ragnarlocker: Belgium company Zwijndrecht - Leaked; sector: Not Found
  First observed: 2022-11-16.
  Confidence: 90% (ransomware_live).
references:
  - http://rgleaktxuey67yrgspmhvtnrqtgogur35lwdrup4d3igtbm3pupc4lyd.onion/?msMrIN7gpbQ
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
