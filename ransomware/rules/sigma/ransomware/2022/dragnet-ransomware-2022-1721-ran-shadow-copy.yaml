title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1721 — Shadow Copy Deletion (dispossessor)'
id: db6c8bf7-dc18-5118-b77b-6f0194447fa3
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1721
  Ransomware victim claim by dispossessor: hoosierco.com; sector: Manufacturing
  First observed: 2022-10-30.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/351
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
