title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1037 — Shadow Copy Deletion (yanluowang)'
id: 9c92ceff-e51e-5c21-96a7-1dd638c800ad
status: deprecated
description: |
  Detects shadow copy deletion commands associated with yanluowang ransomware.
  Incident: dragnet-ransomware-2022-1037
  Ransomware victim claim by yanluowang: Hot news straight from Cisco; sector: Technology
  First observed: 2022-08-10.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
