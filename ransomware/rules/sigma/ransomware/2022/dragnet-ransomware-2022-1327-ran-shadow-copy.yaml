title: 'Dragnet [Ransomware]: dragnet-ransomware-2022-1327 — Shadow Copy Deletion (dispossessor)'
id: c01a8c82-6e28-518b-80fd-4955ba4fe3ea
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2022-1327
  Ransomware victim claim by dispossessor: enzo.com; country: US; sector: Technology
  First observed: 2022-05-18.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/243
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
