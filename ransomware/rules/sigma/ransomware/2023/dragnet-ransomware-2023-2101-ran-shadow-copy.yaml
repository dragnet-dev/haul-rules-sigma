title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2101 — Shadow Copy Deletion (dragonforce)'
id: fc2f674f-6b08-59a1-a3bc-c17523c9b630
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonforce ransomware.
  Incident: dragnet-ransomware-2023-2101
  Ransomware victim claim by dragonforce: Decina; country: AU; sector: Manufacturing
  First observed: 2023-12-13.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
