title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3431 — Shadow Copy Deletion (dispossessor)'
id: e10fbfa6-7581-54b4-b645-67f3fb7a369f
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3431
  Ransomware victim claim by dispossessor: viseg.com; sector: Technology
  First observed: 2023-05-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/714
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
