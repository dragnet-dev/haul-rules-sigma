status: experimental
description: |
  Detects shadow copy deletion commands associated with qilin ransomware.
  Incident: dragnet-ransomware-2023-1078
  Ransomware victim claim by qilin: St. Johns River Water Management District; country: US; sector: Public Sector
  First observed: 2023-12-01.
  Confidence: 90% (ransomware_live).
references:
  - http://ijzn3sicrcy7guixkzjkib4ukbiilwc3xhnmby4mcbccnsd7j2rekvqd.onion/site/view?uuid=d226d026-073f-343d-b9f7-9ae6b6ac6d92
