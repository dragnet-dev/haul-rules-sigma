title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2717 — Shadow Copy Deletion (cyclops)'
id: bae1794c-f93e-5863-a8a6-cab8f3a8df34
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cyclops ransomware.
  Incident: dragnet-ransomware-2023-2717
  Ransomware victim claim by cyclops: Superloop ISP; country: AU; sector: Telecommunication
  First observed: 2023-07-08.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
