title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4087 — Shadow Copy Deletion (ElDorado)'
id: e9e02f9d-15fa-565a-9b15-87ba8946720c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ElDorado ransomware.
  Incident: dragnet-ransomware-2023-4087
  Ransomware victim claim by ElDorado: LINDOSTAR; country: IT; sector: Technology
  First observed: 2023-12-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
