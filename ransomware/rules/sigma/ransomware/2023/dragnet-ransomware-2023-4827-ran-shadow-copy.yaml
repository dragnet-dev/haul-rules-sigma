title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4827 — Shadow Copy Deletion (dispossessor)'
id: 933aab4e-a791-5a03-bbcc-3b2657e459d0
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4827
  Ransomware victim claim by dispossessor: nirolaw.com; sector: Business Services
  First observed: 2023-10-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1064
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
