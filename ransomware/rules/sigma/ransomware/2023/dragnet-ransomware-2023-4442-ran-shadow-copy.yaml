title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4442 — Shadow Copy Deletion (unsafe)'
id: 4b5dec81-e8ea-5efd-bc13-42182f2f2ad9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with unsafe ransomware.
  Incident: dragnet-ransomware-2023-4442
  Ransomware victim claim by unsafe: Invenergy; sector: Energy
  First observed: 2023-04-13.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
