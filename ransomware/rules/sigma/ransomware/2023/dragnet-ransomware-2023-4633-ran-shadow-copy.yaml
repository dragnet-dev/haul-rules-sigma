title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4633 — Shadow Copy Deletion (dispossessor)'
id: b5b18364-9775-5612-878e-84b23b38f2f9
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4633
  Ransomware victim claim by dispossessor: sd69.org; sector: Education
  First observed: 2023-09-08.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/977
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
