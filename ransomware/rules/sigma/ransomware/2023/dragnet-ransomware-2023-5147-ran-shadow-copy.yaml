title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5147 — Shadow Copy Deletion (medusa)'
id: 98e6139b-6107-5068-ba6a-e2f638a2debe
status: experimental
description: |
  Detects shadow copy deletion commands associated with medusa ransomware.
  Incident: dragnet-ransomware-2023-5147
  Ransomware victim claim by medusa: Symposia Organizzazione Congressi S.R.L; sector: Hospitality and Tourism
  First observed: 2023-10-16.
  Confidence: 90% (ransomware_live).
references:
  - http://medusaxko7jxtrojdkxo66j7ck4q5tgktf7uqsqyfry4ebnxlcbkccyd.onion/detail?id=ace3f96a2933b7762f6d73f5bae17688
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
