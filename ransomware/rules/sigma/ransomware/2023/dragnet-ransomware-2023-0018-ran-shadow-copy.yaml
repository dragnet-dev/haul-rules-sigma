title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0018 — Shadow Copy Deletion (dispossessor)'
id: ff4d5d82-5a9b-5100-844a-fb42f2e40d46
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0018
  Ransomware victim claim by dispossessor: meinet.com; sector: Technology
  First observed: 2023-03-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/567
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
