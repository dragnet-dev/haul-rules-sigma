title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5257 — Shadow Copy Deletion (dispossessor)'
id: e055cbc4-2976-571c-949a-8f8fc5b57527
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-5257
  Ransomware victim claim by dispossessor: namibmills.com; country: NA; sector: Agriculture and Food Production
  First observed: 2023-05-07.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/706
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
