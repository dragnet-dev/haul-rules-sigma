title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1863 — Shadow Copy Deletion (karakurt)'
id: 49410bb6-b9ad-518a-91b6-c96dbf7fc21d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with karakurt ransomware.
  Incident: dragnet-ransomware-2023-1863
  Ransomware victim claim by karakurt: FINANCE INSTITUTION AUCTION; sector: Financial Services
  First observed: 2023-03-29.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
