title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3386 — Shadow Copy Deletion (dispossessor)'
id: 5f0c6968-1da8-565b-9cbb-8325c3c956c4
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3386
  Ransomware victim claim by dispossessor: www.fennpest.com; country: US; sector: Business Services
  First observed: 2023-08-31.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/25
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
