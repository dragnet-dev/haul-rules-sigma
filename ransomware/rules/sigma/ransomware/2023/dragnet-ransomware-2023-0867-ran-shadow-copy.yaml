status: experimental
description: |
  Detects shadow copy deletion commands associated with trigona ransomware.
  Incident: dragnet-ransomware-2023-0867
  Ransomware victim claim by trigona: Treadwell, Tamplin & Company, Certified Public Accountants, Madison, GA; sector: Financial Services
  First observed: 2023-04-18.
  Confidence: 90% (ransomware_live).
references:
  - http://6n5tfadusp4sarzuxntz34q4ohspiaya2mc6aw6uhlusfqfsdomavyyd.onion/leak/9
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
