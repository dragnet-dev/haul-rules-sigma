title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4469 — Shadow Copy Deletion (trigona)'
id: 9244745f-1f16-581a-bef8-6f370a7278d7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with trigona ransomware.
  Incident: dragnet-ransomware-2023-4469
  Ransomware victim claim by trigona: Feit Electric; country: US; sector: Manufacturing
  First observed: 2023-05-16.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
