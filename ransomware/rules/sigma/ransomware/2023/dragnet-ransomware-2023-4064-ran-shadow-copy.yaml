title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4064 — Shadow Copy Deletion (dispossessor)'
id: 1f3fa719-5436-54e5-bee6-04ca964bd5a1
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4064
  Ransomware victim claim by dispossessor: aquidneckclub.com; sector: Hospitality and Tourism
  First observed: 2023-06-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/789
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
