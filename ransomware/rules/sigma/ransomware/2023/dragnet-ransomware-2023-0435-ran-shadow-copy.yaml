title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0435 — Shadow Copy Deletion (ransomhouse)'
id: 950c4750-e02f-5032-9e3d-ffcbef6c596c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomhouse ransomware.
  Incident: dragnet-ransomware-2023-0435
  Ransomware victim claim by ransomhouse: Trans Maldivian Airways; country: MV; sector: Hospitality and Tourism
  First observed: 2023-01-13.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
