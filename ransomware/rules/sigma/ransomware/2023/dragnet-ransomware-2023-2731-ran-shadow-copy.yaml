title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2731 — Shadow Copy Deletion (cyclops)'
id: 13681705-87e8-52fb-a26c-a42fefb98cb9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cyclops ransomware.
  Incident: dragnet-ransomware-2023-2731
  Ransomware victim claim by cyclops: Atherfield Medical Service; country: AU; sector: Healthcare
  First observed: 2023-06-29.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
