title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1575 — Shadow Copy Deletion (dispossessor)'
id: e7f204d9-0f77-5df7-84f4-3c445c188a5a
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1575
  Ransomware victim claim by dispossessor: gocontec.com; sector: Technology
  First observed: 2023-05-10.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/711
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
