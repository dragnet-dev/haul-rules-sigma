title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2972 — Shadow Copy Deletion (moneymessage)'
id: 361b61b0-2453-5bfd-af11-f1d97a657bdf
status: experimental
description: |
  Detects shadow copy deletion commands associated with moneymessage ransomware.
  Incident: dragnet-ransomware-2023-2972
  Ransomware victim claim by moneymessage: Pharmerica.com & BrightSpring Health Services; country: US; sector: Healthcare
  First observed: 2023-04-08.
  Confidence: 90% (ransomware_live).
references:
  - http://blogvl7tjyjvsfthobttze52w36wwiz34hrfcmorgvdzb6hikucb7aqd.onion/news.php?id=3
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
