title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2321 — Shadow Copy Deletion (toufan)'
id: b2927b2f-3564-5996-b5d5-2a2a10f4e6a7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with toufan ransomware.
  Incident: dragnet-ransomware-2023-2321
  Ransomware victim claim by toufan: shop.emprecise.com; sector: Manufacturing
  First observed: 2023-12-19.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
