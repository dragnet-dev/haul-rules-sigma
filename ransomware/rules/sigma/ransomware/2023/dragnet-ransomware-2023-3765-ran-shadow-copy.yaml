title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3765 — Shadow Copy Deletion (siegedsec)'
id: 6e57a5b9-d6ee-597f-83a6-59edc94fcce9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with siegedsec ransomware.
  Incident: dragnet-ransomware-2023-3765
  Ransomware victim claim by siegedsec: National Office for centralized procurement; sector: Public Sector
  First observed: 2023-12-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
