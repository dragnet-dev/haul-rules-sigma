title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2281 — Shadow Copy Deletion (dispossessor)'
id: 223aae57-a675-5920-ae1f-9fe0f5815c6b
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2281
  Ransomware victim claim by dispossessor: studio483.com; sector: Business Services
  First observed: 2023-11-05.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1124
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
