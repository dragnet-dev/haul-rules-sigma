status: experimental
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-1751
  Ransomware victim claim by alphv: Contact Cottrell and McCullough; sector: Healthcare
  First observed: 2023-11-02.
  Confidence: 90% (ransomware_live).
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/0521c454-3992-4a8a-be55-23aa77cd3f5c
