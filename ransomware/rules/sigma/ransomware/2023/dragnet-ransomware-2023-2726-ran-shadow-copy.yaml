title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2726 — Shadow Copy Deletion (avoslocker)'
id: 95eb1c08-564e-58cc-b3aa-36b3d012ed04
status: deprecated
description: |
  Detects shadow copy deletion commands associated with avoslocker ransomware.
  Incident: dragnet-ransomware-2023-2726
  Ransomware victim claim by avoslocker: Hamilton Parker; sector: Business Services
  First observed: 2023-02-11.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
