title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3855 — Shadow Copy Deletion (dispossessor)'
id: 33d6b1b6-3eeb-5418-8253-c5f8874035cd
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3855
  Ransomware victim claim by dispossessor: oneexchangecorp.com; sector: Energy
  First observed: 2023-07-03.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/811
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
