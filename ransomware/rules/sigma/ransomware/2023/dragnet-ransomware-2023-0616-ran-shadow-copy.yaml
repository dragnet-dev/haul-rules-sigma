title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0616 — Shadow Copy Deletion (raznatovic)'
id: 0b5196f9-c64b-5c86-b0f4-f58b9fc3d019
status: deprecated
description: |
  Detects shadow copy deletion commands associated with raznatovic ransomware.
  Incident: dragnet-ransomware-2023-0616
  Ransomware victim claim by raznatovic: Regarding FM; country: CY; sector: Not Found
  First observed: 2023-12-26.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
