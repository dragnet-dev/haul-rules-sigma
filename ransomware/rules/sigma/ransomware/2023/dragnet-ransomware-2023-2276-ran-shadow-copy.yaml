title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2276 — Shadow Copy Deletion (rhysida)'
id: abaaf78f-9b21-5056-951a-eb70bc675667
status: experimental
description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2023-2276
  Ransomware victim claim by rhysida: Collectivite Territoriale de Martinique; country: MQ; sector: Public Sector
  First observed: 2023-06-05.
  Confidence: 90% (ransomware_live).
references:
  - http://rhysidaeoxtkejwuheks3a7htk4zn3dfuynt5mqw6oawlcx6kcxjdeyd.onion/RYOtoGC8Q4J3dKVxRCOlrDNPqUMCNhLX/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
