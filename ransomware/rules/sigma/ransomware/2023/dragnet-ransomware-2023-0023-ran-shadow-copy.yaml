title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0023 — Shadow Copy Deletion (losttrust)'
id: e0aedfa8-36cf-57b3-9388-0bbcfc3fa1f7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with losttrust ransomware.
  Incident: dragnet-ransomware-2023-0023
  Ransomware victim claim by losttrust: Professional Moving Company - Mackie Group; sector: Transportation/Logistics
  First observed: 2023-09-26.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
