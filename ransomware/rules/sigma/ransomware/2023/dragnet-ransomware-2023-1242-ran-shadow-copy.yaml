title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1242 — Shadow Copy Deletion (dispossessor)'
id: 2f7a3738-88f5-563e-9793-713ff8d05c49
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1242
  Ransomware victim claim by dispossessor: icsystem.com; sector: Financial Services
  First observed: 2023-04-15.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/195
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
