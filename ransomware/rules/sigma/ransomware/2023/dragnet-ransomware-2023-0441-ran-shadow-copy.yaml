title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0441 — Shadow Copy Deletion (ransomed)'
id: 711de9fa-c201-59d2-b15f-6a6b8f9c90a5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-0441
  Ransomware victim claim by ransomed: SONY.COM; country: JP; sector: Technology
  First observed: 2023-09-26.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
