title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4602 — Shadow Copy Deletion (dispossessor)'
id: fe1f3846-7671-5e69-8c82-efc748cb0387
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4602
  Ransomware victim claim by dispossessor: favoritefoods.com; sector: Agriculture and Food Production
  First observed: 2023-03-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/561
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
