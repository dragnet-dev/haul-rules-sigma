title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2434 — Shadow Copy Deletion (ransomed)'
id: 9987a147-ee23-53d6-87c2-5f120e942c2f
status: experimental
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-2434
  Ransomware victim claim by ransomed: Accenture Breach Evidence & Debunking Rob Lee’s Lies; sector: Business Services
  First observed: 2023-10-15.
  Confidence: 90% (ransomware_live).
references:
  - http://f6amq3izzsgtna4vw24rpyhy3ofwazlgex2zqdssavevvkklmtudxjad.onion/?p=114
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
