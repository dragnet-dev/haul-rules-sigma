title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3519 — Shadow Copy Deletion (dispossessor)'
id: 53ff7318-6997-58a9-8bb5-0b4052ef1cd3
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3519
  Ransomware victim claim by dispossessor: fcps1.org; sector: Education
  First observed: 2023-10-01.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1034
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
