title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0146 — Shadow Copy Deletion (dispossessor)'
id: d22878e1-13d5-57df-ac79-e39e9ce787a8
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0146
  Ransomware victim claim by dispossessor: smart-union.org; country: US; sector: Transportation/Logistics
  First observed: 2023-10-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1059
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
