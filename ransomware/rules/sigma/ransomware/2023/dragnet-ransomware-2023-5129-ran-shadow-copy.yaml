title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5129 — Shadow Copy Deletion (ciphbit)'
id: f35d9708-8e39-56bc-90a3-53082e9abca4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ciphbit ransomware.
  Incident: dragnet-ransomware-2023-5129
  Ransomware victim claim by ciphbit: RSV Centrale Bvba; country: BE; sector: Construction
  First observed: 2023-09-14.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
