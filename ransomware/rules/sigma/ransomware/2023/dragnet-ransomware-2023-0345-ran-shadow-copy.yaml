title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0345 — Shadow Copy Deletion (dispossessor)'
id: 58811671-f5a7-5826-ba5e-9917554e848d
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0345
  Ransomware victim claim by dispossessor: pittsburg.k12.ca.us; country: US; sector: Education
  First observed: 2023-06-06.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/771
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
