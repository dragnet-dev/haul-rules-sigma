title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5239 — Shadow Copy Deletion (donutleaks)'
id: 938ef459-63cf-564c-b90a-0658d63f2a8c
status: experimental
description: |
  Detects shadow copy deletion commands associated with donutleaks ransomware.
  Incident: dragnet-ransomware-2023-5239
  Ransomware victim claim by donutleaks: Gossler, Gobert & Wolters Group.; sector: Financial Services
  First observed: 2023-09-19.
  Confidence: 90% (ransomware_live).
references:
  - http://sbc2zv2qnz5vubwtx3aobfpkeao6l4igjegm3xx7tk5suqhjkp5jxtqd.onion/gossler-gobert-wolters-group/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
