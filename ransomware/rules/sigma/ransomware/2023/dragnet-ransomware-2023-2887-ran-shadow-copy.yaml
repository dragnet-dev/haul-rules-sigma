title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2887 — Shadow Copy Deletion (dispossessor)'
id: 508549e0-50f0-5f41-bf27-218cd5b51498
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2887
  Ransomware victim claim by dispossessor: revvaviation.com; sector: Transportation/Logistics
  First observed: 2023-04-03.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/633
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
