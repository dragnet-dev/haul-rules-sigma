title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0155 — Shadow Copy Deletion (dispossessor)'
id: 0213caa6-c5fa-5236-8cca-aa30c165f02a
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0155
  Ransomware victim claim by dispossessor: newbridge.org; sector: Healthcare
  First observed: 2023-02-16.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/537
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
