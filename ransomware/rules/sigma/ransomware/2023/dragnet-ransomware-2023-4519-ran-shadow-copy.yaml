title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4519 — Shadow Copy Deletion (play)'
id: 8f598093-1fa8-5cad-8e66-09ed727f9ae1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with play ransomware.
  Incident: dragnet-ransomware-2023-4519
  Associated with Play.
  Ransomware victim claim by play: Structab AB (MegTax); country: SE; sector: Not Found
  First observed: 2023-04-18.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.play
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
