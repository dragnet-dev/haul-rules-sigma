title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1205 — Shadow Copy Deletion (alphv)'
id: bd476952-97ca-51d7-89a5-08db20d95ce9
status: experimental
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-1205
  Ransomware victim claim by alphv: Voxx Electronics - company, which has a huge number of vulnerabilities was hacked A large; country: US; sector: Consumer Services
  First observed: 2023-05-24.
  Confidence: 90% (ransomware_live).
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/0a94b33d-1486-41c1-9f2d-80b2a17b537d
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
