title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5203 — Shadow Copy Deletion (ciphbit)'
id: 9acd8462-0d42-54bd-9386-ee9b3e8886b7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ciphbit ransomware.
  Incident: dragnet-ransomware-2023-5203
  Ransomware victim claim by ciphbit: Waterford Retirement Residence; sector: Hospitality and Tourism
  First observed: 2023-09-14.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
