title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3968 — Shadow Copy Deletion (dispossessor)'
id: f81e5c97-388f-57f7-8556-f9352d3e3f55
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3968
  Ransomware victim claim by dispossessor: enovationcontrols.com; sector: Technology
  First observed: 2023-05-18.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/730
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
