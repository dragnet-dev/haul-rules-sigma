title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2461 — Shadow Copy Deletion (dispossessor)'
id: 5964cf91-89f5-57f5-9cd1-c0249907e072
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2461
  Ransomware victim claim by dispossessor: universalproperties.ca; country: CA; sector: Business Services
  First observed: 2023-09-08.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/22
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
