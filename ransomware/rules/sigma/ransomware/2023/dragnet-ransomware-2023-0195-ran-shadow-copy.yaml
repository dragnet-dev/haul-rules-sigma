title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0195 — Shadow Copy Deletion (toufan)'
id: 16fa1fc4-5c89-5ffa-8022-fb35fc53a26f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with toufan ransomware.
  Incident: dragnet-ransomware-2023-0195
  Ransomware victim claim by toufan: cspartners.caesarstoneus.com; sector: Manufacturing
  First observed: 2023-12-19.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
