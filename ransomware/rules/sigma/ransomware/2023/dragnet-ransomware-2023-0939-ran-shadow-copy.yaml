description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-0939
  Ransomware victim claim by alphv: Daregal was hacked The most insecure retail company allowed a huge amount of confidential; country: FR; sector: Consumer Services
  First observed: 2023-04-21.
