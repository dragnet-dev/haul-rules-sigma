title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0821 — Shadow Copy Deletion (dispossessor)'
id: 086af0bf-6137-526a-aa17-cb42c825f2ac
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0821
  Ransomware victim claim by dispossessor: tetco.com; sector: Energy
  First observed: 2023-08-04.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/853
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
