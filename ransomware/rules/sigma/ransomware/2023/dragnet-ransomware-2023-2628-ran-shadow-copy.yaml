description: |
  Detects shadow copy deletion commands associated with raworld ransomware.
  Incident: dragnet-ransomware-2023-2628
  Ransomware victim claim by raworld: Yuxin Automobile Co.Ltd (裕信汽車); sector: Manufacturing
