title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5213 — Shadow Copy Deletion (alphv)'
id: ec7fdd63-7a78-5c48-90cc-74e568fec9bb
status: experimental
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-5213
  Ransomware victim claim by alphv: Derrimon Trading was hacked. Critical data of the company and its customers was stolen; country: JM; sector: Agriculture and Food Production
  First observed: 2023-09-12.
  Confidence: 90% (ransomware_live).
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/cdb855b7-9284-4c33-9527-74108e6aaca8
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
