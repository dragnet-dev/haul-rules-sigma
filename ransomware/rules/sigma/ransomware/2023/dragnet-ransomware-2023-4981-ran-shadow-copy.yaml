title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4981 — Shadow Copy Deletion (werewolves)'
id: 728a69bf-0b16-555d-8da5-da31a6923176
status: experimental
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-4981
  Ransomware victim claim by werewolves: interfides.de; country: DE; sector: Business Services
  First observed: 2023-05-25.
  Confidence: 90% (ransomware_live).
references:
  - https://werewolves.pro/en/metalnet-nl.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
