title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3722 — Shadow Copy Deletion (dispossessor)'
id: a1056c48-c7c7-575e-bd49-79ed462d2070
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3722
  Ransomware victim claim by dispossessor: brandywine-homes.com; sector: Business Services
  First observed: 2023-03-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/566
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
