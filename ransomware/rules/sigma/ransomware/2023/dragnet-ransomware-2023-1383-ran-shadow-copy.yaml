title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1383 — Shadow Copy Deletion (dispossessor)'
id: 739c1d06-e2c7-5f30-ac01-b6f6724a081d
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1383
  Ransomware victim claim by dispossessor: heidelbergbread.com; sector: Agriculture and Food Production
  First observed: 2023-03-10.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/557
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
