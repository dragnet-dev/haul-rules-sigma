title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2083 — Shadow Copy Deletion (karakurt)'
id: 39010de7-5cf3-5345-a870-5342be35e764
status: experimental
description: |
  Detects shadow copy deletion commands associated with karakurt ransomware.
  Incident: dragnet-ransomware-2023-2083
