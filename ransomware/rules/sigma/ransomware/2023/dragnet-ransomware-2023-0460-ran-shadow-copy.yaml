title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0460 — Shadow Copy Deletion (ransomed)'
id: 0b6e2db7-2e9c-5e24-8956-cb20d15a60e0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-0460
  Ransomware victim claim by ransomed: S&P; sector: Financial Services
  First observed: 2023-08-31.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
