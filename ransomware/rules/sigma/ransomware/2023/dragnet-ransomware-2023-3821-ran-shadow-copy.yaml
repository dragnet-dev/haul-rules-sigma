status: experimental
description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2023-3821
  Ransomware victim claim by clop: DRYDOCKS.GOV.AE; country: AE; sector: Transportation/Logistics
  First observed: 2023-07-26.
  Confidence: 90% (ransomware_live).
references:
  - http://santat7kpllt6iyvqbr7q4amdv6dzrh6paatvyrzl7ry3zm72zigf4ad.onion/drydocks-gov-ae
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
