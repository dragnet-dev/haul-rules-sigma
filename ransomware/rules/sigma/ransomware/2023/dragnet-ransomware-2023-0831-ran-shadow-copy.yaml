title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0831 — Shadow Copy Deletion (ransomed)'
id: 09a4c3ce-a672-5ee3-993d-f12ad7af2a36
status: experimental
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-0831
  Ransomware victim claim by ransomed: Transunion; sector: Financial Services
  First observed: 2023-08-23.
  Confidence: 90% (ransomware_live).
references:
  - https://ransomed.vc/tr.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
