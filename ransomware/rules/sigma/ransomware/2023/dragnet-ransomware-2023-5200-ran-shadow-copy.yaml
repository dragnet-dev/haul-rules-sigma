title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5200 — Shadow Copy Deletion (dispossessor)'
id: 4005657c-9595-5e98-9fc7-06b8dce901e3
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-5200
  Ransomware victim claim by dispossessor: carolfoxassociates.com; sector: Business Services
  First observed: 2023-08-29.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/907
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
