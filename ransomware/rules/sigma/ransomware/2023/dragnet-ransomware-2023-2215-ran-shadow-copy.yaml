title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2215 — Shadow Copy Deletion (werewolves)'
id: 9506b03f-9535-5ce9-b54f-e38941a7ce80
status: experimental
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-2215
  Ransomware victim claim by werewolves: metalnet.nl; country: NL; sector: Manufacturing
  First observed: 2023-05-24.
  Confidence: 90% (ransomware_live).
references:
  - https://werewolves.pro/en/aek-mk.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
