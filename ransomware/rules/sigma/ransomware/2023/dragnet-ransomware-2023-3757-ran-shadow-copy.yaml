title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3757 — Shadow Copy Deletion (ransomed)'
id: 9a57a1d2-566d-54eb-afb6-3213ae364b0e
status: experimental
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-3757
  Ransomware victim claim by ransomed: I&G Brokers; country: BG; sector: Financial Services
  First observed: 2023-08-21.
  Confidence: 90% (ransomware_live).
references:
  - https://ransomed.vc/ig.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
