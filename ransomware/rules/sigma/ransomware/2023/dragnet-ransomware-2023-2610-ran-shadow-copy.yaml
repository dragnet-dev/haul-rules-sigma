title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2610 — Shadow Copy Deletion (malekteam)'
id: 113698a4-2ad2-5e92-b4c0-6fee6c9b71c5
status: experimental
description: |
  Detects shadow copy deletion commands associated with malekteam ransomware.
  Incident: dragnet-ransomware-2023-2610
  Ransomware victim claim by malekteam: ZIV Hospital; country: IL; sector: Healthcare
  First observed: 2023-12-24.
  Confidence: 90% (ransomware_live).
references:
  - http://195.14.123.2/ziv.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
