title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5059 — Shadow Copy Deletion (dispossessor)'
id: bb75b7d4-3dcf-5443-9290-bbb4e7e67084
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-5059
  Ransomware victim claim by dispossessor: sccu.com; sector: Financial Services
  First observed: 2023-09-02.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/145
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
