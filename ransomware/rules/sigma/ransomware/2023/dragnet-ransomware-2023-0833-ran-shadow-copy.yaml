title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0833 — Shadow Copy Deletion (dispossessor)'
id: 7f307232-785e-57ad-8e6f-5c0bcc7020d0
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0833
  Ransomware victim claim by dispossessor: greatlakesmbpm.com; sector: Manufacturing
  First observed: 2023-07-15.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/828
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
