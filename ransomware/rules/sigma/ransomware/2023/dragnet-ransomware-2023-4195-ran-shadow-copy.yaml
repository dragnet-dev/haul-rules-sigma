title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4195 — Shadow Copy Deletion (karakurt)'
id: 0d7466f7-552f-58dd-8f88-d524c3294159
status: deprecated
description: |
  Detects shadow copy deletion commands associated with karakurt ransomware.
  Incident: dragnet-ransomware-2023-4195
  Ransomware victim claim by karakurt: TransMedics; sector: Healthcare
  First observed: 2023-04-24.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
