title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4636 — Shadow Copy Deletion (vendetta)'
id: e42e1e8f-f636-51e8-9ddc-83dfd57f5b8a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vendetta ransomware.
  Incident: dragnet-ransomware-2023-4636
  Ransomware victim claim by vendetta: albouyassociesconsult; sector: Business Services
  First observed: 2023-02-12.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
