title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0741 — Shadow Copy Deletion (siegedsec)'
id: 17f2410f-8ad7-5d2c-bf48-6fc3a6fda9ca
status: deprecated
description: |
  Detects shadow copy deletion commands associated with siegedsec ransomware.
  Incident: dragnet-ransomware-2023-0741
  Ransomware victim claim by siegedsec: Deqing County; sector: Public Sector
  First observed: 2023-12-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
