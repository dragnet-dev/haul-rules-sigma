title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1511 — Shadow Copy Deletion (dispossessor)'
id: e7528353-365f-5432-9a6e-cc0c022c47d5
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1511
  Ransomware victim claim by dispossessor: distribuidoradavidsa.com; country: PA; sector: Business Services
  First observed: 2023-08-29.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/901
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
