title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0216 — Shadow Copy Deletion (dispossessor)'
id: 8f9600dd-7fc9-5d08-a9ac-c11202cdb96c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0216
  Ransomware victim claim by dispossessor: miguelmechanical.com; sector: Business Services
  First observed: 2023-01-22.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/435
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
