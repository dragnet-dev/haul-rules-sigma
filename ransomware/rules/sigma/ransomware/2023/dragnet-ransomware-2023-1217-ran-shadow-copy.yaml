title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1217 — Shadow Copy Deletion (dispossessor)'
id: 6a8c0e8d-5138-5c83-8e0c-548d82935e01
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1217
  Ransomware victim claim by dispossessor: psmicorp.com; sector: Business Services
  First observed: 2023-11-02.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1095
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
