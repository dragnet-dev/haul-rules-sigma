title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1058 — Shadow Copy Deletion (0mega)'
id: 832815c6-4c64-5d97-8548-db90e0d92e8b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with 0mega ransomware.
  Incident: dragnet-ransomware-2023-1058
  Ransomware victim claim by 0mega: US Liner Company & American Made LLC; sector: Manufacturing
  First observed: 2023-10-04.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
