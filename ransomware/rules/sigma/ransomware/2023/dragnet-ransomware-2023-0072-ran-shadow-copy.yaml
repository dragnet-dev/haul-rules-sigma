title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0072 — Shadow Copy Deletion (dispossessor)'
id: 459af3c0-e2cc-5001-9883-5a9ed48a79fe
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0072
  Ransomware victim claim by dispossessor: buckprop.com; sector: Business Services
  First observed: 2023-07-09.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1272
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
