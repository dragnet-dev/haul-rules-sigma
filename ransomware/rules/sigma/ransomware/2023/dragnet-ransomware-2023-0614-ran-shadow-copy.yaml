title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0614 — Shadow Copy Deletion (dispossessor)'
id: 5e7be4e0-a91d-5325-874c-820b28d9695c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0614
  Ransomware victim claim by dispossessor: lhvisionclinic.com; sector: Healthcare
  First observed: 2023-08-30.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/919
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
