title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1649 — Shadow Copy Deletion (dispossessor)'
id: eb6cc79b-d2f2-508f-94c7-b17bd38242f6
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1649
  Ransomware victim claim by dispossessor: petersenjohnson.com; country: US; sector: Healthcare
  First observed: 2023-10-08.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/14
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
