title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2030 — Shadow Copy Deletion (losttrust)'
id: 76b50132-63b2-5717-bf5c-f50758592754
status: deprecated
description: |
  Detects shadow copy deletion commands associated with losttrust ransomware.
  Incident: dragnet-ransomware-2023-2030
  Ransomware victim claim by losttrust: Gold Coin Restaurant; sector: Hospitality and Tourism
  First observed: 2023-09-26.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
