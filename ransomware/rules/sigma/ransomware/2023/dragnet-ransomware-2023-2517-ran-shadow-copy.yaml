title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2517 — Shadow Copy Deletion (dispossessor)'
id: 13770b43-b195-5272-8c74-d6860d5f1064
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2517
  Ransomware victim claim by dispossessor: co.grant.mn.us; country: US; sector: Public Sector
  First observed: 2023-09-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/978
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
