title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3439 — Shadow Copy Deletion (dispossessor)'
id: 626034e8-713c-5a4f-8479-596825f4c8ec
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3439
  Ransomware victim claim by dispossessor: hacla.org; sector: Public Sector
  First observed: 2023-03-31.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/629
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
