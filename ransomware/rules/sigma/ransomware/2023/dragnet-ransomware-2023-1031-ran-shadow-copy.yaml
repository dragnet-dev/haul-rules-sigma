title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1031 — Shadow Copy Deletion (dispossessor)'
id: ed48e793-85cd-59a6-883e-f9f18d6f2c11
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1031
  Ransomware victim claim by dispossessor: charm.com; sector: Healthcare
  First observed: 2023-08-27.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/287
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
