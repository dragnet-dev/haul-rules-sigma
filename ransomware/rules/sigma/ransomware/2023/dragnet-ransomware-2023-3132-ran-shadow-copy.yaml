title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3132 — Shadow Copy Deletion (dispossessor)'
id: e5157446-2290-54c5-b7ce-255d1d0b8969
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3132
  Ransomware victim claim by dispossessor: aluminumsandcastingsfoundry.com; sector: Manufacturing
  First observed: 2023-06-07.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1018
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
