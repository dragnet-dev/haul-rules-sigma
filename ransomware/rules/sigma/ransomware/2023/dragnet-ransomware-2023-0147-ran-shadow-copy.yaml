title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0147 — Shadow Copy Deletion (cyclops)'
id: 26977500-3ce0-5ef2-b45a-09150d12d234
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cyclops ransomware.
  Incident: dragnet-ransomware-2023-0147
  Ransomware victim claim by cyclops: Guatemala Military Intelligence Directorate; country: GT; sector: Public Sector
  First observed: 2023-06-30.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
