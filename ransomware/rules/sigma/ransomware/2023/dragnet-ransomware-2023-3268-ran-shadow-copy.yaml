title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3268 — Shadow Copy Deletion (karakurt)'
id: ecab80a6-227b-50ac-88c6-2e0c4e1a4e73
status: deprecated
description: |
  Detects shadow copy deletion commands associated with karakurt ransomware.
  Incident: dragnet-ransomware-2023-3268
  Ransomware victim claim by karakurt: MICROFINANCE INSTITUTION; sector: Financial Services
  First observed: 2023-03-28.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
