title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0199 — Shadow Copy Deletion (dispossessor)'
id: 0ca1f50c-042f-545a-8811-ba3a188fa47e
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0199
  Ransomware victim claim by dispossessor: phihydraulics.com; sector: Manufacturing
  First observed: 2023-11-21.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1172
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
