description: |
  Detects shadow copy deletion commands associated with crosslock ransomware.
  Incident: dragnet-ransomware-2023-4721
  Ransomware victim claim by crosslock: validcertificadora.com.br; country: BR; sector: Agriculture and Food Production
  First observed: 2023-04-17.
  Confidence: 90% (ransomware_live).
references:
