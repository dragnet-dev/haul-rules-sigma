title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4011 — Shadow Copy Deletion (dispossessor)'
id: ed03af59-8f8e-54d2-9c42-b3bacd7ad210
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4011
  Ransomware victim claim by dispossessor: welbro.com; country: US; sector: Business Services
  First observed: 2023-11-21.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/9
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
