title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4818 — Shadow Copy Deletion (ransomed)'
id: fb90caa6-3e47-5ce4-981b-91c22482e37d
status: experimental
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-4818
  Ransomware victim claim by ransomed: Optimity.co.uk; country: GB; sector: Technology
  First observed: 2023-08-23.
  Confidence: 90% (ransomware_live).
references:
  - https://ransomed.vc/op.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
