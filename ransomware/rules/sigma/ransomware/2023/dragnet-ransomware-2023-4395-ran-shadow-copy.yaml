title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4395 — Shadow Copy Deletion (dispossessor)'
id: ffe302ac-0385-5642-9142-c40998fc0ddf
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4395
  Ransomware victim claim by dispossessor: greggardnergm.com; sector: Consumer Services
  First observed: 2023-03-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/569
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
