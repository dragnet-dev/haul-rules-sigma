description: |
  Detects shadow copy deletion commands associated with monti ransomware.
  Incident: dragnet-ransomware-2023-0138
  Ransomware victim claim by monti: Magsaysay Maritime - Press Release; country: PH; sector: Business Services
  First observed: 2023-11-09.
