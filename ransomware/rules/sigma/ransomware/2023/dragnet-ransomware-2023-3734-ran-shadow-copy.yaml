title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3734 — Shadow Copy Deletion (dispossessor)'
id: 758fea8d-9dda-50bd-a983-c6b03f6a52f5
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3734
  Ransomware victim claim by dispossessor: pinelandschool.org; sector: Education
  First observed: 2023-04-17.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/663
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
