title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0982 — Shadow Copy Deletion (dispossessor)'
id: 8f364866-f568-5071-a0b9-aa04904fd0b5
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0982
  Ransomware victim claim by dispossessor: insidesource.com; country: US; sector: Business Services
  First observed: 2023-12-16.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/5
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
