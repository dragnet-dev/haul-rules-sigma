title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0012 — Shadow Copy Deletion (dispossessor)'
id: 9ec37f61-ad0e-5c70-97d9-1e78f4459b16
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0012
  Ransomware victim claim by dispossessor: ccadm.org; sector: Business Services
  First observed: 2023-12-13.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1219
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
