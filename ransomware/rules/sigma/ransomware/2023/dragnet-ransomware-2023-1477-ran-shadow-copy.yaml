title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1477 — Shadow Copy Deletion (dispossessor)'
id: dc5ee15c-6516-5350-a977-07241c4973ed
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1477
  Ransomware victim claim by dispossessor: servex-us.com; sector: Not Found
  First observed: 2023-04-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/643
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
