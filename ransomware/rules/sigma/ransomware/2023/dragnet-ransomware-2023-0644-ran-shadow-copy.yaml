title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0644 — Shadow Copy Deletion (dispossessor)'
id: 62ff3ce6-e8a0-5c39-baf2-81f6efa7d010
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0644
  Ransomware victim claim by dispossessor: yaleappliance.com; country: US; sector: Business Services
  First observed: 2023-11-10.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/11
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
