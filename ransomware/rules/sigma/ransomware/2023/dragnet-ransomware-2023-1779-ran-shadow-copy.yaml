title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1779 — Shadow Copy Deletion (raznatovic)'
id: 7efa7b28-12c9-5438-b3ad-c1bb95227c76
status: experimental
description: |
  Detects shadow copy deletion commands associated with raznatovic ransomware.
  Incident: dragnet-ransomware-2023-1779
  Ransomware victim claim by raznatovic: TechKids aka MindX; sector: Education
  First observed: 2023-12-17.
  Confidence: 90% (ransomware_live).
references:
  - https://ransomed.vc/samo/TechKids.txt
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
