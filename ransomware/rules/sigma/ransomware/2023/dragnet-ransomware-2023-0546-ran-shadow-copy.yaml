title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0546 — Shadow Copy Deletion (dragonforce)'
id: 062bcbf1-b539-5041-a0a5-60260aaff22e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with dragonforce ransomware.
  Incident: dragnet-ransomware-2023-0546
  Ransomware victim claim by dragonforce: The GBUAHN; sector: Healthcare
  First observed: 2023-12-13.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
