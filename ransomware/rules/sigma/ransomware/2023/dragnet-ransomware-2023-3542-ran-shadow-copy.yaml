title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3542 — Shadow Copy Deletion (dispossessor)'
id: a465bf1d-2fc0-5186-ba0c-8c1c6b95e075
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-3542
  Ransomware victim claim by dispossessor: motherson.com; sector: Manufacturing
  First observed: 2023-07-10.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/126
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
