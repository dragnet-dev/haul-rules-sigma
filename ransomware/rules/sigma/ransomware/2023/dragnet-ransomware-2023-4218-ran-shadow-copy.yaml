title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4218 — Shadow Copy Deletion (toufan)'
id: 4b2f0abd-ec93-5c12-9411-cfdd6c0f5bc1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with toufan ransomware.
  Incident: dragnet-ransomware-2023-4218
  Ransomware victim claim by toufan: giddirect.com; sector: Business Services
  First observed: 2023-12-19.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
