description: |
  Detects shadow copy deletion commands associated with raznatovic ransomware.
  Incident: dragnet-ransomware-2023-1134
  Ransomware victim claim by raznatovic: Colonial Pipeline; sector: Energy
  First observed: 2023-12-17.
  Confidence: 90% (ransomware_live).
