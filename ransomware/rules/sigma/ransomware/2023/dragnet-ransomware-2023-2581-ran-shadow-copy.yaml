title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2581 — Shadow Copy Deletion (dispossessor)'
id: f1973a34-784b-5538-9987-b0e2068f6423
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2581
  Ransomware victim claim by dispossessor: islandinsurance.ca; country: CA; sector: Financial Services
  First observed: 2023-04-19.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/669
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
