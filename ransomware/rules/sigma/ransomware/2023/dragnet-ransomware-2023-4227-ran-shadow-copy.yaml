title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4227 — Shadow Copy Deletion (dispossessor)'
id: 0c9971c2-eae2-5232-853f-8da0f59012db
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4227
  Ransomware victim claim by dispossessor: csem.qc.ca; country: CA; sector: Business Services
  First observed: 2023-08-30.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/920
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
