title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4048 — Shadow Copy Deletion (dispossessor)'
id: 865b00e7-ace8-5176-9c40-0e49cb59a241
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4048
  Ransomware victim claim by dispossessor: co.pickens.sc.us; country: US; sector: Public Sector
  First observed: 2023-12-25.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1260
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
