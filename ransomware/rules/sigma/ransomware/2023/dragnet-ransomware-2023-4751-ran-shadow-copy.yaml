title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4751 — Shadow Copy Deletion (malekteam)'
id: a01cec13-85da-54b6-9592-8cc5a7a9acc8
status: experimental
description: |
  Detects shadow copy deletion commands associated with malekteam ransomware.
  Incident: dragnet-ransomware-2023-4751
  Ransomware victim claim by malekteam: Ono Academic College; sector: Education
  First observed: 2023-12-24.
  Confidence: 90% (ransomware_live).
references:
  - http://195.14.123.2/ono.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
