title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0611 — Shadow Copy Deletion (alphv)'
id: 84351ba2-58af-59e7-9666-3d51fec960e1
status: experimental
description: |
  Detects shadow copy deletion commands associated with alphv ransomware.
  Incident: dragnet-ransomware-2023-0611
  Ransomware victim claim by alphv: Phil-Data Business Systems was hacked. A lot of critical data was stolen. We've gained acc; country: PH; sector: Business Services
  First observed: 2023-09-24.
  Confidence: 90% (ransomware_live).
references:
  - http://alphvmmm27o3abo3r2mlmjrpdmzle3rykajqc5xsj7j7ejksbpsa36ad.onion/8497b099-2ee7-4ebd-8215-5a1ef9f18534
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
