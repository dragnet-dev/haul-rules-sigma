title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2135 — Shadow Copy Deletion (dispossessor)'
id: 6085d12f-aa6f-57ee-8033-4262c6ae7e2b
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-2135
  Ransomware victim claim by dispossessor: tgh.org; sector: Healthcare
  First observed: 2023-07-05.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/339
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
