title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4491 — Shadow Copy Deletion (ransomed)'
id: 2f28b61e-5344-523a-afdd-91acb0ea6ecd
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ransomed ransomware.
  Incident: dragnet-ransomware-2023-4491
  Ransomware victim claim by ransomed: bnm.bg; country: BG; sector: Financial Services
  First observed: 2023-09-26.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
