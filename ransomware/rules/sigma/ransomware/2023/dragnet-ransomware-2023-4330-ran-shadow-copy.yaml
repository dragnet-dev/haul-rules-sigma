status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2023-4330
  Ransomware victim claim by incransom: Universal Sewing Supply Inc; country: US; sector: Manufacturing
  First observed: 2023-10-31.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog7vmuq7rktic73r4ha4j757m3ptym37tyvifzp2roedyyzzxid.onion/blog/leak/26AF23C3E27CFD1C
