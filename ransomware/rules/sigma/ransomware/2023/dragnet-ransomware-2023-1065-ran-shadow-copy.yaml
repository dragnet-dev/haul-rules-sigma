title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1065 — Shadow Copy Deletion (dispossessor)'
id: 7074bac3-5ea8-5f2f-9760-56143b9f3853
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1065
  Ransomware victim claim by dispossessor: quifatex.com; country: EC; sector: Healthcare
  First observed: 2023-11-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1137
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
