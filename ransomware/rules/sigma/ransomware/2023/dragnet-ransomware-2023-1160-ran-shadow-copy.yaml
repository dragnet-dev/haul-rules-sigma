title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1160 — Shadow Copy Deletion (dispossessor)'
id: 9f7f4c7e-0c0f-5d91-8d1e-bb71384bef22
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1160
  Ransomware victim claim by dispossessor: cefcostores.com; sector: Business Services
  First observed: 2023-08-11.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/344
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
