title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3790 — Shadow Copy Deletion (siegedsec)'
id: 60c1a196-c117-5d98-83b0-6eec5eda46c7
status: deprecated
description: |
  Detects shadow copy deletion commands associated with siegedsec ransomware.
  Incident: dragnet-ransomware-2023-3790
  Ransomware victim claim by siegedsec: Staples; sector: Consumer Services
  First observed: 2023-12-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
