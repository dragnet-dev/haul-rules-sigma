title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0166 — Shadow Copy Deletion (unsafe)'
id: a11b820e-26ff-5af4-ab6f-5bf812013b32
status: deprecated
description: |
  Detects shadow copy deletion commands associated with unsafe ransomware.
  Incident: dragnet-ransomware-2023-0166
  Ransomware victim claim by unsafe: TAG Aviation; sector: Transportation/Logistics
  First observed: 2023-06-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
