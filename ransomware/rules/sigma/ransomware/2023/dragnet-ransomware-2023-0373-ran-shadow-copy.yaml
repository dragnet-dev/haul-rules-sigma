title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0373 — Shadow Copy Deletion (dispossessor)'
id: 7bd92865-636b-5b98-a159-43959cc3791c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0373
  Ransomware victim claim by dispossessor: chs.ca; country: CA; sector: Healthcare
  First observed: 2023-10-21.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1068
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
