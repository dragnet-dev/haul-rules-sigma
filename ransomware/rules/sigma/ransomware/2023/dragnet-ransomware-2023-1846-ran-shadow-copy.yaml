title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1846 — Shadow Copy Deletion (dispossessor)'
id: 6f6f36f3-985f-5c3b-959e-57f390d4a2c4
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1846
  Ransomware victim claim by dispossessor: abhmfg.com; sector: Manufacturing
  First observed: 2023-11-03.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1105
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
