title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1317 — Shadow Copy Deletion (werewolves)'
id: 40375c48-e146-5309-a869-2c356eed9226
status: experimental
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-1317
  Ransomware victim claim by werewolves: solveindustrial.com; country: US; sector: Manufacturing
  First observed: 2023-12-22.
  Confidence: 90% (ransomware_live).
references:
  - https://weerwolven.biz/ru/vasexperts-ru.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
