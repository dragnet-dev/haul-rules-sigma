title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1075 — Shadow Copy Deletion (dispossessor)'
id: f87bbc92-c370-50f6-a113-77be7277c62a
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1075
  Ransomware victim claim by dispossessor: leezeragency.com; sector: Business Services
  First observed: 2023-11-28.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/7
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
