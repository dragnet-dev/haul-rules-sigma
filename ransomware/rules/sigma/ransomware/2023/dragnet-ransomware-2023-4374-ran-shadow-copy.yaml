title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4374 — Shadow Copy Deletion (dispossessor)'
id: b9dc5b05-0633-55eb-b9d5-6dbee842d658
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4374
  Ransomware victim claim by dispossessor: parkavedoors.com; sector: Business Services
  First observed: 2023-01-31.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/453
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
