title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4659 — Shadow Copy Deletion (vendetta)'
id: 8ce6d243-b388-5ad6-9209-5618ab935ca5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vendetta ransomware.
  Incident: dragnet-ransomware-2023-4659
  Ransomware victim claim by vendetta: Chowtaifook; sector: Consumer Services
  First observed: 2023-02-27.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
