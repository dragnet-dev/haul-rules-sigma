title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0504 — Shadow Copy Deletion (cyclops)'
id: 6d4c1873-bb88-51b6-98fa-8380894e89d8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cyclops ransomware.
  Incident: dragnet-ransomware-2023-0504
  Ransomware victim claim by cyclops: ALTARGRUP; sector: Financial Services
  First observed: 2023-06-29.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
