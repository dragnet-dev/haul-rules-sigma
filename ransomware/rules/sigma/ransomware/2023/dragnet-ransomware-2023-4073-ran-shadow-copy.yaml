title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4073 — Shadow Copy Deletion (daixin)'
id: d2a41982-5e16-5091-a998-fa36e805a1cb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with daixin ransomware.
  Incident: dragnet-ransomware-2023-4073
  Ransomware victim claim by daixin: Columbus Regional Healthcare System; country: US; sector: Healthcare
  First observed: 2023-06-09.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
