title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3785 — Shadow Copy Deletion (cactus)'
id: 6c5b12fa-7814-5b30-977d-ec35896122dc
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cactus ransomware.
  Incident: dragnet-ransomware-2023-3785
  Ransomware victim claim by cactus: Cornerstone Projects Group; sector: Construction
  First observed: 2023-10-05.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
