title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4768 — Shadow Copy Deletion (dispossessor)'
id: 72a16ada-e272-51fe-984a-db199c26c201
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4768
  Ransomware victim claim by dispossessor: www.webberrestaurantgroup.com; country: US; sector: Hospitality and Tourism
  First observed: 2023-09-26.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/18
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
