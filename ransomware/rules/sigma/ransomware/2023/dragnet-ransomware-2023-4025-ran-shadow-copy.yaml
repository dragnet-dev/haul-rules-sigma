title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4025 — Shadow Copy Deletion (dispossessor)'
id: 77dd6607-e26b-557f-80cd-a6a6fc429699
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-4025
  Ransomware victim claim by dispossessor: brownintegratedlogistics.com; sector: Transportation/Logistics
  First observed: 2023-12-30.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1273
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
