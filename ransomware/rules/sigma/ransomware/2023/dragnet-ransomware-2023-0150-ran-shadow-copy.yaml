title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0150 — Shadow Copy Deletion (dispossessor)'
id: 26694e69-2783-5f9a-8d9b-556ea8545f40
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0150
  Ransomware victim claim by dispossessor: godbeylaw.com; sector: Business Services
  First observed: 2023-08-31.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/943
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
