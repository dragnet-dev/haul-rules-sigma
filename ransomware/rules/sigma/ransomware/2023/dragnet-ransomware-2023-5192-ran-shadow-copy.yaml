title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5192 — Shadow Copy Deletion (trigona)'
id: 9c1b53a6-b28c-5a10-9850-4c7851bc625d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with trigona ransomware.
  Incident: dragnet-ransomware-2023-5192
  Ransomware victim claim by trigona: Leidos; sector: Technology
  First observed: 2023-05-25.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
