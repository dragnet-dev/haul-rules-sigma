description: |
  Detects shadow copy deletion commands associated with stormous ransomware.
  Incident: dragnet-ransomware-2023-1618
  Ransomware victim claim by stormous: Ministry of Energy and Mines (Cuba) " STORMOUS + GhostSec "; country: CU; sector: Energy
  First observed: 2023-07-12.
  Confidence: 90% (ransomware_live).
references:
