title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5062 — Shadow Copy Deletion (incransom)'
id: ac0750da-39af-5484-b5dc-2eebc2bb9882
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2023-5062
  Ransomware victim claim by incransom: Tri-city Medical Center; sector: Healthcare
  First observed: 2023-12-07.
  Confidence: 90% (ransomware_live).
references:
