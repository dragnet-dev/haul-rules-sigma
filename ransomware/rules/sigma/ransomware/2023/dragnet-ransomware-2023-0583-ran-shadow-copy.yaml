title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0583 — Shadow Copy Deletion (dispossessor)'
id: d005ce64-016a-5fd5-9bd2-3e93751c44a0
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-0583
  Ransomware victim claim by dispossessor: adaresec.com; country: US; sector: Business Services
  First observed: 2023-06-24.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/60
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
