description: |
  Detects shadow copy deletion commands associated with threeam ransomware.
  Incident: dragnet-ransomware-2023-0017
  Ransomware victim claim by threeam: mtmrobotics.com; country: US; sector: Technology
  First observed: 2023-11-14.
  Confidence: 90% (ransomware_live).
references:
