title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-0080 — Shadow Copy Deletion (play)'
id: a1934d43-5c55-5a25-9495-e7a5aecb2023
status: deprecated
description: |
  Detects shadow copy deletion commands associated with play ransomware.
  Incident: dragnet-ransomware-2023-0080
  Associated with Play.
  Ransomware victim claim by play: Cambridge Group of Clubs; country: CA; sector: Hospitality and Tourism
  First observed: 2023-06-28.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.play
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
