title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-1109 — Shadow Copy Deletion (dispossessor)'
id: 258d313b-4cc8-567e-8e5e-16e1fac8f733
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-1109
  Ransomware victim claim by dispossessor: ohiohistory.org; sector: Public Sector
  First observed: 2023-07-26.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1013
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
