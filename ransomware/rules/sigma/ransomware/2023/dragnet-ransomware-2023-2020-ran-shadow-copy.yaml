title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2020 — Shadow Copy Deletion (werewolves)'
id: 22069060-96ad-583b-bdcf-4a94d8ddb3ef
status: experimental
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-2020
  Ransomware victim claim by werewolves: krasnoyarsk.amaks; sector: Hospitality and Tourism
  First observed: 2023-09-14.
  Confidence: 90% (ransomware_live).
references:
  - https://werewolves.pro/en/acac.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
