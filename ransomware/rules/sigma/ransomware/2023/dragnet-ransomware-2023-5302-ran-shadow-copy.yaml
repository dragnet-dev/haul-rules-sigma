title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-5302 — Shadow Copy Deletion (dispossessor)'
id: a04da409-db27-5309-acc5-f60d0067d00c
status: experimental
description: |
  Detects shadow copy deletion commands associated with dispossessor ransomware.
  Incident: dragnet-ransomware-2023-5302
  Ransomware victim claim by dispossessor: aldoshoes.com; sector: Business Services
  First observed: 2023-12-05.
  Confidence: 90% (ransomware_live).
references:
  - https://dispossessor.com/blogs/1192
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
