title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-2072 — Shadow Copy Deletion (incransom)'
id: 3e2e5336-11a6-5257-afa2-c00c61d6058a
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2023-2072
  Ransomware victim claim by incransom: Xerox Corp; country: US; sector: Technology
  First observed: 2023-12-29.
  Confidence: 90% (ransomware_live).
references:
  - http://incapt.blog/blog/leak/5FF7D1494F0528D8
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
