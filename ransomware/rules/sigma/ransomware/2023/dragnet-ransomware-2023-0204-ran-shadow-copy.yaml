status: experimental
description: |
  Detects shadow copy deletion commands associated with blacksuit ransomware.
  Incident: dragnet-ransomware-2023-0204
  Ransomware victim claim by blacksuit: Government of Brazil - Business Information Brazil; country: BR; sector: Public Sector
  First observed: 2023-10-19.
  Confidence: 90% (ransomware_live).
references:
  - http://weg7sdx54bevnvulapqu6bpzwztryeflq3s23tegbmnhkbpqz637f2yd.onion/?id=i2aHR1Br7RctC83x
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
