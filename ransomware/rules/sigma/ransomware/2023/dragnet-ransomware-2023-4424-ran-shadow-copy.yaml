title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-4424 — Shadow Copy Deletion (vendetta)'
id: 0a25026f-6b54-542f-83aa-c84ed40f2f5e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with vendetta ransomware.
  Incident: dragnet-ransomware-2023-4424
  Ransomware victim claim by vendetta: Highwealth; sector: Construction
  First observed: 2023-02-21.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
