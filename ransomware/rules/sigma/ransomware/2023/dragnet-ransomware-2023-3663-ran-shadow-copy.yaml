title: 'Dragnet [Ransomware]: dragnet-ransomware-2023-3663 — Shadow Copy Deletion (werewolves)'
id: 5647af71-1dd7-5525-810e-3ef72bc5a4cd
status: experimental
description: |
  Detects shadow copy deletion commands associated with werewolves ransomware.
  Incident: dragnet-ransomware-2023-3663
  Ransomware victim claim by werewolves: roomhotel-sochi.ru; country: RU; sector: Hospitality and Tourism
  First observed: 2023-09-30.
  Confidence: 90% (ransomware_live).
references:
  - https://werewolves.pro/en/carmoney-ru.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
