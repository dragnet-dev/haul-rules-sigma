description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2025-7546
  Ransomware victim claim by rhysida: ORU Mabee Center; country: US; sector: Education
  First observed: 2025-01-24.
  Confidence: 90% (ransomware_live).
references:
