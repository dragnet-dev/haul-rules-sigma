description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7578
  Ransomware victim claim by lynx: Delta Screen & Filtration; country: US; sector: Manufacturing
  First observed: 2025-01-29.
  Confidence: 90% (ransomware_live).
references:
