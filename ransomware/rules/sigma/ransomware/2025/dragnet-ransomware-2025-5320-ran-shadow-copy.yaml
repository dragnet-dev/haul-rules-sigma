title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5320 — Shadow Copy Deletion (datacarry)'
id: a49c21b1-c3d3-5b35-99fd-1eaf9a98ca8e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with datacarry ransomware.
  Incident: dragnet-ransomware-2025-5320
  Ransomware victim claim by datacarry: Étude Bordet; country: BE; sector: Business Services
  First observed: 2025-01-12.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
