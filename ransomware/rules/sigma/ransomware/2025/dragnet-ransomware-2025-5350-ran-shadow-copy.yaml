description: |
  Detects shadow copy deletion commands associated with global ransomware.
  Incident: dragnet-ransomware-2025-5350
  Ransomware victim claim by global: moelco.es; country: ES; sector: Manufacturing
  First observed: 2025-07-25.
references:
author: dragnet-bot
date: 2026-05-20
tags:
