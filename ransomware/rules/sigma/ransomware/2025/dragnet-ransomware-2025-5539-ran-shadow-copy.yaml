title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5539 — Shadow Copy Deletion (lynx)'
id: dc548f6a-36d0-5cb5-8426-ba74041cb45b
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-5539
  Ransomware victim claim by lynx: Vvf Ilinois Services; country: CA; sector: Manufacturing
  First observed: 2025-02-17.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67b3349544fac8dca10935c5
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
