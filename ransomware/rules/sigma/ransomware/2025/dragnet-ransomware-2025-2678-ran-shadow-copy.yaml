title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2678 — Shadow Copy Deletion (ciphbit)'
id: c0f71ea1-78d4-53fa-a88e-4eb2beff1da4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with ciphbit ransomware.
  Incident: dragnet-ransomware-2025-2678
  Ransomware victim claim by ciphbit: Kitevuc - Equipamentos E Veiculos Utilitários E Comerciais; country: PT; sector: Manufacturing
  First observed: 2025-01-01.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
