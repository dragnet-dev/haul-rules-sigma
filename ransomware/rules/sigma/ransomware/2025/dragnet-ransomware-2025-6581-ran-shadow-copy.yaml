title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6581 — Shadow Copy Deletion (morpheus)'
id: 4702383f-e7a7-5e54-8cb8-4f27f3ada953
status: deprecated
description: |
  Detects shadow copy deletion commands associated with morpheus ransomware.
  Incident: dragnet-ransomware-2025-6581
  Ransomware victim claim by morpheus: Teamglobal; country: IN; sector: Business Services
  First observed: 2025-11-17.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
