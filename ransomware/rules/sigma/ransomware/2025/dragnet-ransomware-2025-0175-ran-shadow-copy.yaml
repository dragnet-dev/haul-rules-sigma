title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0175 — Shadow Copy Deletion (brotherhood)'
id: 20b7174c-3883-5adb-8c24-948f59bf1975
status: deprecated
description: |
  Detects shadow copy deletion commands associated with brotherhood ransomware.
  Incident: dragnet-ransomware-2025-0175
  Ransomware victim claim by brotherhood: Ninas Jewellery; country: AU; sector: Consumer Services
  First observed: 2025-11-15.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
