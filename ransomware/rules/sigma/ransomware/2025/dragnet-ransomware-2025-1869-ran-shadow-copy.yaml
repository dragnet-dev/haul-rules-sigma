title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1869 — Shadow Copy Deletion (akira)'
id: 5288a4a1-c476-55b1-a18d-d07cd1ff2d9a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-1869
  Associated with Akira.
  Ransomware victim claim by akira: Heinz Hammer Vertragswerkstatt (Mercedes-Benz car dealer); country: DE; sector: Consumer Services
  First observed: 2025-04-18.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
