title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7885 — Shadow Copy Deletion (lynx)'
id: cc8904f6-1d14-55bd-8f18-145a966012fc
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7885
  Ransomware victim claim by lynx: Shinsung Delta Tech; country: KR; sector: Manufacturing
  First observed: 2025-02-05.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67a3a30f61c2d9c619a47500
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
