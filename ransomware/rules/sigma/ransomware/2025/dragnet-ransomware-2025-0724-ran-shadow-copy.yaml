title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0724 — Shadow Copy Deletion (handala)'
id: b8af4f5f-97a8-5967-8d47-b120039b424e
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-0724
  Ransomware victim claim by handala: Y.G. New Idan; country: IL; sector: Public Sector
  First observed: 2025-06-14.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/y-g-new-idan-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
