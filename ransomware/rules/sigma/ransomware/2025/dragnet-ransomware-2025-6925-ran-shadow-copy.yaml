title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6925 — Shadow Copy Deletion (shinyhunters)'
id: 2e553bdb-7592-5285-b71f-bdce77a1a952
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-6925
  Ransomware victim claim by shinyhunters: Engie Resources (Plymouth); country: US; sector: Energy
  First observed: 2025-07-18.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//engie.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
