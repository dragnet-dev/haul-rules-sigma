title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2759 — Shadow Copy Deletion (shinyhunters)'
id: 3fdfb052-ffeb-5d7b-9cb1-9b70e058e28b
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-2759
  Ransomware victim claim by shinyhunters: Chanel; country: FR; sector: Consumer Services
  First observed: 2025-06-27.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//chanel.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
