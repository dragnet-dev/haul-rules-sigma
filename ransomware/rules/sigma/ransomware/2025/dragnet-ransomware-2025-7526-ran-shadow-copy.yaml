title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7526 — Shadow Copy Deletion (lynx)'
id: 3e7715c4-953c-57f6-8dbe-1e6778417134
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7526
  Ransomware victim claim by lynx: Xepa Soul; country: SG; sector: Healthcare
  First observed: 2025-02-11.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67b7024844fac8dca126440c
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
