title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4160 — Shadow Copy Deletion (SilentRansomGroup)'
id: 54813d08-d083-5c62-8452-4a9f131d926e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with SilentRansomGroup ransomware.
  Incident: dragnet-ransomware-2025-4160
  Ransomware victim claim by SilentRansomGroup: Roger Keith and Sons Insurance Agency; country: US; sector: Financial Services
  First observed: 2025-04-05.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
