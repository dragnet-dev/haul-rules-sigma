title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7290 — Shadow Copy Deletion (lynx)'
id: 3d4a2560-303d-5f7b-aa60-08edeb3925c4
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7290
  Ransomware victim claim by lynx: buildingmaterialspecialties.com; country: US; sector: Construction
  First observed: 2025-03-31.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/680abb39d5daa03fd36a377f
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
