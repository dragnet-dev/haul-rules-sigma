title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5443 — Shadow Copy Deletion (handala)'
id: 374e8abf-e37b-58a8-a434-7d8a1d844b90
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-5443
  Ransomware victim claim by handala: Saturday Unveilings – Shadows Have Names; sector: Not Found
  First observed: 2025-10-25.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/saturday-unveilings-shadows-have-names/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
