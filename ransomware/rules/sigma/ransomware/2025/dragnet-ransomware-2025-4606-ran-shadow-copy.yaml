title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4606 — Shadow Copy Deletion (kairos)'
id: c281be95-9d62-5e9c-bade-35082786c762
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2025-4606
  Ransomware victim claim by kairos: OCBAR; country: US; sector: Business Services
  First observed: 2025-10-20.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
