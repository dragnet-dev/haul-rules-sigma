title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7760 — Shadow Copy Deletion (shinyhunters)'
id: d5b180f8-302a-568a-b0a3-0631d635806f
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7760
  Ransomware victim claim by shinyhunters: S&P Global (spglobal.com); country: US; sector: Financial Services
  First observed: 2025-10-05.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//spg.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
