status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7862
  Ransomware victim claim by lynx: Browdy (bl.local); country: US; sector: Business Services
  First observed: 2025-01-13.
  Confidence: 90% (ransomware_live).
references:
