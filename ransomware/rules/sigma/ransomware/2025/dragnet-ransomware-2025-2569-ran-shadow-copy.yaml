title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2569 — Shadow Copy Deletion (rhysida)'
id: 9472ae79-4749-5137-ab14-cb5920ad91f3
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rhysida ransomware.
  Incident: dragnet-ransomware-2025-2569
  Ransomware victim claim by rhysida: JASCO Applied Sciences; country: CA; sector: Technology
  First observed: 2025-10-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
