title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0130 — Shadow Copy Deletion (lynx)'
id: e5c7a75a-d469-51c2-a82f-306a1449acdd
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0130
  Ransomware victim claim by lynx: McElwee Firm; country: US; sector: Business Services
  First observed: 2025-04-15.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67fed90ece8dcc3b0d917e53
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
