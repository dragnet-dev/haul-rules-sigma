title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1072 — Shadow Copy Deletion (lynx)'
id: 65618bde-c873-5419-9cac-7c98e36c1b62
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1072
  Ransomware victim claim by lynx: Dynamic Closures; country: CA; sector: Manufacturing
  First observed: 2025-02-08.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67c9b8e344fac8dca1ac9227
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
