title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2528 — Shadow Copy Deletion (pear)'
id: 694729b1-aab7-50d0-95cd-7a0a36cb6350
status: experimental
description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-2528
  Ransomware victim claim by pear: Kalchschmid GmbH & Co. KG; country: DE; sector: Manufacturing
  First observed: 2025-07-17.
  Confidence: 90% (ransomware_live).
references:
  - http://peargxn3oki34c4savcbcfqofjjwjnnyrlrbszfv6ujlx36mhrh57did.onion/Companies/kalchschmid
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
