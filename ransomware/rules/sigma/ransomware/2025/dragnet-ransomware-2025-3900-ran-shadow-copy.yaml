title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3900 — Shadow Copy Deletion (handala)'
id: c714b6f2-8a14-5255-802e-f010a79c5d1c
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3900
  Ransomware victim claim by handala: Hotam EC; country: EC; sector: Business Services
  First observed: 2025-06-30.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/hotam-ec-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
