title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2951 — Shadow Copy Deletion (funksec)'
id: c0da8c3d-2319-5455-b072-6ada31782e97
status: experimental
description: |
  Detects shadow copy deletion commands associated with funksec ransomware.
  Incident: dragnet-ransomware-2025-2951
  Ransomware victim claim by funksec: extremeperformance.com; country: US; sector: Consumer Services
  First observed: 2025-03-12.
  Confidence: 90% (ransomware_live).
references:
  - http://funksec.top/extreme
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
