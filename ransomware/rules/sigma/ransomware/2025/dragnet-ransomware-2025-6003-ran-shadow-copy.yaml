title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6003 — Shadow Copy Deletion (lynx)'
id: 89c76e47-fd72-5b14-aef2-d05b267e9082
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-6003
  Ransomware victim claim by lynx: Geokon; country: US; sector: Manufacturing
  First observed: 2025-02-16.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67b1ed4f44fac8dca1016d9f
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
