title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3721 — Shadow Copy Deletion (lynx)'
id: d0b0255e-b440-584c-adf9-58987dcedb9a
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-3721
  Ransomware victim claim by lynx: Alo Center (hq.aloteknik.se); country: SE; sector: Technology
  First observed: 2025-01-18.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67978a0305a779c3d32e2bfa
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
