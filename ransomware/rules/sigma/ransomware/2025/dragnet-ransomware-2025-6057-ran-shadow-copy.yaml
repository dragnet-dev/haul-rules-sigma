title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6057 — Shadow Copy Deletion (incransom)'
id: 1fb8e019-9981-526d-9702-46d8f51892a6
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-6057
  Ransomware victim claim by incransom: Orthopaedic Specialists of Connecticut; country: US; sector: Healthcare
  First observed: 2025-04-14.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/67ee8d1d516e69ca611ee27d
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
