title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4158 — Shadow Copy Deletion (radar)'
id: 122f97c3-d0ca-5d08-9c2c-a9cc99065ff9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radar ransomware.
  Incident: dragnet-ransomware-2025-4158
  Ransomware victim claim by radar: UrbanX PTY LTD; country: AU; sector: Business Services
  First observed: 2025-10-17.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
