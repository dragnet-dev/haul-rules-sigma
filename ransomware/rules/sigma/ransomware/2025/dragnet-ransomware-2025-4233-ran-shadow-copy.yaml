title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4233 — Shadow Copy Deletion (datacarry)'
id: 1f0bfbbb-6aa6-5414-ac66-36ef1836e4f6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with datacarry ransomware.
  Incident: dragnet-ransomware-2025-4233
  Ransomware victim claim by datacarry: Camomilla; country: IT; sector: Consumer Services
  First observed: 2025-12-06.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
