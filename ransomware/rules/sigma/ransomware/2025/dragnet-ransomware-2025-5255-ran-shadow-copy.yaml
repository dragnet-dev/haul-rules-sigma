title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5255 — Shadow Copy Deletion (akira)'
id: e9a23ce6-0a67-54ec-b14a-0284bcd66f5e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-5255
  Associated with Akira.
  Ransomware victim claim by akira: Nickman, DHK Architects, Profondia, Talbot & Associates, Fishbowl Solutions.; country: US; sector: Healthcare
  First observed: 2025-12-08.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
