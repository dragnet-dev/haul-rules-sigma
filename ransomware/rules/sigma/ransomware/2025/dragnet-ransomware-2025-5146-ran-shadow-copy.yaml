title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5146 — Shadow Copy Deletion (shinyhunters)'
id: 5ffe8f1d-e38d-5a67-ad6f-9182d4a062e0
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-5146
  Ransomware victim claim by shinyhunters: Marriott; country: US; sector: Hospitality and Tourism
  First observed: 2025-08-17.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//marriott.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
