title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6511 — Shadow Copy Deletion (clop)'
id: 86c4abb2-2a2f-55c0-a5eb-e874e6e2685d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2025-6511
  Ransomware victim claim by clop: cherokeedistributing.com; country: US; sector: Agriculture and Food Production
  First observed: 2025-02-10.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
