title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3665 — Shadow Copy Deletion (nasirsecurity)'
id: bb890bf3-533a-5cf3-8609-539efa9e4494
status: experimental
description: |
  Detects shadow copy deletion commands associated with nasirsecurity ransomware.
  Incident: dragnet-ransomware-2025-3665
  Ransomware victim claim by nasirsecurity: Taldor; country: IL; sector: Technology
  First observed: 2025-10-05.
  Confidence: 90% (ransomware_live).
references:
  - http://nasir.cc/pages/taldor.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
