title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4262 — Shadow Copy Deletion (daixin)'
id: e64f9ad2-fba7-59d6-9cde-aab9decd1da9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with daixin ransomware.
  Incident: dragnet-ransomware-2025-4262
  Ransomware victim claim by daixin: SGS Co; country: US; sector: Business Services
  First observed: 2025-09-11.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
