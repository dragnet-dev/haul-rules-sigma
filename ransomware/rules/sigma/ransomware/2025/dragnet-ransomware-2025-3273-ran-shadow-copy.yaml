title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3273 — Shadow Copy Deletion (shinyhunters)'
id: 36457ee1-55a4-5d2f-bc33-4ecd14c6e185
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-3273
  Ransomware victim claim by shinyhunters: Red Hat, Inc.; country: US; sector: Technology
  First observed: 2025-09-13.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn/rhel.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
