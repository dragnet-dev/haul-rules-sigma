title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0223 — Shadow Copy Deletion (lynx)'
id: 839a75fa-7889-51dd-8249-43a45f017f6f
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0223
  Ransomware victim claim by lynx: Alton Steel; country: US; sector: Manufacturing
  First observed: 2025-03-30.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67ed8bd0ce8dcc3b0dd91c6a
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
