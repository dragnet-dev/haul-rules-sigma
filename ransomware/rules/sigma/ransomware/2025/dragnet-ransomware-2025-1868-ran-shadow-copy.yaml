title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1868 — Shadow Copy Deletion (lynx)'
id: 98df954d-a6c9-5f85-b277-a1c8bfa1c7cf
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1868
  Ransomware victim claim by lynx: AMICIO; country: FR; sector: Business Services
  First observed: 2025-03-07.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67d9c5a051e131d63479e0b1
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
