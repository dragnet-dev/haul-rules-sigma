title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4933 — Shadow Copy Deletion (datacarry)'
id: 1f4c7744-c468-5cb4-a25d-00a75fa19d92
status: deprecated
description: |
  Detects shadow copy deletion commands associated with datacarry ransomware.
  Incident: dragnet-ransomware-2025-4933
  Ransomware victim claim by datacarry: Alliance Healthcare IT; country: IT; sector: Healthcare
  First observed: 2025-05-29.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
