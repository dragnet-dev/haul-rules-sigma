title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2760 — Shadow Copy Deletion (killsec)'
id: 773cc735-6c06-532c-8c20-0550558d66b9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with killsec ransomware.
  Incident: dragnet-ransomware-2025-2760
  Ransomware victim claim by killsec: Force Brokerage; country: US; sector: Financial Services
  First observed: 2025-11-15.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
