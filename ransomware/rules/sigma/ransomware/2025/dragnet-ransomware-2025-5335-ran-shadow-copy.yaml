status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-5335
  Ransomware victim claim by lynx: (M)Empire-home-center; country: US; sector: Consumer Services
  First observed: 2025-01-31.
