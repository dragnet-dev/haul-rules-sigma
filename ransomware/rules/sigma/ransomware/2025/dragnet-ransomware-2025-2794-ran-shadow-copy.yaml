title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2794 — Shadow Copy Deletion (lynx)'
id: 80ebb196-c0c3-568b-af63-215ddcd6a8a2
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-2794
  Ransomware victim claim by lynx: communisis.com & paragon.world; country: GB; sector: Business Services
  First observed: 2025-01-09.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/6787b1db05a779c3d3dadd3a
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
