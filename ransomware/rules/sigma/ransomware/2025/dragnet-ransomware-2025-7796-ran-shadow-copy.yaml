title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7796 — Shadow Copy Deletion (kairos)'
id: 35397398-6594-50e3-84ae-0e004c724868
status: experimental
description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2025-7796
  Ransomware victim claim by kairos: stattorney.org; country: US; sector: Public Sector
  First observed: 2025-03-31.
  Confidence: 90% (ransomware_live).
references:
  - http://nerqnacjmdy3obvevyol7qhazkwkv57dwqvye5v46k5bcujtfa6sduad.onion/detail?code=stattorney-org-usa-325gb-
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
