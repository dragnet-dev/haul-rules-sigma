title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1259 — Shadow Copy Deletion (rebornvc)'
id: 8771e210-a0fb-59cc-9004-3079aa4df226
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rebornvc ransomware.
  Incident: dragnet-ransomware-2025-1259
  Ransomware victim claim by rebornvc: snapav.com / resideo.com; country: US; sector: Technology
  First observed: 2025-07-08.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
