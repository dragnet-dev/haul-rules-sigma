title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4588 — Shadow Copy Deletion (akira)'
id: 9ec4a60c-a485-59db-9dec-b99c6f5b3c17
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-4588
  Associated with Akira.
  Ransomware victim claim by akira: JDC Air & Sea Freight (HEUEL LOGISTICS Group); country: DE; sector: Transportation/Logistics
  First observed: 2025-05-21.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
