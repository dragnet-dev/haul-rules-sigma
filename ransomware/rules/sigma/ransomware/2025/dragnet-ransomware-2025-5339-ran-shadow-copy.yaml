title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5339 — Shadow Copy Deletion (kawa4096)'
id: 88834dff-4444-500e-a93d-728c1be7912a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kawa4096 ransomware.
  Incident: dragnet-ransomware-2025-5339
  Ransomware victim claim by kawa4096: heimhaus.de; country: DE; sector: Not Found
  First observed: 2025-06-22.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
