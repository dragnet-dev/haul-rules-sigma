title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6683 — Shadow Copy Deletion (obscura)'
id: ef5a269c-1ac7-5a98-88a3-33931e94b27c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with obscura ransomware.
  Incident: dragnet-ransomware-2025-6683
  Ransomware victim claim by obscura: New Obscura 2.0!; sector: Not Found
  First observed: 2025-12-12.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
