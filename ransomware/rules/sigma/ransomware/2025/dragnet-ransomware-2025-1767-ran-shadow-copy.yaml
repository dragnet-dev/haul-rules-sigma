references:
  - http://xbkv2qey6u3gd3qxcojynrt4h5sgrhkar6whuo74wo63hijnn677jnyd.onion/posts/67ab56e503e546ad96cc4f29/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
