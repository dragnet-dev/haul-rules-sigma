status: experimental
description: |
  Detects shadow copy deletion commands associated with fog ransomware.
  Incident: dragnet-ransomware-2025-1767
  Ransomware victim claim by fog: The University of Notre Dame Australia (nd.edu.au); country: AU; sector: Education
  First observed: 2025-02-11.
