description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-7079
  Ransomware victim claim by pear: Tri-Century Eye Care; country: US; sector: Healthcare
  First observed: 2025-09-03.
  Confidence: 90% (ransomware_live).
references:
  - http://pearsmob5sn44ismokiusuld34pnfwi6ctgin3qbvonpoob4lh3rmtqd.onion/Companies/tricenturyeye
