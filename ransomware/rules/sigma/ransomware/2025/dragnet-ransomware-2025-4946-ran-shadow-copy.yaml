title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4946 — Shadow Copy Deletion (sarcoma)'
id: 95d6a4e1-03df-5041-bae1-869ce0c21d9f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with sarcoma ransomware.
  Incident: dragnet-ransomware-2025-4946
  Ransomware victim claim by sarcoma: SecurU; country: CA; sector: Business Services
  First observed: 2025-06-15.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
