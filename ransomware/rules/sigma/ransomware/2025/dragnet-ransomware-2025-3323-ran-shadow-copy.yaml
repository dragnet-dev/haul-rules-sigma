title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3323 — Shadow Copy Deletion (arkana)'
id: 3ee15321-937d-580a-aa47-d65683c7d0e0
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arkana ransomware.
  Incident: dragnet-ransomware-2025-3323
  Ransomware victim claim by arkana: Wide Open West - WOW!; country: US; sector: Telecommunication
  First observed: 2025-03-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
