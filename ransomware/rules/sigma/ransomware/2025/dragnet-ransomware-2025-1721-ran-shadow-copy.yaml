title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1721 — Shadow Copy Deletion (lynx)'
id: 2425cb07-86a2-5293-bfd9-7c1c19ec2da7
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1721
  Ransomware victim claim by lynx: Direct Traffic Control; country: US; sector: Transportation/Logistics
  First observed: 2025-03-25.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67e2aea2ce8dcc3b0d41719d
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
