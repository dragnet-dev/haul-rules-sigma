title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7751 — Shadow Copy Deletion (payoutsking)'
id: cf9f4882-34b4-5d40-bd67-da62e9dddea8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with payoutsking ransomware.
  Incident: dragnet-ransomware-2025-7751
  Ransomware victim claim by payoutsking: L****s; country: US; sector: Not Found
  First observed: 2025-09-30.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
