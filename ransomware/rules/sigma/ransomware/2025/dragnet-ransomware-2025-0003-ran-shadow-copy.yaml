title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0003 — Shadow Copy Deletion (fog)'
id: 3998a937-48ac-5911-822f-648cef388bd4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with fog ransomware.
  Incident: dragnet-ransomware-2025-0003
  Ransomware victim claim by fog: eConceptions; country: PK; sector: Not Found
  First observed: 2025-02-06.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
