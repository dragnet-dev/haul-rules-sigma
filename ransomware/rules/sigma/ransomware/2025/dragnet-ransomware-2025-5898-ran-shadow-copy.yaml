title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5898 — Shadow Copy Deletion (shinyhunters)'
id: a00c4eb9-c09a-522e-8479-1a9cc63b886a
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-5898
  Ransomware victim claim by shinyhunters: Albertsons (Jewel Osco, etc); country: US; sector: Consumer Services
  First observed: 2025-07-14.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//albertsons.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
