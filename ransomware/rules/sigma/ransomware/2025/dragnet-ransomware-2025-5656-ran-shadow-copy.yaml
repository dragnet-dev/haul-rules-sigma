title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5656 — Shadow Copy Deletion (lynx)'
id: 57788b70-f9d8-55a5-b9ba-edefa1d15efc
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-5656
  Ransomware victim claim by lynx: Colmar Industrial Supplies; country: US; sector: Manufacturing
  First observed: 2025-04-11.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67f90ddcce8dcc3b0d4c3132
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
