title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4803 — Shadow Copy Deletion (lynx)'
id: 9aba472d-d9eb-50f6-8957-fe8f755bc0b7
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4803
  Ransomware victim claim by lynx: Lake HVAC; country: US; sector: Construction
  First observed: 2025-04-15.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67febe42ce8dcc3b0d8fabd2
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
