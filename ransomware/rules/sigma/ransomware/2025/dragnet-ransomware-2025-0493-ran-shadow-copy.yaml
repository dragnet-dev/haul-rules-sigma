description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-0493
  Ransomware victim claim by handala: Tosaf; country: NL; sector: Manufacturing
  First observed: 2025-02-02.
  Confidence: 90% (ransomware_live).
