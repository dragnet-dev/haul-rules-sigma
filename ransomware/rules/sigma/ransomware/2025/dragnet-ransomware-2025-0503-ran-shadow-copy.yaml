title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0503 — Shadow Copy Deletion (hellcat)'
id: 1b1e52ba-988f-5a57-b857-2963d34baabb
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hellcat ransomware.
  Incident: dragnet-ransomware-2025-0503
  Ransomware victim claim by hellcat: Grupo Santillana; country: ES; sector: Education
  First observed: 2025-03-24.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
