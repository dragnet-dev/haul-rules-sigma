description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1048
  Ransomware victim claim by lynx: Engineering Mechanics; country: CN; sector: Manufacturing
  First observed: 2025-02-27.
  Confidence: 90% (ransomware_live).
references:
