title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1010 — Shadow Copy Deletion (lynx)'
id: 661936f7-438f-5af5-9cee-3bc472b92e8d
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1010
  Ransomware victim claim by lynx: HRS_IDEA_Expertises; sector: Business Services
  First observed: 2025-02-17.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67b3420e44fac8dca109a998
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
