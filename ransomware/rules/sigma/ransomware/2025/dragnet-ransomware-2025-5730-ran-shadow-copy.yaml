title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5730 — Shadow Copy Deletion (lynx)'
id: 76798be0-c47a-5915-bd0b-b0554bea94aa
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-5730
  Ransomware victim claim by lynx: Empire Home Center; country: US; sector: Consumer Services
  First observed: 2025-01-23.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/679c9d8a861630bc778ce6f7
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
