title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7879 — Shadow Copy Deletion (lynx)'
id: 4c5a7dd3-fdad-57aa-9fdc-361cc71ba1c1
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7879
  Ransomware victim claim by lynx: gramoll.com; country: US; sector: Construction
  First observed: 2025-03-14.
  Confidence: 90% (ransomware_live).
references:
