title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6911 — Shadow Copy Deletion (benzona)'
id: a405d35c-f767-5b3b-a98b-fee20684be8b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with benzona ransomware.
  Incident: dragnet-ransomware-2025-6911
  Ransomware victim claim by benzona: poliserv.ro; country: RO; sector: Not Found
  First observed: 2025-11-26.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
