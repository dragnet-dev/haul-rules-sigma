title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0267 — Shadow Copy Deletion (lynx)'
id: 2bc707d9-5d9b-5c71-a34a-43ffc9ccc296
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0267
  Ransomware victim claim by lynx: Rossi Real Estate (ROSSIDG.LOCAL); country: US; sector: Business Services
  First observed: 2025-01-29.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/6787976705a779c3d3da3ebf
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
