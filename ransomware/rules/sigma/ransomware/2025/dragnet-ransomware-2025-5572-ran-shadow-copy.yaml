title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5572 — Shadow Copy Deletion (lynx)'
id: d2c9f1c7-e060-511c-8c25-85fac9bd42de
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-5572
  Ransomware victim claim by lynx: amatechinc.com; country: US; sector: Technology
  First observed: 2025-03-14.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67e3fac4ce8dcc3b0d5b681a
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
