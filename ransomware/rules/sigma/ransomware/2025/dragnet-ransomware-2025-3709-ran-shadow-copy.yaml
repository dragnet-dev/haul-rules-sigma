title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3709 — Shadow Copy Deletion (lynx)'
id: fd30e819-23cf-54fd-9064-1bd447748842
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-3709
  Ransomware victim claim by lynx: Lexington Electric; country: US; sector: Energy
  First observed: 2025-01-29.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/679a244e05a779c3d33a35d2
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
