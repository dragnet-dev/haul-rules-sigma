description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-6527
  Ransomware victim claim by pear: ThinkBig Health Care Solutions; country: US; sector: Healthcare
  First observed: 2025-06-24.
