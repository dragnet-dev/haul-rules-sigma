title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2697 — Shadow Copy Deletion (lynx)'
id: 94199012-aecc-5f35-b2c0-7a48815e14ab
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-2697
  Ransomware victim claim by lynx: Solar Optimum; country: US; sector: Energy
  First observed: 2025-03-25.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67e1f2a8ce8dcc3b0d330c44
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
