status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-4476
  Ransomware victim claim by incransom: National Institute of Water Resources; country: DO; sector: Public Sector
  First observed: 2025-07-14.
  Confidence: 90% (ransomware_live).
references:
