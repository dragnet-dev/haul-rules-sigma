status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-2003
  Ransomware victim claim by incransom: erniesinceresco.com; country: US; sector: Consumer Services
  First observed: 2025-06-17.
