title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4194 — Shadow Copy Deletion (lynx)'
id: 3e979a03-f748-5778-95c0-0c2f9625cd2c
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4194
  Ransomware victim claim by lynx: shgcpa.com; country: US; sector: Financial Services
  First observed: 2025-04-07.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/680baae2d5daa03fd3795653
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
