title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6455 — Shadow Copy Deletion (benzona)'
id: 7aa52762-51f7-52f5-b4fa-18501116ded4
status: deprecated
description: |
  Detects shadow copy deletion commands associated with benzona ransomware.
  Incident: dragnet-ransomware-2025-6455
  Ransomware victim claim by benzona: sevci.org; country: CI; sector: Healthcare
  First observed: 2025-11-26.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
