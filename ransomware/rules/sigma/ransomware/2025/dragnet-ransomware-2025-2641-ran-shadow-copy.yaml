title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2641 — Shadow Copy Deletion (minteye)'
id: 9a53d3e7-7cb7-58a1-b23e-487312349d1d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with minteye ransomware.
  Incident: dragnet-ransomware-2025-2641
  Ransomware victim claim by minteye: Keylogistics Chile SA; country: CL; sector: Transportation/Logistics
  First observed: 2025-12-12.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
