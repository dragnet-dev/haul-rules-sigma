title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4986 — Shadow Copy Deletion (lynx)'
id: 467dd70d-5646-519e-99b3-43f2f28d40dc
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4986
  Ransomware victim claim by lynx: Pervedant; country: PT; sector: Manufacturing
  First observed: 2025-03-05.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67c8a78644fac8dca1a4f213
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
