description: |
  Detects shadow copy deletion commands associated with cephalus ransomware.
  Incident: dragnet-ransomware-2025-1030
  Ransomware victim claim by cephalus: Guerrero Mears LLP; country: US; sector: Business Services
  First observed: 2025-08-26.
