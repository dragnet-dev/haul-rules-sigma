status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0226
  Ransomware victim claim by lynx: derichsukonertz.de; country: DE; sector: Manufacturing
  First observed: 2025-02-19.
  Confidence: 90% (ransomware_live).
references:
