title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4804 — Shadow Copy Deletion (lynx)'
id: 12e06e47-40ba-5086-a06e-6b93877f4fa8
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4804
  Ransomware victim claim by lynx: Palomino Petroleum; country: GB; sector: Energy
  First observed: 2025-03-19.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67da9cb451e131d63486afc8
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
