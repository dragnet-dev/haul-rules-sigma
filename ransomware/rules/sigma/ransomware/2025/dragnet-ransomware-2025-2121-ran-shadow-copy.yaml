title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2121 — Shadow Copy Deletion (hellcat)'
id: ad0b8a62-cc47-544a-9a9f-1e0d7a336ea8
status: deprecated
description: |
  Detects shadow copy deletion commands associated with hellcat ransomware.
  Incident: dragnet-ransomware-2025-2121
  Ransomware victim claim by hellcat: CVTE; country: CN; sector: Technology
  First observed: 2025-04-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
