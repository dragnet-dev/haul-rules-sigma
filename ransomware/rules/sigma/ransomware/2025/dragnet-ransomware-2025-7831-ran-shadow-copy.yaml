title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7831 — Shadow Copy Deletion (lynx)'
id: 63b37e0f-d833-5fec-a65a-59a40de82e31
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7831
  Ransomware victim claim by lynx: Penn Emblem (penn.local); country: US; sector: Manufacturing
  First observed: 2025-02-24.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67bc964b44fac8dca14e62b0
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
