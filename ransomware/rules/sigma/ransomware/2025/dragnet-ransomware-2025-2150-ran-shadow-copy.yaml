title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2150 — Shadow Copy Deletion (akira)'
id: 26a02221-5a7e-5e31-857b-8201fc3a145d
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-2150
  Associated with Akira.
  Ransomware victim claim by akira: TSI Accessory Group,Stanley Creations Inc, iStar Jewelry, Roman & Sunstone.; country: US; sector: Consumer Services
  First observed: 2025-09-03.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
