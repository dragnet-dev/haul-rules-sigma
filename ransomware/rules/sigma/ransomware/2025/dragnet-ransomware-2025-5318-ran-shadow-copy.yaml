title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5318 — Shadow Copy Deletion (shinyhunters)'
id: 3c2095ad-ebb8-5f96-a7b2-6febae13f371
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-5318
  Ransomware victim claim by shinyhunters: Cartier; country: FR; sector: Consumer Services
  First observed: 2025-01-17.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//cartier.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
