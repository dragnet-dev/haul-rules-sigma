title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3886 — Shadow Copy Deletion (handala)'
id: 1785c77d-d958-50b9-8f4a-882086b45470
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-3886
  Ransomware victim claim by handala: Ivri, Kerner & Co; country: IL; sector: Business Services
  First observed: 2025-07-02.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/ivri-kerner-co-hacked/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
