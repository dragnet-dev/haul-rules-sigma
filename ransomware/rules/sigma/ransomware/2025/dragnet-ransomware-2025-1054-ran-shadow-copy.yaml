title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1054 — Shadow Copy Deletion (lynx)'
id: 9373a33e-2bab-5f0b-9df1-00d229e01790
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1054
  Ransomware victim claim by lynx: Indiv Usa; country: US; sector: Business Services
  First observed: 2025-02-25.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67d40c96f2854cb0af9a2b01
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
