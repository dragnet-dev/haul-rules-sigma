title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4220 — Shadow Copy Deletion (lynx)'
id: af5b044f-5d9e-5221-a7b5-3a1e66ee28d0
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4220
  Ransomware victim claim by lynx: Mintz Law Firm, LLC; country: US; sector: Business Services
  First observed: 2025-01-22.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/678671ee05a779c3d3d3cd39
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
