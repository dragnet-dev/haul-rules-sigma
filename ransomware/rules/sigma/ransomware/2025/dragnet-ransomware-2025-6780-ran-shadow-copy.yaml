description: |
  Detects shadow copy deletion commands associated with d4rk4rmy ransomware.
  Incident: dragnet-ransomware-2025-6780
  Ransomware victim claim by d4rk4rmy: MAFATE BUSINESS ENTERPRISE; country: ZA; sector: Energy
