status: experimental
description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-0859
  Ransomware victim claim by pear: Brevard Skin; country: US; sector: Healthcare
  First observed: 2025-10-10.
  Confidence: 90% (ransomware_live).
references:
  - http://pearsmob5sn44ismokiusuld34pnfwi6ctgin3qbvonpoob4lh3rmtqd.onion/Companies/brevardskin
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
