title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1568 — Shadow Copy Deletion (obscura)'
id: f58e45f2-1771-5538-8f95-7b7348148215
status: deprecated
description: |
  Detects shadow copy deletion commands associated with obscura ransomware.
  Incident: dragnet-ransomware-2025-1568
  Ransomware victim claim by obscura: StanleyCo Malaysia; country: MY; sector: Business Services
  First observed: 2025-12-04.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
