title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5687 — Shadow Copy Deletion (AiLock)'
id: 5881ae67-99d8-5325-9a66-77ad7c96f567
status: deprecated
description: |
  Detects shadow copy deletion commands associated with AiLock ransomware.
  Incident: dragnet-ransomware-2025-5687
  Ransomware victim claim by AiLock: Integral Analytics; country: US; sector: Technology
  First observed: 2025-04-10.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
