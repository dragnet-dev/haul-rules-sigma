description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-5912
  Ransomware victim claim by lynx: dhsmithco.com; country: US; sector: Construction
  First observed: 2025-03-27.
  Confidence: 90% (ransomware_live).
references:
