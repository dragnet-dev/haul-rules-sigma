title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4422 — Shadow Copy Deletion (handala)'
id: dd1d3c28-3407-5a97-80a3-9159ab7486f2
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-4422
  Ransomware victim claim by handala: Vynopsis; sector: Technology
  First observed: 2025-07-03.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/vynopsis-hacked/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
