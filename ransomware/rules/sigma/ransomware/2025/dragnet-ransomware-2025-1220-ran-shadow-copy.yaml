title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1220 — Shadow Copy Deletion (handala)'
id: dbdb9b2e-8700-5e0c-bbdf-b71bb0cdca45
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-1220
  Ransomware victim claim by handala: Mor-logistics; country: IL; sector: Transportation/Logistics
  First observed: 2025-06-18.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/mor-logistics-hacked/
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
