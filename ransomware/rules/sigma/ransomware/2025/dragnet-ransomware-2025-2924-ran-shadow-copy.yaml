title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2924 — Shadow Copy Deletion (cloak)'
id: 6fd31e71-4b3b-5e2e-84d6-ba2d394574c1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cloak ransomware.
  Incident: dragnet-ransomware-2025-2924
  Ransomware victim claim by cloak: Wstg-steuerberater.de; country: DE; sector: Business Services
  First observed: 2025-08-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
