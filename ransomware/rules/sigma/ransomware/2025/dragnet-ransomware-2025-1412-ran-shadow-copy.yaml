title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1412 — Shadow Copy Deletion (incransom)'
id: f3bd33d3-ce84-5956-96bd-b8799bfb9be1
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-1412
  Ransomware victim claim by incransom: State Bar of Texas (www.texasbar.com); country: US; sector: Public Sector
  First observed: 2025-03-09.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/67c050ce576c6c717817e4dd
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
