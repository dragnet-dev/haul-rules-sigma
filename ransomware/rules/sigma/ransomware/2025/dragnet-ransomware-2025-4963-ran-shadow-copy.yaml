title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4963 — Shadow Copy Deletion (warlock)'
id: fe799f9c-8da0-582e-bc26-6b7b025fb7c1
status: deprecated
description: |
  Detects shadow copy deletion commands associated with warlock ransomware.
  Incident: dragnet-ransomware-2025-4963
  Ransomware victim claim by warlock: cybervector.co.uk; country: GB; sector: Technology
  First observed: 2025-11-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
