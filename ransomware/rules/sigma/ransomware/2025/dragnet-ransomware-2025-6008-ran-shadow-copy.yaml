description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-6008
  Ransomware victim claim by lynx: Marukai; country: JP; sector: Consumer Services
  First observed: 2025-01-21.
  Confidence: 90% (ransomware_live).
references:
