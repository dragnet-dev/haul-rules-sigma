title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2274 — Shadow Copy Deletion (akira)'
id: 811a42e0-fd78-5d74-a122-6f0eac2ea453
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-2274
  Associated with Akira.
  Ransomware victim claim by akira: Laboratorios Belloch(Nelly, Yunsey, Fresh feel); country: ES; sector: Manufacturing
  First observed: 2025-05-16.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
