title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1657 — Shadow Copy Deletion (arkana)'
id: 4e990a67-c342-5ba3-984f-c6461a8fcc4b
status: deprecated
description: |
  Detects shadow copy deletion commands associated with arkana ransomware.
  Incident: dragnet-ransomware-2025-1657
  Ransomware victim claim by arkana: Oregon Surveillance Network - OSN!; country: US; sector: Not Found
  First observed: 2025-03-26.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
