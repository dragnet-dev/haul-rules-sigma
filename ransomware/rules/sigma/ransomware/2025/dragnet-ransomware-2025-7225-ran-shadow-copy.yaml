title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7225 — Shadow Copy Deletion (global)'
id: 5ac9cf83-94f2-5ea1-b1ca-72d2c0ec79fe
status: deprecated
description: |
  Detects shadow copy deletion commands associated with global ransomware.
  Incident: dragnet-ransomware-2025-7225
  Ransomware victim claim by global: RUKU Tore - Türen; country: DE; sector: Manufacturing
  First observed: 2025-07-30.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
