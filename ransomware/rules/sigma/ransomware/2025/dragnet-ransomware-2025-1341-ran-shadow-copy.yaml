title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1341 — Shadow Copy Deletion (sinobi)'
id: b556e532-e4b5-5440-a07f-25e20ff98705
status: experimental
description: |
  Detects shadow copy deletion commands associated with sinobi ransomware.
  Incident: dragnet-ransomware-2025-1341
  Ransomware victim claim by sinobi: Central Jersey Medical Center; country: US; sector: Healthcare
  First observed: 2025-08-17.
  Confidence: 90% (ransomware_live).
references:
  - http://sinobi6ftrg27d6g4sjdt65malds6cfptlnjyw52rskakqjda6uvb7yd.onion/leaks/68e967d388b6823fa27586fd
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
