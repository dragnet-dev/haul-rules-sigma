description: |
  Detects shadow copy deletion commands associated with global ransomware.
  Incident: dragnet-ransomware-2025-2044
  Ransomware victim claim by global: Rosewood Farm; country: US; sector: Agriculture and Food Production
  First observed: 2025-06-11.
references:
author: dragnet-bot
