description: |
  Detects shadow copy deletion commands associated with SilentRansomGroup ransomware.
  Incident: dragnet-ransomware-2025-6174
  Ransomware victim claim by SilentRansomGroup: Dean & Fulkerson; country: US; sector: Business Services
