title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7117 — Shadow Copy Deletion (datacarry)'
id: 4e60bf7a-f301-55fa-8c5a-5bea4e4bc72f
status: deprecated
description: |
  Detects shadow copy deletion commands associated with datacarry ransomware.
  Incident: dragnet-ransomware-2025-7117
  Ransomware victim claim by datacarry: Miljödata; country: SE; sector: Agriculture and Food Production
  First observed: 2025-09-13.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
