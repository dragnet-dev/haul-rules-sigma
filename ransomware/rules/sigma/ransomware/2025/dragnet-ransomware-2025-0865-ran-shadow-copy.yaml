title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0865 — Shadow Copy Deletion (handala)'
id: 2359af97-b9ef-5e60-8309-970935771b10
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-0865
  Ransomware victim claim by handala: YHD Group; country: CN; sector: Transportation/Logistics
  First observed: 2025-06-19.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/yhd-group-hacked/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
