title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7135 — Shadow Copy Deletion (shinyhunters)'
id: 98f92413-581b-5581-a3ce-d92aecbe3c97
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7135
  Ransomware victim claim by shinyhunters: KFC; country: US; sector: Hospitality and Tourism
  First observed: 2025-06-26.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//kfc.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
