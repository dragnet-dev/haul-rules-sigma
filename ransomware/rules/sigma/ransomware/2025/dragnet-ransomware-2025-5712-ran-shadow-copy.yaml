title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5712 — Shadow Copy Deletion (pear)'
id: bcfd0020-884b-56cf-b0b7-12cf011e757a
status: experimental
description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-5712
  Ransomware victim claim by pear: Catholic Charities of the Diocese of Albany; country: US; sector: Public Sector
  First observed: 2025-05-16.
  Confidence: 90% (ransomware_live).
references:
  - http://pearsmob5sn44ismokiusuld34pnfwi6ctgin3qbvonpoob4lh3rmtqd.onion/Companies/ccrcda
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
