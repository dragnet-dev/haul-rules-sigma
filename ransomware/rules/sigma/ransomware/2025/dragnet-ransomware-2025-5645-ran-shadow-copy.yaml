title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5645 — Shadow Copy Deletion (shinyhunters)'
id: 4479965f-04ae-5e7b-ac32-0d52621d170b
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-5645
  Ransomware victim claim by shinyhunters: UPS; country: US; sector: Transportation/Logistics
  First observed: 2025-09-03.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//ups.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
