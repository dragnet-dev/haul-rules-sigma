title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7583 — Shadow Copy Deletion (cephalus)'
id: 93ee6ee0-4ed8-5dfe-9729-148fe4ce9fe2
status: deprecated
description: |
  Detects shadow copy deletion commands associated with cephalus ransomware.
  Incident: dragnet-ransomware-2025-7583
  Ransomware victim claim by cephalus: Delta Information Systems; country: US; sector: Technology
  First observed: 2025-08-29.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
