description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-6757
  Ransomware victim claim by shinyhunters: ASICS; country: JP; sector: Consumer Services
  First observed: 2025-06-17.
