title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5678 — Shadow Copy Deletion (crypto24)'
id: 57771ffb-fdca-5412-acff-abf97d55e4c9
status: deprecated
description: |
  Detects shadow copy deletion commands associated with crypto24 ransomware.
  Incident: dragnet-ransomware-2025-5678
  Ransomware victim claim by crypto24: Generali Group; country: IT; sector: Financial Services
  First observed: 2025-09-18.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
