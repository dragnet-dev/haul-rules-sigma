title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5680 — Shadow Copy Deletion (obscura)'
id: 31560fe3-a20f-556a-8d0c-13e2a7890296
status: deprecated
description: |
  Detects shadow copy deletion commands associated with obscura ransomware.
  Incident: dragnet-ransomware-2025-5680
  Ransomware victim claim by obscura: Startek Engineering Inc.; country: TW; sector: Technology
  First observed: 2025-12-03.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
