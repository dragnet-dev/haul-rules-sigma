title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1989 — Shadow Copy Deletion (d4rk4rmy)'
id: a62f6007-e2d3-5ed6-ace4-5dc46ae09289
status: deprecated
description: |
  Detects shadow copy deletion commands associated with d4rk4rmy ransomware.
  Incident: dragnet-ransomware-2025-1989
  Ransomware victim claim by d4rk4rmy: ONEX CANADA ASSET MANAGEMENT INC; country: CA; sector: Financial Services
  First observed: 2025-08-07.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
