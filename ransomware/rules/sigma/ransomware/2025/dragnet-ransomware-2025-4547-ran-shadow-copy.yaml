title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4547 — Shadow Copy Deletion (lynx)'
id: 4652a776-af45-52e2-a72b-4e950b9fb17a
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-4547
  Ransomware victim claim by lynx: toolsign.com; country: DE; sector: Consumer Services
  First observed: 2025-03-15.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67fe87bdce8dcc3b0d8ba911
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
