status: experimental
description: |
  Detects shadow copy deletion commands associated with cephalus ransomware.
  Incident: dragnet-ransomware-2025-1372
  Ransomware victim claim by cephalus: Sherman, Silverstein, Kohl, Rose & Podolsky, P.A.; country: US; sector: Business Services
  First observed: 2025-08-26.
  Confidence: 90% (ransomware_live).
references:
