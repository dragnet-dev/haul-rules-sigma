title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1273 — Shadow Copy Deletion (shinyhunters)'
id: 438579fb-a9b6-5f8a-b149-6e5088b56d17
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-1273
  Ransomware victim claim by shinyhunters: HBO Max; country: US; sector: Telecommunication
  First observed: 2025-05-02.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//hbomax.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
