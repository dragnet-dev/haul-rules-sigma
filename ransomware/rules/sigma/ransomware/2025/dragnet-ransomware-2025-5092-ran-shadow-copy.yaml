status: experimental
description: |
  Detects shadow copy deletion commands associated with lockbit5 ransomware.
  Incident: dragnet-ransomware-2025-5092
  Ransomware victim claim by lockbit5: comune.balmuccia.vc.it; country: IT; sector: Public Sector
  First observed: 2025-09-19.
