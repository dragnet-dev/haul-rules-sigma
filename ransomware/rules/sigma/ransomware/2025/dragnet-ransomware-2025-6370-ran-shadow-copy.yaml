title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6370 — Shadow Copy Deletion (killsec)'
id: b6fee90f-314b-55c8-9227-1ced5a7e347e
status: deprecated
description: |
  Detects shadow copy deletion commands associated with killsec ransomware.
  Incident: dragnet-ransomware-2025-6370
  Ransomware victim claim by killsec: DUC App: Global Money Movement, Sim...; country: CA; sector: Technology
  First observed: 2025-10-23.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
