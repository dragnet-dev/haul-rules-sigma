title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5518 — Shadow Copy Deletion (akira)'
id: bc535736-94f6-5fc1-8623-b0d7bab37640
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-5518
  Associated with Akira.
  Ransomware victim claim by akira: Wisconsin Knife Works, The Smith Companies, Envirotech Services, Next GenerationLogistics,...; country: US; sector: Manufacturing
  First observed: 2025-12-01.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
