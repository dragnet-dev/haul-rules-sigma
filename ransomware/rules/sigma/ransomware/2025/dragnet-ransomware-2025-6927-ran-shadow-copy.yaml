title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6927 — Shadow Copy Deletion (direwolf)'
id: 5529409a-7a60-5405-8ce4-710d880d921d
status: experimental
description: |
  Detects shadow copy deletion commands associated with direwolf ransomware.
  Incident: dragnet-ransomware-2025-6927
  Ransomware victim claim by direwolf: K.M. Packaging Co., Ltd; country: TH; sector: Manufacturing
  First observed: 2025-06-10.
  Confidence: 90% (ransomware_live).
references:
  - http://direwolfcdkv5whaz2spehizdg22jsuf5aeje4asmetpbt6ri4jnd4qd.onion/articles/KMPackaging.html
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
