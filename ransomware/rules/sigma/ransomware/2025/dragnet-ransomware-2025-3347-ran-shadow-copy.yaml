description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-3347
  Ransomware victim claim by lynx: southernagllc.com; country: US; sector: Agriculture and Food Production
  First observed: 2025-04-15.
  Confidence: 90% (ransomware_live).
references:
