description: |
  Detects shadow copy deletion commands associated with kairos ransomware.
  Incident: dragnet-ransomware-2025-0889
  Ransomware victim claim by kairos: jerichofd.com/USA/157GB/; country: US; sector: Public Sector
  First observed: 2025-06-02.
