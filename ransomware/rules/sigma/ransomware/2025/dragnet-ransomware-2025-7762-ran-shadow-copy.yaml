title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7762 — Shadow Copy Deletion (minteye)'
id: d054d46d-aa94-5604-a839-fba9f572d5f5
status: deprecated
description: |
  Detects shadow copy deletion commands associated with minteye ransomware.
  Incident: dragnet-ransomware-2025-7762
  Ransomware victim claim by minteye: Cranford, Buckley, Schultze, Tomchin, Allen & Buie, P.A.; country: US; sector: Financial Services
  First observed: 2025-12-12.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
