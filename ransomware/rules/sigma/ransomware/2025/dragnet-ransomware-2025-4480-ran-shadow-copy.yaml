title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4480 — Shadow Copy Deletion (akira)'
id: c7d52d73-9285-5a18-8980-32dec996ca3a
status: deprecated
description: |
  Detects shadow copy deletion commands associated with akira ransomware.
  Incident: dragnet-ransomware-2025-4480
  Associated with Akira.
  Ransomware victim claim by akira: Barbizon Lighting Company, Roseburrough Tool, Mqd, McKay Empire, Victor Insulators.; country: US; sector: Manufacturing
  First observed: 2025-11-14.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
  - dragnet.actor.akira
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
