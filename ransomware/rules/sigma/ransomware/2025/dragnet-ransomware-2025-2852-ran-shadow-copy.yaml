title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2852 — Shadow Copy Deletion (lynx)'
id: 5c261ff4-c3c8-5319-a81e-7a9e8a51fae9
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-2852
  Ransomware victim claim by lynx: Stürmer Maschinen; country: DE; sector: Manufacturing
  First observed: 2025-02-08.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67bc556d44fac8dca14c6a6a
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
