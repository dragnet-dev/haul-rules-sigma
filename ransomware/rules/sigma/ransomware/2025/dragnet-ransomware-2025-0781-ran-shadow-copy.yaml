status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0781
  Ransomware victim claim by lynx: planetone-asia.com; country: SG; sector: Technology
  First observed: 2025-01-16.
  Confidence: 90% (ransomware_live).
references:
