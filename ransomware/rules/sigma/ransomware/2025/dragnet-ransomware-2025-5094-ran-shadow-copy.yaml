title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-5094 — Shadow Copy Deletion (incransom)'
id: 633ddc48-1e51-5b0c-ac57-b597d31508aa
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-5094
  Ransomware victim claim by incransom: Pennsylvania Office of Attorney General; country: US; sector: Public Sector
  First observed: 2025-09-21.
