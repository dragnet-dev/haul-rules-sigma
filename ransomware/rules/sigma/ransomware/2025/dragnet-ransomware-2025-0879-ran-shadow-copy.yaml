title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0879 — Shadow Copy Deletion (lynx)'
id: b8153a43-baac-5f51-a7c3-8565f2626e86
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0879
  Ransomware victim claim by lynx: Vicarage Court Solicitors; country: GB; sector: Business Services
  First observed: 2025-04-24.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/680a3646d5daa03fd3604c74
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
