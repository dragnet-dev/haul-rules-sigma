title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3230 — Shadow Copy Deletion (clop)'
id: 9a602e34-3df4-569f-afce-49430ee1c8f6
status: deprecated
description: |
  Detects shadow copy deletion commands associated with clop ransomware.
  Incident: dragnet-ransomware-2025-3230
  Ransomware victim claim by clop: SEA-JET.COM; country: GR; sector: Transportation/Logistics
  First observed: 2025-02-27.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
