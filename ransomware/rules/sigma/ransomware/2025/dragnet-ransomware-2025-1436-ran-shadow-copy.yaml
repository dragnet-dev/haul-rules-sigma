title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1436 — Shadow Copy Deletion (warlock)'
id: d3fafe5c-1638-529e-96c0-b672f5652bcf
status: deprecated
description: |
  Detects shadow copy deletion commands associated with warlock ransomware.
  Incident: dragnet-ransomware-2025-1436
  Ransomware victim claim by warlock: colt.net; country: GB; sector: Telecommunication
  First observed: 2025-08-17.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
