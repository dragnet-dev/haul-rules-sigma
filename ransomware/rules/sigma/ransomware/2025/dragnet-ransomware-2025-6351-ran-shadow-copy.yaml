title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6351 — Shadow Copy Deletion (radiant)'
id: b3558f26-39e2-5647-bfe4-4cb44f32d478
status: deprecated
description: |
  Detects shadow copy deletion commands associated with radiant ransomware.
  Incident: dragnet-ransomware-2025-6351
  Ransomware victim claim by radiant: Retail Texas; sector: Consumer Services
  First observed: 2025-10-12.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
