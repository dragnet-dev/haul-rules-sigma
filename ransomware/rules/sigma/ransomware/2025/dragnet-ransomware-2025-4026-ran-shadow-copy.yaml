title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4026 — Shadow Copy Deletion (SilentRansomGroup)'
id: 59ae7b36-09bb-554b-bfe9-14e8d5fb9d14
status: deprecated
description: |
  Detects shadow copy deletion commands associated with SilentRansomGroup ransomware.
  Incident: dragnet-ransomware-2025-4026
  Ransomware victim claim by SilentRansomGroup: IFG Companies; country: US; sector: Financial Services
  First observed: 2025-03-20.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
