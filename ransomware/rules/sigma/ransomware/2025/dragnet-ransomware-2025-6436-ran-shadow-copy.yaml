title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6436 — Shadow Copy Deletion (kawa4096)'
id: 91f762bd-5dab-5cb6-9bac-9a10da3f2e23
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kawa4096 ransomware.
  Incident: dragnet-ransomware-2025-6436
  Ransomware victim claim by kawa4096: www.malonebailey.com; country: US; sector: Financial Services
  First observed: 2025-06-24.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
