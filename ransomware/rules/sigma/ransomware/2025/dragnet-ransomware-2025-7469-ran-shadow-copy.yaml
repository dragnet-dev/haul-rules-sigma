title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7469 — Shadow Copy Deletion (handala)'
id: 42cb27b3-171d-5d5c-b480-180839696f9d
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-7469
  Ransomware victim claim by handala: Freedom Wood Doors Ltd; sector: Manufacturing
  First observed: 2025-07-06.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/freedom-wood-doors-ltd-hacked/
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
