title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1414 — Shadow Copy Deletion (handala)'
id: 6be884f8-c1b7-51d1-81e1-4d316072b419
status: experimental
description: |
  Detects shadow copy deletion commands associated with handala ransomware.
  Incident: dragnet-ransomware-2025-1414
  Ransomware victim claim by handala: The Saturday Files; sector: Not Found
  First observed: 2025-11-01.
  Confidence: 90% (ransomware_live).
references:
  - https://handala-hack.to/the-saturday-files/
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
