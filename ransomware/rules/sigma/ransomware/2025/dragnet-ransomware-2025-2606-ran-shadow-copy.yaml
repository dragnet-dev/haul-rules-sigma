title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2606 — Shadow Copy Deletion (shinyhunters)'
id: 87a76342-aa7f-50db-be6a-b10832601fe7
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-2606
  Ransomware victim claim by shinyhunters: Home Depot; country: US; sector: Consumer Services
  First observed: 2025-09-07.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//homedepot.html
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
