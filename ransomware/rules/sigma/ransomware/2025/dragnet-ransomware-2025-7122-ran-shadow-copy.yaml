title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7122 — Shadow Copy Deletion (lynx)'
id: 6a27102e-8878-56ec-b312-8b8486d439e5
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7122
  Ransomware victim claim by lynx: Seabank Group; country: MT; sector: Hospitality and Tourism
  First observed: 2025-03-04.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67c6d5fb44fac8dca198779d
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
