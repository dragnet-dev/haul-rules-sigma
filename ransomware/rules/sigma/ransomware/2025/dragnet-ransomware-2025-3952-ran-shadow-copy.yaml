description: |
  Detects shadow copy deletion commands associated with pear ransomware.
  Incident: dragnet-ransomware-2025-3952
  Ransomware victim claim by pear: Western Orthopaedics; country: US; sector: Healthcare
  First observed: 2025-09-30.
  Confidence: 90% (ransomware_live).
references:
