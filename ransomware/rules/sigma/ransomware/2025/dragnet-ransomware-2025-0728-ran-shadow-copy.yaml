title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0728 — Shadow Copy Deletion (lynx)'
id: b856a008-c53b-5ba3-b10c-6e33272c9807
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-0728
  Ransomware victim claim by lynx: Autoschade Pippel; country: NL; sector: Transportation/Logistics
  First observed: 2025-02-17.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67b346f244fac8dca109d064
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
