title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-4093 — Shadow Copy Deletion (d4rk4rmy)'
id: cd7f463a-578e-5f53-8742-d1ebef86a510
status: deprecated
description: |
  Detects shadow copy deletion commands associated with d4rk4rmy ransomware.
  Incident: dragnet-ransomware-2025-4093
  Ransomware victim claim by d4rk4rmy: BIG SILVER; country: TH; sector: Manufacturing
  First observed: 2025-07-08.
references:
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
