title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7698 — Shadow Copy Deletion (benzona)'
id: 87f8d30d-8993-5e23-b4c8-39a4a5231971
status: deprecated
description: |
  Detects shadow copy deletion commands associated with benzona ransomware.
  Incident: dragnet-ransomware-2025-7698
  Ransomware victim claim by benzona: SUNNYGO.COM.TW; country: TW; sector: Consumer Services
  First observed: 2025-12-03.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
