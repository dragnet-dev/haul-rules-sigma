title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3817 — Shadow Copy Deletion (lynx)'
id: 3ff5158e-57e5-511d-a5f6-9b77ba000ac1
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-3817
  Ransomware victim claim by lynx: Adval Tech; country: CH; sector: Manufacturing
  First observed: 2025-02-20.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67c9ba2944fac8dca1ac9ef7
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
