title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7203 — Shadow Copy Deletion (lynx)'
id: ee131ac2-c44c-5a78-a7d4-24fd9681004d
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-7203
  Ransomware victim claim by lynx: D-7 Roofing; country: US; sector: Business Services
  First observed: 2025-01-07.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/677d0a0e05a779c3d3a6353a
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
