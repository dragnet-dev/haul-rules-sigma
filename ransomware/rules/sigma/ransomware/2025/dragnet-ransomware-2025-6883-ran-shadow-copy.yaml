title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6883 — Shadow Copy Deletion (blacknevas)'
id: adaa7976-39a4-5810-bd3a-30ffd1ac7902
status: experimental
description: |
  Detects shadow copy deletion commands associated with blacknevas ransomware.
  Incident: dragnet-ransomware-2025-6883
  Ransomware victim claim by blacknevas: CARTONAJES BERNABEU SAU www.cartonajesbernabeu.com serviced by IT company Verne Group www....; country: ES; sector: Manufacturing
  First observed: 2025-09-09.
  Confidence: 90% (ransomware_live).
references:
  - http://ctyfftrjgtwdjzlgqh4avbd35sqrs6tde4oyam2ufbjch6oqpqtkdtid.onion/publications/details/ba43ccf8-19fc-442c-8cac-425e8ed95df5
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
