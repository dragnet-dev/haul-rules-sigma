title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7336 — Shadow Copy Deletion (morpheus)'
id: 28625ecc-fa77-5f1b-a786-ed5f774fd1ee
status: deprecated
description: |
  Detects shadow copy deletion commands associated with morpheus ransomware.
  Incident: dragnet-ransomware-2025-7336
  Ransomware victim claim by morpheus: Metal Sales Manufacturing Corporation; country: US; sector: Manufacturing
  First observed: 2025-04-04.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
