status: experimental
description: |
  Detects shadow copy deletion commands associated with kazu ransomware.
  Incident: dragnet-ransomware-2025-3745
  Ransomware victim claim by kazu: National Civil Service Commission of Colombia; country: CO; sector: Public Sector
  First observed: 2025-11-10.
  Confidence: 90% (ransomware_live).
references:
  - http://6czlbd2jfiy6765fbnbnzuwuqocg57ebvp3tbm35kib425k4qnmiiiqd.onion/ransom.html#National
