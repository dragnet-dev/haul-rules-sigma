title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0328 — Shadow Copy Deletion (kazu)'
id: a2252f43-daaa-5062-b34f-d74531e7954c
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kazu ransomware.
  Incident: dragnet-ransomware-2025-0328
  Ransomware victim claim by kazu: ManageMyHealth - New Zealand; country: NZ; sector: Healthcare
  First observed: 2025-12-29.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
