title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-0440 — Shadow Copy Deletion (incransom)'
id: 7289917f-455c-5243-af35-c9ae5c9fb809
status: experimental
description: |
  Detects shadow copy deletion commands associated with incransom ransomware.
  Incident: dragnet-ransomware-2025-0440
  Ransomware victim claim by incransom: communitycareresources.com; country: US; sector: Healthcare
  First observed: 2025-06-04.
  Confidence: 90% (ransomware_live).
references:
  - http://incblog6qu4y4mm4zvw5nrmue6qbwtgjsxpw6b7ixzssu36tsajldoad.onion/blog/disclosures/68700a7ec7b82dfe0bb937e8
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
