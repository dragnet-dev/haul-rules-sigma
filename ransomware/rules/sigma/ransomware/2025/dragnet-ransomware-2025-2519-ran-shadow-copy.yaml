title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-2519 — Shadow Copy Deletion (rebornvc)'
id: ffd04185-9791-57aa-8961-e526c7ae8252
status: deprecated
description: |
  Detects shadow copy deletion commands associated with rebornvc ransomware.
  Incident: dragnet-ransomware-2025-2519
  Ransomware victim claim by rebornvc: Medusa; sector: Not Found
  First observed: 2025-07-09.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
