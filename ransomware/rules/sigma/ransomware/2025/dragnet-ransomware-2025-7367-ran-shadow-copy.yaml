title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-7367 — Shadow Copy Deletion (shinyhunters)'
id: a6829250-59a0-5e73-8505-882611995d7f
status: experimental
description: |
  Detects shadow copy deletion commands associated with shinyhunters ransomware.
  Incident: dragnet-ransomware-2025-7367
  Ransomware victim claim by shinyhunters: Air France & KLM; country: FR; sector: Transportation/Logistics
  First observed: 2025-07-29.
  Confidence: 90% (ransomware_live).
references:
  - https://breachforums.hn//afkl.html
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
