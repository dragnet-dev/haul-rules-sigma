title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1252 — Shadow Copy Deletion (kawa4096)'
id: d37a9b46-7156-5e9e-a026-ea5d37a70153
status: deprecated
description: |
  Detects shadow copy deletion commands associated with kawa4096 ransomware.
  Incident: dragnet-ransomware-2025-1252
  Ransomware victim claim by kawa4096: sbamh.org; country: US; sector: Healthcare
  First observed: 2025-07-20.
references:
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
