title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-3550 — Shadow Copy Deletion (lynx)'
id: 251d6a73-0fb2-50b0-849c-9179cb25e4c4
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-3550
  Ransomware victim claim by lynx: pacresmortgage.com; country: US; sector: Financial Services
  First observed: 2025-02-09.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/67bd141d44fac8dca1525178
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
