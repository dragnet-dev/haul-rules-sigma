title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-6888 — Shadow Copy Deletion (minteye)'
id: 43c5d11d-c6ba-5031-af9d-21236c1a2d56
status: deprecated
description: |
  Detects shadow copy deletion commands associated with minteye ransomware.
  Incident: dragnet-ransomware-2025-6888
  Ransomware victim claim by minteye: Sponseller Group, Inc.; country: US; sector: Not Found
  First observed: 2025-12-12.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
