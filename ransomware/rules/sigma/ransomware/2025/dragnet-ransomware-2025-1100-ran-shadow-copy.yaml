title: 'Dragnet [Ransomware]: dragnet-ransomware-2025-1100 — Shadow Copy Deletion (lynx)'
id: 87ffe11b-bf9b-5530-ad6c-eed93438694e
status: experimental
description: |
  Detects shadow copy deletion commands associated with lynx ransomware.
  Incident: dragnet-ransomware-2025-1100
  Ransomware victim claim by lynx: greatplainstransport.com; country: US; sector: Transportation/Logistics
  First observed: 2025-04-24.
  Confidence: 90% (ransomware_live).
references:
  - http://lynxblog.net/leaks/680ac0e5d5daa03fd36ab06e
author: dragnet-bot
date: 2026-05-20
tags:
  - attack.t1490
  - dragnet.ransomware
logsource:
  category: process_creation
  product: windows
detection:
  selection_vssadmin:
    Image|endswith: '\vssadmin.exe'
    CommandLine|contains|all:
      - 'delete'
      - 'shadows'
  selection_wmic:
    Image|endswith: '\wmic.exe'
    CommandLine|contains|all:
      - 'shadowcopy'
      - 'delete'
  selection_powershell:
    Image|endswith:
      - '\powershell.exe'
      - '\pwsh.exe'
    CommandLine|contains: 'Get-WmiObject Win32_ShadowCopy'
  condition: 1 of selection_*
falsepositives:
  - Legitimate backup solution maintenance (rare)
level: high
