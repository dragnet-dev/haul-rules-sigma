description: |
  Detects shadow copy deletion commands associated with global ransomware.
  Incident: dragnet-ransomware-2025-1673
  Ransomware victim claim by global: Letry; country: BE; sector: Agriculture and Food Production
  First observed: 2025-06-11.
references:
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1490
