  First observed: 2025-04-15.
  Confidence: 90% (ransomware_live).
references:
  - http://ralordqe33mpufkpsr6zkdatktlu3t2uei4ught3sitxgtzfmqmbsuyd.onion/newhotelcloud
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1490
