description: |
  Detects deployment of a container image based on an end-of-life product cycle.
  EOL images receive no further security patches regardless of new CVEs.
  Incident: dragnet-container-2006-0002
  php 5.1 reached end-of-life on 2006-08-24. All images based on this cycle are permanently unpatched.
  First observed: 2006-08-24.
references:
  - https://endoflife.date/php
author: dragnet-bot
