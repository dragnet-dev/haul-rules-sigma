description: |
  Detects deployment of a container image based on an end-of-life product cycle.
  EOL images receive no further security patches regardless of new CVEs.
  Incident: dragnet-container-2022-0003
  php 7.4 reached end-of-life on 2022-11-28. All images based on this cycle are permanently unpatched.
  First observed: 2022-11-28.
references:
  - https://endoflife.date/php
author: dragnet-bot
