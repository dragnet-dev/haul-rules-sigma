title: 'Dragnet [Container]: dragnet-container-2026-0155 — Vulnerable Base Image Pull'
id: d54be3a0-f095-5105-84dd-4c7a2cbe98df
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-0155 (Tier 2, CVSS 9.8)
  The nsXBLProtoImpl::InstallImplementation function in Mozilla Firefox before 29.0, Firefox ESR 24.x before 24.5, Thunderbird before 24.5, and SeaMonkey before 2.26 does not properly check whether objects are XBL objects, which allows remote attackers to execute arbitrary code or cause a denial of service (buffer overflow) via crafted JavaScript code that accesses a non-XBL object as if it were an XBL object.
  First observed: 2026-05-06.
