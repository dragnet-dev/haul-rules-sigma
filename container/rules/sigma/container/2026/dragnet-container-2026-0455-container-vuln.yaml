title: 'Dragnet [Container]: dragnet-container-2026-0455 — Vulnerable Base Image Pull'
id: 43ff7806-9d76-5736-8228-6ea5cd77f1ee
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-0455 (Tier 2, CVSS 9.3)
  Vim 3.0 through 7.x before 7.2.010 does not properly escape characters, which allows user-assisted attackers to (1) execute arbitrary shell commands by entering a K keystroke on a line that contains a ";" (semicolon) followed by a command, or execute arbitrary Ex commands by entering an argument after a (2) "Ctrl-]" (control close-square-bracket) or (3) "g]" (g close-square-bracket) keystroke sequence, a different issue than CVE-2008-2712.
  First observed: 2026-04-23.
