title: 'Dragnet [Container]: dragnet-container-2026-1270 — Vulnerable Base Image Pull'
id: 423163f5-721a-5172-9e69-0b80da30b410
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-1270 (Tier 2, CVSS 9.8)
  The slap_modrdn2mods function in modrdn.c in OpenLDAP 2.4.22 does not check the return value of a call to the smr_normalize function, which allows remote attackers to cause a denial of service (segmentation fault) and possibly execute arbitrary code via a modrdn call with an RDN string containing invalid UTF-8 sequences, which triggers a free of an invalid, uninitialized pointer in the slap_mods_free function, as demonstrated using the Codenomicon LDAPv3 test suite.
  First observed: 2026-04-29.
