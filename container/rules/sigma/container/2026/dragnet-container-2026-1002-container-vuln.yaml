title: 'Dragnet [Container]: dragnet-container-2026-1002 — Vulnerable Base Image Pull'
id: 2306c818-cb55-51db-962c-2b0770a6a373
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-1002 (Tier 2, CVSS 10)
  logwatch.pl in Logwatch 7.3.6 allows remote attackers to execute arbitrary commands via shell metacharacters in a log file name, as demonstrated via a crafted username to a Samba server.
  First observed: 2026-04-29.
