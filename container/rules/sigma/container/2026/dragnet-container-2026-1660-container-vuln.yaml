title: 'Dragnet [Container]: dragnet-container-2026-1660 — Vulnerable Base Image Pull'
id: af6fd455-24d8-5588-87e4-6c03de46c395
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-1660 (Tier 2, CVSS 9.8)
  The sctp_sf_ootb function in net/sctp/sm_statefuns.c in the Linux kernel before 4.8.8 lacks chunk-length checking for the first chunk, which allows remote attackers to cause a denial of service (out-of-bounds slab access) or possibly have unspecified other impact via crafted SCTP data.
  First observed: 2026-05-06.
