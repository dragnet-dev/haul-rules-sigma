title: 'Dragnet [Container]: dragnet-container-2026-1802 — Vulnerable Base Image Pull'
id: 9342ed03-54bb-52d0-84b5-0a29ed88bb24
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-1802 (Tier 2, CVSS 9.8)
  click/install.py in click does not require files in package filesystem tarballs to start with ./ (dot slash), which allows remote attackers to install an alternate security policy and gain privileges via a crafted package, as demonstrated by the test.mmrow app for Ubuntu phone.
  First observed: 2026-05-13.
