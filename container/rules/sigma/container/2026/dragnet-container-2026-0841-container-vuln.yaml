title: 'Dragnet [Container]: dragnet-container-2026-0841 — Vulnerable Base Image Pull'
id: 684c409b-6e44-5857-bb7d-117de8624d97
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-0841 (Tier 2, CVSS 9.3)
  The Splash::drawImage function in Splash.cc in Xpdf 2.x and 3.x before 3.02pl4, and Poppler 0.x, as used in GPdf and kdegraphics KPDF, does not properly allocate memory, which allows remote attackers to cause a denial of service (application crash) or possibly execute arbitrary code via a crafted PDF document that triggers a NULL pointer dereference or a heap-based buffer overflow.
  First observed: 2026-04-23.
