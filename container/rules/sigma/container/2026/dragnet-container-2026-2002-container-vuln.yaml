title: 'Dragnet [Container]: dragnet-container-2026-2002 — Vulnerable Base Image Pull'
id: b49448ba-7edc-5c93-a2cd-93d9aa9ced62
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2026-2002 (Tier 2, CVSS 10)
  The _gnutls_server_name_recv_params function in lib/ext_server_name.c in libgnutls in gnutls-serv in GnuTLS before 2.2.4 does not properly calculate the number of Server Names in a TLS 1.0 Client Hello message during extension handling, which allows remote attackers to cause a denial of service (crash) or possibly execute arbitrary code via a zero value for the length of Server Names, which leads to a buffer overflow in session resumption data in the pack_security_parameters function, aka GNUTLS-SA-2008-1-1.
  First observed: 2026-04-23.
