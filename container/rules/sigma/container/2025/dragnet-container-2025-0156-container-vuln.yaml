title: 'Dragnet [Container]: dragnet-container-2025-0156 — Vulnerable Base Image Pull'
id: f0bbeafc-a9b5-5635-a401-c257b1c9b8da
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2025-0156 (Tier 2, CVSS 9.1)
  An issue was discovered in Xen through 4.9.x. Grant copying code made an implication that any grant pin would be accompanied by a suitable page reference. Other portions of code, however, did not match up with that assumption. When such a grant copy operation is being done on a grant of a dying domain, the assumption turns out wrong. A malicious guest administrator can cause hypervisor memory corruption, most likely resulting in host crash and a Denial of Service. Privilege escalation and information leaks cannot be ruled out.
  First observed: 2025-04-20.
