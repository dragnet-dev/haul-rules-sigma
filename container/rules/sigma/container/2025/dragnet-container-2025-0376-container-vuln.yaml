title: 'Dragnet [Container]: dragnet-container-2025-0376 — Vulnerable Base Image Pull'
id: 45a37464-1fb7-54e0-a961-e74554355991
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2025-0376 (Tier 2, CVSS 9.8)
  smtp_mailaddr in smtp_session.c in OpenSMTPD 6.6, as used in OpenBSD 6.6 and other products, allows remote attackers to execute arbitrary commands as root via a crafted SMTP session, as demonstrated by shell metacharacters in a MAIL FROM field. This affects the "uncommented" default configuration. The issue exists because of an incorrect return value upon failure of input validation.
  First observed: 2025-11-07.
