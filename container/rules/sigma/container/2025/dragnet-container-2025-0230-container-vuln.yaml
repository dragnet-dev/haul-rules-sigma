title: 'Dragnet [Container]: dragnet-container-2025-0230 — Vulnerable Base Image Pull'
id: c08c0fd8-57fe-5551-918b-572aa92a5ca7
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2025-0230 (Tier 2, CVSS 9.1)
  Zabbix allows to configure SMS notifications. AT command injection occurs on "Zabbix Server" because there is no validation of "Number" field on Web nor on Zabbix server side. Attacker can run test of SMS providing specially crafted phone number and execute additional AT commands on modem.
  First observed: 2025-11-03.
references:
  - https://lists.debian.org/debian-lts-announce/2024/10/msg00000.html
  - https://support.zabbix.com/browse/ZBX-25012
author: dragnet-bot
date: 2026-05-22
tags:
  - attack.t1610
  - attack.t1611
  - dragnet.cve
logsource:
  category: container_image_pull
detection:
  selection:
    Image|contains:
      - 'debian:11'
      - 'debian:12'
      - 'debian:13'
      - 'debian:14'
  condition: selection
falsepositives:
  - Cached images pulled before the vulnerability was published
  - Internal image mirrors that have not been updated
level: critical
