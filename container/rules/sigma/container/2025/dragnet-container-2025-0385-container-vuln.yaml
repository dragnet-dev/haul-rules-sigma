title: 'Dragnet [Container]: dragnet-container-2025-0385 — Vulnerable Base Image Pull'
id: 107ac616-3615-5f63-9a04-a6a8b279eb3d
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2025-0385 (Tier 2, CVSS 9.8)
  The receive_xattr function in xattrs.c in rsync 3.1.2 and 3.1.3-development does not check for a trailing '\0' character in an xattr name, which allows remote attackers to cause a denial of service (heap-based buffer over-read and application crash) or possibly have unspecified other impact by sending crafted data to the daemon.
  First observed: 2025-04-20.
