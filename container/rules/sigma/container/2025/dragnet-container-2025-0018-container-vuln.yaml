title: 'Dragnet [Container]: dragnet-container-2025-0018 — Vulnerable Base Image Pull'
id: e5608e1c-0b3b-5764-aa9e-16e03d6a10a3
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2025-0018 (Tier 2, CVSS 9.8)
  GNU Emacs through 28.2 allows attackers to execute commands via shell metacharacters in the name of a source-code file, because lib-src/etags.c uses the system C library function in its implementation of the etags program. For example, a victim may use the "etags -u *" command (suggested in the etags documentation) in a situation where the current working directory has contents that depend on untrusted input.
  First observed: 2025-03-18.
