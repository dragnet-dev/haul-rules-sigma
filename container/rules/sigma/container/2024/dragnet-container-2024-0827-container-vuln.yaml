title: 'Dragnet [Container]: dragnet-container-2024-0827 — Vulnerable Base Image Pull'
id: df45d9ff-8e59-55ed-868f-88a331af491b
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0827 (Tier 2, CVSS 9.8)
  An issue was discovered in amqp_handle_input in amqp_connection.c in rabbitmq-c 0.9.0. There is an integer overflow that leads to heap memory corruption in the handling of CONNECTION_STATE_HEADER. A rogue server could return a malicious frame header that leads to a smaller target_size value than needed. This condition is then carried on to a memcpy function that copies too much data into a heap buffer.
  First observed: 2024-11-21.
