title: 'Dragnet [Container]: dragnet-container-2024-0845 — Vulnerable Base Image Pull'
id: 46218cd4-0e30-5db5-91a8-ab91262f87c4
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0845 (Tier 2, CVSS 9.8)
  An issue was discovered in Squid through 4.7. When handling the tag esi:when when ESI is enabled, Squid calls ESIExpression::Evaluate. This function uses a fixed stack buffer to hold the expression while it's being evaluated. When processing the expression, it could either evaluate the top of the stack, or add a new member to the stack. When adding a new member, there is no check to ensure that the stack won't overflow.
  First observed: 2024-11-21.
