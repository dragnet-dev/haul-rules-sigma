title: 'Dragnet [Container]: dragnet-container-2024-0838 — Vulnerable Base Image Pull'
id: a698dbad-2d8e-55aa-9a84-677fff9b8bfd
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0838 (Tier 2, CVSS 9.8)
  This affects the package ini before 1.3.6. If an attacker submits a malicious INI file to an application that parses it with ini.parse, they will pollute the prototype on the application. This can be exploited further depending on the context.
  First observed: 2024-11-21.
