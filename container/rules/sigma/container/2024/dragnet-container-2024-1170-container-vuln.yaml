title: 'Dragnet [Container]: dragnet-container-2024-1170 — Vulnerable Base Image Pull'
id: 1bb1a4c0-1544-5d13-a98c-c4fbcbfa6c96
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-1170 (Tier 2, CVSS 9.8)
  An issue was discovered in Squid through 4.7. When handling requests from users, Squid checks its rules to see if the request should be denied. Squid by default comes with rules to block access to the Cache Manager, which serves detailed server information meant for the maintainer. This rule is implemented via url_regex. The handler for url_regex rules URL decodes an incoming request. This allows an attacker to encode their URL to bypass the url_regex check, and gain access to the blocked resource.
  First observed: 2024-11-21.
