title: 'Dragnet [Container]: dragnet-container-2024-0985 — Vulnerable Base Image Pull'
id: d3770d08-551a-58db-9258-c96081337b81
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0985 (Tier 2, CVSS 9.1)
  The CAF demuxer in modules/demux/caf.c in VideoLAN VLC media player 3.0.4 may read memory from an uninitialized pointer when processing magic cookies in CAF files, because a ReadKukiChunk() cast converts a return value to an unsigned int even if that value is negative. This could result in a denial of service and/or a potential infoleak.
  First observed: 2024-11-21.
