title: 'Dragnet [Container]: dragnet-container-2024-0895 — Vulnerable Base Image Pull'
id: 6c3f328d-8063-5dba-8aa2-924884e22326
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0895 (Tier 2, CVSS 9.8)
  An issue was discovered in net/ipv4/sysctl_net_ipv4.c in the Linux kernel before 5.0.11. There is a net/ipv4/tcp_input.c signed integer overflow in tcp_ack_update_rtt() when userspace writes a very large integer to /proc/sys/net/ipv4/tcp_min_rtt_wlen, leading to a denial of service or possibly unspecified other impact, aka CID-19fad20d15a6.
  First observed: 2024-11-21.
