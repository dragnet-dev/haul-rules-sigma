title: 'Dragnet [Container]: dragnet-container-2024-0461 — Vulnerable Base Image Pull'
id: 26d3bd64-3588-54f3-9364-f6cfd7ae5d8d
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0461 (Tier 2, CVSS 9.1)
  In GLPI before version 9.5.2, the `​pluginimage.send.php​` endpoint allows a user to specify an image from a plugin. The parameters can be maliciously crafted to instead delete the .htaccess file for the files directory. Any user becomes able to read all the files and folders contained in “/files/”. Some of the sensitive information that is compromised are the user sessions, logs, and more. An attacker would be able to get the Administrators session token and use that to authenticate. The issue is patched in version 9.5.2.
  First observed: 2024-11-21.
