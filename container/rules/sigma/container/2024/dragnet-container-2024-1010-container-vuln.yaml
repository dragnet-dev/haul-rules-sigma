title: 'Dragnet [Container]: dragnet-container-2024-1010 — Vulnerable Base Image Pull'
id: 348abb1a-ac65-5892-ab83-54996f998684
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-1010 (Tier 2, CVSS 9.8)
  OctoRPKI does not escape a URI with a filename containing "..", this allows a repository to create a file, (ex. rsync://example.org/repo/../../etc/cron.daily/evil.roa), which would then be written to disk outside the base cache folder. This could allow for remote code execution on the host machine OctoRPKI is running on.
  First observed: 2024-11-21.
