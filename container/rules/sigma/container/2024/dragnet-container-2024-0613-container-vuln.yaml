title: 'Dragnet [Container]: dragnet-container-2024-0613 — Vulnerable Base Image Pull'
id: 49d94efe-8ff2-54b6-8aa8-dfcb85959311
status: deprecated
description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0613 (Tier 2, CVSS 9.8)
  In Apache Batik 1.x before 1.10, when deserializing subclass of `AbstractDocument`, the class takes a string from the inputStream as the class name which then use it to call the no-arg constructor of the class. Fix was to check the class type before calling newInstance in deserialization.
  First observed: 2024-11-21.
