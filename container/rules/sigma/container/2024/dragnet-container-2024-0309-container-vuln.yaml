description: |
  Detects deployment of a container image known to contain a critical vulnerability.
  Incident: dragnet-container-2024-0309 (Tier 2, CVSS 9.8)
  In the Linux kernel through 5.3.2, cfg80211_mgd_wext_giwessid in net/wireless/wext-sme.c does not reject a long SSID IE, leading to a Buffer Overflow.
  First observed: 2024-11-21.
