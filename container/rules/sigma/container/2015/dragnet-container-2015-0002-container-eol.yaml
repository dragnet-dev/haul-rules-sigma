description: |
  Detects deployment of a container image based on an end-of-life product cycle.
  EOL images receive no further security patches regardless of new CVEs.
  Incident: dragnet-container-2015-0002
  php 5.4 reached end-of-life on 2015-09-14. All images based on this cycle are permanently unpatched.
  First observed: 2015-09-14.
references:
  - https://endoflife.date/php
author: dragnet-bot
date: 2026-05-22
tags:
