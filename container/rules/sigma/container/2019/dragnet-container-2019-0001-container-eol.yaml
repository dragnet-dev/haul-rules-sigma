description: |
  Detects deployment of a container image based on an end-of-life product cycle.
  EOL images receive no further security patches regardless of new CVEs.
  Incident: dragnet-container-2019-0001
  php 7.1 reached end-of-life on 2019-12-01. All images based on this cycle are permanently unpatched.
  First observed: 2019-12-01.
references:
  - https://endoflife.date/php
author: dragnet-bot
date: 2026-05-19
tags:
  - attack.t1610
logsource:
  category: container_image_pull
detection:
  selection:
    Image|startswith:
      - 'php:7.1.'
      - 'php:7.1-'
  condition: selection
falsepositives:
  - Internal base images that pin to EOL cycles intentionally
level: high
