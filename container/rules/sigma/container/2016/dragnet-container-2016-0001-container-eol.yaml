description: |
  Detects deployment of a container image based on an end-of-life product cycle.
  EOL images receive no further security patches regardless of new CVEs.
  Incident: dragnet-container-2016-0001
  postgresql 9.1 reached end-of-life on 2016-10-27. All images based on this cycle are permanently unpatched.
  First observed: 2016-10-27.
references:
